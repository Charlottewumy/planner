const CATS = {
  work:     { label: "工作",     dot: "var(--brand)", soft: "#eceae5" },
  personal: { label: "個人",     dot: "var(--sub)", soft: "#f2f1ed" },
  sororism: { label: "Sororism", dot: "#9C6FA6", soft: "#EEE6F0" },
  deadline: { label: "截止日",   dot: "var(--accent)", soft: "#f2ede8" },
  holiday:  { label: "節氣節日", dot: "#a1a19f", soft: "#f2f1ed" },
};

// 24 節氣 + 常見節日，用來把匯入的這類條目歸到中性分類（不標工作色）
const SOLAR_TERMS = ["立春","雨水","驚蟄","春分","清明","穀雨","立夏","小滿","芒種","夏至","小暑","大暑","立秋","處暑","白露","秋分","寒露","霜降","立冬","小雪","大雪","冬至","小寒","大寒"];
const HOLIDAY_HINTS = ["節氣","元旦","春節","除夕","農曆","元宵","清明節","端午","中秋","重陽","國慶","教師節","兒童節","母親節","父親節","情人節","聖誕","耶誕","勞動節","行憲","光復"];
const classifyImported = (title) => {
  const t = title || "";
  // 工作相關字詞優先：休館、會議、督導、值班、活動等即使含節日字樣也算工作
  const WORK_WORDS = ["休館","館務","會議","內督","外督","督","班","活動","講座","團體","公假","面試","領導營","入帳","核磁","診"];
  if (WORK_WORDS.some((w) => t.includes(w))) return "work";
  if (SOLAR_TERMS.some((s) => t.includes(s))) return "holiday";
  if (HOLIDAY_HINTS.some((s) => t.includes(s))) return "holiday";
  return "work";
};

// user can be a plain string or array; images converted to inline_data parts
// fetch 加逾時：網路半死時不再無限轉圈，超過時限丟 Error("timeout")
async function fetchWithTimeout(url, opts, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => { try { ctrl.abort(); } catch (e) {} }, ms || 30000);
  try {
    return await fetch(url, Object.assign({}, opts || {}, { signal: ctrl.signal }));
  } catch (e) {
    if (e && (e.name === "AbortError" || /aborted/i.test(e.message || ""))) throw new Error("timeout");
    throw e;
  } finally { clearTimeout(timer); }
}
async function callClaude(system, user) {
  const key = getAnthropicKey();
  if (!key) throw new Error("no_key");
  let parts;
  if (typeof user === "string") {
    parts = [{ text: user }];
  } else {
    // user is array of Anthropic-style content blocks → convert to Gemini parts
    parts = user.map((b) => {
      if (b.type === "text") return { text: b.text };
      if (b.type === "image") return { inline_data: { mime_type: b.source.media_type, data: b.source.data } };
      return { text: "" };
    });
  }
  const doRequest = async (model) => {
    const url = "https://generativelanguage.googleapis.com/v1beta/models/" + model + ":generateContent";
    // Flash／Flash-Lite 預設會「思考」，思考 token 會吃掉 maxOutputTokens、導致回傳空白或截斷 → 關閉思考
    const genCfg = { maxOutputTokens: 8192 };
    if (model.indexOf("flash") !== -1) genCfg.thinkingConfig = { thinkingBudget: 0 };
    const res = await fetchWithTimeout(url, {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-goog-api-key": key },
      body: JSON.stringify({
        system_instruction: { parts: [{ text: system }] },
        contents: [{ role: "user", parts }],
        generationConfig: genCfg,
      }),
    }, 60000);
    if (res.status === 400 || res.status === 403) throw new Error("bad_key");
    if (res.status === 429) {
      // 分辨是「每分鐘」還是「每日」額度：讀回應內文的配額說明
      let body = ""; try { body = JSON.stringify(await res.json()); } catch (e) {}
      throw new Error(/perday|per day|daily/i.test(body) ? "rate_limit_day" : "rate_limit");
    }
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  };
  let data;
  try {
    data = await doRequest(getGeminiModel());
  } catch (e) {
    // 額度被擋且目前模型不是 Flash-Lite → 自動改用額度最高的 Flash-Lite 重試一次
    if ((e.message === "rate_limit" || e.message === "rate_limit_day") && getGeminiModel() !== "gemini-2.5-flash-lite") {
      data = await doRequest("gemini-2.5-flash-lite");
    } else { throw e; }
  }
  const cand = data.candidates && data.candidates[0];
  const text = (cand && cand.content && cand.content.parts)
    ? cand.content.parts.map((p) => p.text || "").join("\n").trim()
    : "";
  if (!text) {
    const why = (cand && cand.finishReason) || (data.promptFeedback && data.promptFeedback.blockReason) || "empty";
    throw new Error(why === "MAX_TOKENS" ? "truncated" : "empty_response");
  }
  return text;
}
// read an image File → {media_type, data(base64)}
function fileToImageBlock(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () =>
      resolve({
        type: "image",
        source: {
          type: "base64",
          media_type: file.type || "image/png",
          data: String(r.result).split(",")[1],
        },
      });
    r.onerror = () => reject(new Error("read failed"));
    r.readAsDataURL(file);
  });
}
function parseJSON(text) {
  let t = (text || "").replace(/```json|```/g, "").trim();
  try { return JSON.parse(t); } catch (e) {}
  // 模型偶爾會在 JSON 前後夾文字：擷取第一個 { 或 [ 到最後一個對應括號
  const a = t.search(/[\[{]/);
  if (a !== -1) {
    const close = t[a] === "{" ? "}" : "]";
    const b = t.lastIndexOf(close);
    if (b > a) { try { return JSON.parse(t.slice(a, b + 1)); } catch (e) {} }
  }
  throw new Error("bad_json");
}

// AI 錯誤訊息共用對應（讓失敗原因講清楚，不再一律「請再試一次」）
function aiErrMsg(e, what) {
  const m = e && e.message;
  if (m === "no_key")         return "請先在「備份」分頁設定 Gemini API Key，AI 功能才能使用。";
  if (m === "bad_key")        return "Gemini API Key 不正確、或此模型不支援；請到「備份」分頁重設或改用 Flash。";
  if (m === "rate_limit")     return "已達 Gemini 每分鐘上限（已自動改試備用模型仍滿），請等一分鐘再試。";
  if (m === "rate_limit_day") return "今天的 Gemini 免費額度用完了（每日上限，等幾分鐘也沒用）。約台灣時間下午 3 點重置；急用的話可到 Google AI Studio 為金鑰啟用付費方案。";
  if (m === "truncated")      return (what || "AI") + "回應被截斷，請縮短內容後再試一次。";
  if (m === "bad_json")       return "AI 回傳的格式無法解析，請再試一次，或改用「直接收藏」。";
  if (m === "empty_response") return (what || "AI") + "沒有回應（可能被安全機制阻擋），請換個內容再試。";
  if (m === "timeout")        return (what || "AI") + "等太久沒有回應（超過 60 秒），可能是網路不穩或內容太長，請再試一次。";
  if (/Failed to fetch|NetworkError|Load failed|ERR_/i.test(m || ""))
    return "連不到 AI 伺服器（被瀏覽器擋住或沒網路）。請確認有網路，並把 Edge 對 generativelanguage.googleapis.com 的「追蹤防護」關掉後再試一次。";
  return (what || "AI") + "失敗：" + (m || "未知錯誤") + "，請再試一次。";
}

// ── .ics parser (Google Calendar export) ─────────────────────
// returns [{date:'YYYY-MM-DD', time:'HH:MM'|'', title}]
function parseICS(text) {
  // unfold folded lines (RFC5545: continuation lines start with space/tab)
  const unfolded = text.replace(/\r?\n[ \t]/g, "");
  const lines = unfolded.split(/\r?\n/);
  const out = [];
  let cur = null;
  const p2 = (n) => String(n).padStart(2, "0");
  // 解析 DTSTART：支援全天（只有日期）、本地時間、UTC（結尾 Z）三種格式。
  // UTC 會換算成電腦所在時區的當地日期＋時間，避免跨午夜的事件日期、時間錯位。
  const parseDT = (val) => {
    const v = val.replace(/[^0-9TZ]/g, "");
    const hasTime = v.includes("T") && v.length >= 13;
    if (!hasTime) return { date: `${v.slice(0, 4)}-${v.slice(4, 6)}-${v.slice(6, 8)}`, time: "" };
    const y = +v.slice(0, 4), mo = +v.slice(4, 6), d = +v.slice(6, 8);
    const hh = +v.slice(9, 11), mi = +v.slice(11, 13);
    const dt = /Z$/.test(v) ? new Date(Date.UTC(y, mo - 1, d, hh, mi)) : new Date(y, mo - 1, d, hh, mi);
    return { date: dateToISO(dt), time: p2(dt.getHours()) + ":" + p2(dt.getMinutes()) };
  };
  for (const raw of lines) {
    if (raw.startsWith("BEGIN:VEVENT")) cur = { date: "", time: "", title: "" };
    else if (raw.startsWith("END:VEVENT")) { if (cur && cur.date) out.push(cur); cur = null; }
    else if (cur) {
      const idx = raw.indexOf(":");
      if (idx === -1) continue;
      const key = raw.slice(0, idx);
      const val = raw.slice(idx + 1);
      if (key.startsWith("DTSTART")) { const r = parseDT(val); cur.date = r.date; cur.time = r.time; }
      else if (key === "SUMMARY") cur.title = val.replace(/\\,/g, ",").replace(/\\n/g, " ").trim();
    }
  }
  return out;
}


// ─── VOICE RECORDER ────────────────────────────────
function VoiceRecorder({ onResult }) {
  const [on, setOn] = useState(false);
  const [interim, setInterim] = useState("");
  const ref = useRef(null);
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const toggle = () => {
    if (on) { ref.current && ref.current.stop(); return; }
    const r = new SR(); r.lang = "zh-TW"; r.continuous = true; r.interimResults = true;
    r.onresult = (e) => {
      let fin = "", mid = "";
      for (let i = e.resultIndex; i < e.results.length; i++)
        e.results[i].isFinal ? fin += e.results[i][0].transcript : mid += e.results[i][0].transcript;
      if (fin) { onResult(fin); }
      setInterim(mid);
    };
    r.onend = () => { setOn(false); setInterim(""); };
    r.onerror = () => { setOn(false); setInterim(""); };
    ref.current = r; r.start(); setOn(true);
  };
  return (
    <div className="dp-voice-bar">
      <button className={"dp-voice-btn" + (on ? " active" : "")} onClick={toggle}>
        {on ? "⏹ 錄音中…" : "🎤 錄音轉文字"}
      </button>
      {interim && <span className="dp-voice-interim">{interim}</span>}
    </div>
  );
}
// 各分頁錯誤邊界：單一分頁出錯只顯示內嵌訊息，不影響其他分頁與資料
class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { err: null }; }
  static getDerivedStateFromError(err) { return { err: err }; }
  componentDidCatch(err, info) {}
  render() {
    if (this.state.err) {
      return (
        <div className="dp-wrap">
          <div className="dp-import" style={{ background: "#f2ede8", borderColor: "#f3d9c9" }}>
            <div className="dp-import-t" style={{ color: "var(--accent)" }}>這個分頁出了點狀況</div>
            <p className="dp-import-sub">別擔心，其他分頁和你的資料都不受影響。可以切到別的分頁，或重新整理頁面。</p>
            <pre style={{ whiteSpace: "pre-wrap", fontSize: 12, color: "#cf2d56", marginTop: 8 }}>{String((this.state.err && this.state.err.message) || this.state.err)}</pre>
            <button className="dp-btn solid" style={{ marginTop: 10 }} onClick={() => this.setState({ err: null })}>重試這個分頁</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

      if ((e.ctrlKey || e.metaKey) && String(e.key).toLowerCase() === "k") { e.preventDefault(); setGsOpen(true); }
    };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, []);
  const saveQuick = () => {
    const txt = quickText.trim();
    if (!txt) { setQuickCap(false); return; }
    setState((s) => {
      const card = { id: uid(), num: String((s.zettel || []).length + 1), date: todayISO(), links: [], type: "fleeting", title: txt.split("\n")[0].slice(0, 30), content: txt, tags: [] };
      return { ...s, zettel: [card, ...(s.zettel || [])] };
    });
    setQuickText(""); setQuickCap(false);
  };

  // ── 全域搜尋（Ctrl+K／側欄 🔍）：記憶體內即時掃描，不建索引 ──
  const [gsOpen, setGsOpen] = useState(false);
  const [gsQ, setGsQ] = useState("");
  const [gsIdx, setGsIdx] = useState(0);
  const [zettelOpen, setZettelOpen] = useState(null); // 從搜尋跳進卡片盒時要打開的卡片
  const gsResults = (() => {
    const q = gsQ.trim().toLowerCase();
    if (!gsOpen || !q) return [];
    const has = (...ss) => ss.some((s) => String(s || "").toLowerCase().includes(q));
    const out = [];
    (state.events || []).forEach((e) => { if (has(e.title)) out.push({ tab: "cal", type: "行事曆", text: (e.date || "") + " " + (e.time || "") + " " + (e.title || "") }); });
    (state.todos || []).forEach((x) => { if (has(x.text, x.owner)) out.push({ tab: "todo", type: "待辦", text: (x.done ? "✓ " : "") + (x.text || "") }); });
    (state.zettel || []).forEach((c) => { if (has(c.title, c.content, (c.tags || []).join(" "))) out.push({ tab: "zettel", type: "卡片盒", text: (c.num ? c.num + "·" : "") + (c.title || ""), zid: c.id }); });
    (state.ideas || []).forEach((i) => { if (has(i.title, (Array.isArray(i.summary) ? i.summary : []).join(" "))) out.push({ tab: "ideas", type: "發想", text: i.title || "" }); });
    (state.igPosts || []).forEach((p) => { if (has(p.topic, p.detail)) out.push({ tab: "ig", type: "IG 排程", text: (p.date || "") + " " + (p.topic || "") }); });
    (state.trends || []).forEach((tr) => { if (has(tr.category, tr.source, Array.isArray(tr.summary) ? tr.summary.join(" ") : tr.summary)) out.push({ tab: "ideas", type: "收藏", text: (tr.category || "") + "｜" + (tr.source || "") }); });
    (state.journal || []).forEach((j) => { if (has(j.text)) out.push({ tab: "journal", type: "手帳", text: (j.date || "") + " " + String(j.text || "").replace(/\n/g, " ").slice(0, 40) }); });
    (state.novels || []).forEach((n) => { if (has(n.title, n.author, n.note)) out.push({ tab: "novel", type: "小說", text: n.title || "" }); });
    (state.comics || []).forEach((n) => { if (has(n.title, n.author, n.note)) out.push({ tab: "comic", type: "漫畫", text: n.title || "" }); });
    (state.supplies || []).forEach((sp) => { if (has(sp.name, sp.category, sp.note)) out.push({ tab: "supplies", type: "補給", text: sp.name || "" }); });
    return out.slice(0, 50);
  })();
  const gsGo = (r) => {
    setGsOpen(false); setGsQ(""); setGsIdx(0);
    if (r.zid) setZettelOpen({ id: r.zid, t: Date.now() });
    setTab(r.tab);
  };

  // 切換分頁時，把目前分頁捲進可視範圍（手機橫向分頁列尤其有用，桌面螢幕矮時也保證搆得到）
  const tabsRef = useRef(null);
  useEffect(() => {
    const el = tabsRef.current && tabsRef.current.querySelector(".dp-tab.on");
    if (el && el.scrollIntoView) el.scrollIntoView({ inline: "center", block: "nearest" });
  }, [tab]);

  // load from persistent storage
  useEffect(() => {
    (async () => {
      try {
        // load API key from settings
        const s = await window.storage.get(SETTINGS_KEY);
        if (s && s.value) {
          const settings = JSON.parse(s.value);
          if (settings.geminiKey) setAnthropicKey(settings.geminiKey); else if (settings.anthropicKey) setAnthropicKey(settings.anthropicKey);
          if (settings.model) setGeminiModel(settings.model);
        }
      } catch (e) { /* ignore */ }
      let st = {};
      try {
        const r = await window.storage.get(STORAGE_KEY);
        if (r && r.value) st = JSON.parse(r.value);
      } catch (e) { /* first run */ }
      // 相容舊版：若行事曆曾被拆到共用鍵，這裡沒有就併回來，避免行事曆不見
      if (!Array.isArray(st.events) || st.events.length === 0) {
        try {
          const ev = await window.storage.get(EVENTS_KEY);
          if (ev && ev.value) { const e = JSON.parse(ev.value); if (Array.isArray(e) && e.length) st.events = e; }
        } catch (e) {}
      }
      setState(sanitizeState(st));
      // 備份提醒：只有手帳裡真的有資料、且距上次備份超過門檻（或從未備份）才提醒，全新空手帳不打擾
      try {
        const b = await window.storage.get(LAST_BACKUP_KEY);
        const last = b && b.value ? Number(b.value) : 0;
        const overdue = !last || (Date.now() - last) > BACKUP_REMIND_DAYS * 864e5;
        const hasData = st && typeof st === "object" && Object.keys(st).some((k) => Array.isArray(st[k]) && st[k].length > 0);
        setBackupDue(overdue && hasData);
      } catch (e) {}
      setLoaded(true);
    })();
  }, []);

  // persist on change（儲存失敗會亮紅色警告，不再無聲吞掉）
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      let ok = false;
      try {
        ok = await window.storage.set(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        ok = false;
      }
      setSaveErr(ok === false);
    })();
  }, [state, loaded]);

  // ── 自動同步：開啟 App 時讀設定＋自動拉取 ──
  useEffect(() => {
    if (!loaded) return;
    (async () => {
      let cfg = null;
      try { const r = await window.storage.get(CLOUD_KEY); if (r && r.value) cfg = cleanCloudCfg(JSON.parse(r.value)); } catch (e) {}
      if (autoSyncOn(cfg)) suppressPush.current = true; // 載入設定本身不算資料變更，避免開啟就誤推送/誤判衝突
      setCloudCfgApp(cfg);
      if (!autoSyncOn(cfg)) return;
      const meta = await loadSyncMeta();
      try {
        setSyncStatus("syncing");
        const { data, ts } = await cloudPull(cfg);
        const cloudChanged = ts > meta.lastSyncTs;
        const localChanged = meta.lastLocalTs > meta.lastSyncTs;
        if (cloudChanged && localChanged) {
          setConflict({ data, ts });           // 兩邊都動過 → 讓使用者選
          setSyncStatus("");
        } else if (cloudChanged) {
          suppressPush.current = true;
          restoreFromCloud(data);
          await markSynced(ts);
          setSyncStatus("ok");
        } else {
          setSyncStatus("ok");
        }
      } catch (e) { setSyncStatus("err"); }
    })();
  }, [loaded]);

  // ── 自動同步：資料變更後 4 秒自動推送（打字告一段落才送，不會狂打 API）──
  useEffect(() => {
    if (!loaded || !autoSyncOn(cloudCfgApp)) return;
    if (suppressPush.current) { suppressPush.current = false; return; }
    markLocalChanged();
    if (syncTimer.current) clearTimeout(syncTimer.current);
    setSyncStatus("pending");
    syncTimer.current = setTimeout(async () => {
      try {
        setSyncStatus("syncing");
        const ts = await cloudPush(state, cloudCfgApp);
        await markSynced(ts);
        setSyncStatus("ok");
      } catch (e) { setSyncStatus("err"); }
    }, 4000);
    return () => { if (syncTimer.current) clearTimeout(syncTimer.current); };
  }, [state, loaded, cloudCfgApp]);

  // 衝突處理：使用者選「用雲端版」
  const useCloudVersion = async () => {
    if (!conflict) return;
    suppressPush.current = true;
    restoreFromCloud(conflict.data);
    await markSynced(conflict.ts);
    setConflict(null); setSyncStatus("ok");
  };
  // 衝突處理：使用者選「用這台的」
  const useLocalVersion = async () => {
    if (!conflict) return;
    setConflict(null);
    try {
      setSyncStatus("syncing");
      const ts = await cloudPush(state, cloudCfgApp);
      await markSynced(ts);
      setSyncStatus("ok");
    } catch (e) { setSyncStatus("err"); }
  };

  const SYNC_FOOT = {
    pending: "☁️ 有變更，準備同步…",
    syncing: "☁️ 同步中…",
    ok: "☁️ ✓ 已同步",
    err: "☁️ ⚠ 同步失敗（資料仍存在本機）",
  };

  const update = (patch) => { setState((s) => ({ ...s, ...patch })); if (patch && "igPosts" in patch) scheduleAutoExport(patch.igPosts); };
  // 還原時也過濾，防止惡意備份檔案帶入非預期欄位
  const restoreAll = (data) => setState(sanitizeState(data));
  // 從雲端還原：把雲端資料裡的縮圖佔位符換回本機既有的圖（縮圖只留本機，不上雲端）
  const restoreFromCloud = (data) => setState((cur) => sanitizeState(restoreLocalThumbs(data, cur)));

  const NAV = [
    { id: "today",   label: "今日",    sub: "Today" },
    { id: "cal",     label: "行事曆",  sub: "Calendar" },
    { id: "todo",    label: "待辦",    sub: "To-do" },
    { id: "ig",      label: "IG 排程", sub: "Social" },
    { id: "ideas",   label: "四域轉譯所", sub: "Translate" },
    { id: "zettel",  label: "卡片盒",  sub: "Notes" },
    { id: "journal", label: "手帳",    sub: "Journal" },
    { id: "novel",   label: "小說",    sub: "Novels" },
    { id: "comic",   label: "漫畫",    sub: "Comics" },
    { id: "supplies",label: "補給",    sub: "Supplies" },
    { id: "done",    label: "完成紀錄", sub: "Log" },
    { id: "backup",  label: "備份",    sub: "Backup" },
  ];

  return (
    <div className="dp-root">
      <style>{CSS}</style>

      {!online && (
        <div className="dp-offline-bar">📴 目前離線——資料都存在本機，功能照常使用</div>
      )}

      {saveErr && (
        <div className="dp-savewarn" role="alert">
          ⚠️ 資料儲存失敗——瀏覽器空間可能已滿。剛才的變更<b>沒有</b>存進本機！請立刻到「備份」分頁下載備份檔，再刪除一些舊資料或縮圖後繼續使用。
        </div>
      )}

      {backupDue && !saveErr && (
        <div className="dp-backupwarn" role="status">
          <span>🗂️ 提醒：距離上次備份已超過 {BACKUP_REMIND_DAYS} 天。資料只存在這台裝置，建議下載一份備份保平安。</span>
          <button className="dp-backupwarn-go" onClick={() => { setTab("backup"); setBackupDue(false); }}>去備份</button>
          <button className="dp-backupwarn-x" onClick={() => setBackupDue(false)} aria-label="關閉提醒">✕</button>
        </div>
      )}

      {cfm && (
        <div className="dp-cfm-mask" onClick={() => { cfm.res(false); setCfm(null); }}>
          <div className="dp-cfm" onClick={(e) => e.stopPropagation()}>
            <p className="dp-cfm-msg">{cfm.msg}</p>
            <div className="dp-cfm-bar">
              <button className="dp-btn" onClick={() => { cfm.res(false); setCfm(null); }}>取消</button>
              <button className="dp-btn dp-cfm-ok" onClick={() => { cfm.res(true); setCfm(null); }}>確定</button>
            </div>
          </div>
        </div>
      )}

      {toasts.length > 0 && (
        <div className="dp-toast-stack">
          {toasts.map((t) => (
            <div key={t.id} className={"dp-toast" + (t.type === "err" ? " err" : t.type === "sync" ? " sync" : "")}>{t.msg}</div>
          ))}
        </div>
      )}

      {conflict && (
        <div className="dp-syncmodal">
          <div className="dp-syncmodal-box">
            <div className="dp-ai-t">☁️ 雲端和這台裝置都有新變更</div>
            <p className="dp-ai-sub" style={{ marginTop: 8 }}>
              雲端版本時間：{new Date(conflict.ts).toLocaleString("zh-TW")}。<br />
              要保留哪一份？被覆蓋的那份就回不來了，不確定的話，先按「稍後決定」到「備份」分頁下載備份檔。
            </p>
            <div className="dp-ai-bar" style={{ marginTop: 14, flexWrap: "wrap" }}>
              <button className="dp-btn solid" onClick={useCloudVersion}>用雲端版（覆蓋這台）</button>
              <button className="dp-btn solid" onClick={useLocalVersion}>用這台的（覆蓋雲端）</button>
              <button className="dp-btn" onClick={() => setConflict(null)}>稍後決定</button>
            </div>
          </div>
        </div>
      )}

      {quickCap && (
        <div className="dp-syncmodal" onClick={() => setQuickCap(false)}>
          <div className="dp-syncmodal-box" onClick={(e) => e.stopPropagation()}>
            <div className="dp-ai-t">⚡ 快速捕捉（存成閃現筆記）</div>
            <textarea className="dp-ta" rows={3} autoFocus value={quickText}
              onChange={(e) => setQuickText(e.target.value)}
              onKeyDown={(e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); saveQuick(); } if (e.key === "Escape") setQuickCap(false); }}
              placeholder="想到什麼先記下來（Enter 存檔、Esc 取消），之後到卡片盒整理" />
            <div className="dp-ai-bar" style={{ marginTop: 10 }}>
              <button className="dp-btn solid" onClick={saveQuick}>存檔</button>
              <button className="dp-btn" onClick={() => setQuickCap(false)}>取消</button>
            </div>
          </div>
        </div>
      )}

      {gsOpen && (
        <div className="dp-syncmodal" onClick={() => { setGsOpen(false); setGsQ(""); }}>
          <div className="dp-syncmodal-box" onClick={(e) => e.stopPropagation()}>
            <div className="dp-ai-t">🔍 全域搜尋</div>
            <input className="dp-src" autoFocus placeholder="搜尋行程、待辦、卡片、IG、書目…（↑↓ 選、Enter 跳轉）"
              value={gsQ} onChange={(e) => { setGsQ(e.target.value); setGsIdx(0); }}
              onKeyDown={(e) => {
                if (e.key === "Escape") { setGsOpen(false); setGsQ(""); }
                if (e.key === "ArrowDown") { e.preventDefault(); setGsIdx((i) => Math.min(i + 1, Math.max(gsResults.length - 1, 0))); }
                if (e.key === "ArrowUp") { e.preventDefault(); setGsIdx((i) => Math.max(i - 1, 0)); }
                if (e.key === "Enter" && gsResults[gsIdx]) gsGo(gsResults[gsIdx]);
              }} />
            <div className="dp-gsres">
              {gsQ.trim() === "" ? (
                <p className="dp-hint" style={{ margin: "8px 0 0" }}>輸入關鍵字，一次搜遍行程、待辦、卡片盒、發想、IG、趨勢、手帳、書目、補給。</p>
              ) : gsResults.length === 0 ? (
                <p className="dp-hint" style={{ margin: "8px 0 0" }}>沒有找到「{gsQ}」。</p>
              ) : (
                gsResults.map((r, i) => (
                  <button key={i} className={"dp-gsitem" + (i === gsIdx ? " on" : "")} onMouseEnter={() => setGsIdx(i)} onClick={() => gsGo(r)}>
                    <b>{r.type}</b><span>{r.text}</span>
                  </button>
                ))
              )}
            </div>
          </div>
        </div>
      )}

      {loaded && (tab === "today" || tab === "zettel") && !quickCap && (
        <button className="dp-fab" title="快速捕捉靈感（Ctrl+J）" onClick={() => setQuickCap(true)}>⚡</button>
      )}

      {/* spine + tabs */}
      <aside className="dp-spine">
        <div className="dp-brand">
          <span className="dp-bear">ʕ•ᴥ•ʔ</span>
          <span className="dp-brand-t">館長手帳</span>
        </div>
        <nav className="dp-tabs" ref={tabsRef}>
          {NAV.map((n) => (
            <button
              key={n.id}
              className={"dp-tab" + (tab === n.id ? " on" : "")}
              onClick={() => setTab(n.id)}
            >
              <span className="dp-tab-l">{n.label}</span>
              <span className="dp-tab-s">{n.sub}</span>
            </button>
          ))}
          <button className="dp-tab" title="全域搜尋（Ctrl+K）" onClick={() => setGsOpen(true)}>
            <span className="dp-tab-l">🔍 搜尋</span>
            <span className="dp-tab-s">Ctrl+K</span>
          </button>
        </nav>
        <div className="dp-spine-foot">
          {cloudCfgReady(cloudCfgApp)
            ? (SYNC_FOOT[syncStatus] || "☁️ 雲端同步已設定")
            : "單機版 · 資料存於本機"}
        </div>
      </aside>

      <main className="dp-page">
        {!loaded ? (
          <div className="dp-loading">翻開手帳中…</div>
        ) : (
          <ErrorBoundary key={tab}>
            {tab === "today"   && <Today   state={state} go={setTab} update={update} />}
            {tab === "cal"     && <Calendar state={state} update={update} />}
            {tab === "todo"    && <Todos    state={state} update={update} />}
            {tab === "ig"      && <IG       state={state} update={update} />}
            {tab === "ideas"   && <Ideas    state={state} update={update} go={setTab} />}
            {tab === "zettel"  && <Zettel   state={state} update={update} openCard={zettelOpen} />}
            {tab === "journal" && <Journal  state={state} update={update} />}
            {tab === "novel"   && <Library  kind="novel" state={state} update={update} />}
            {tab === "comic"   && <Library  kind="comic" state={state} update={update} />}
            {tab === "supplies"&& <Supplies state={state} update={update} />}
            {tab === "done"    && <Done     state={state} update={update} />}
            {tab === "backup"  && <Backup   state={state} restoreAll={restoreAll} />}
          </ErrorBoundary>
        )}
      </main>
    </div>
  );
}

// ─── TODAY / BRIEFING ────────────────────────────────────────
function Today({ state, go, update }) {
  const t = todayISO();
  // 每日回顧：抽 3 張最久沒回顧的卡（今天看過的不再出現）
  const zAll = state.zettel || [];
  const reviewPick = zAll
    .filter((c) => (c.lastReviewedAt || "") !== t)
    .sort((a, b) => (a.lastReviewedAt || "").localeCompare(b.lastReviewedAt || ""))
    .slice(0, 3);
  const markReviewed = (id) => update({ zettel: zAll.map((c) => c.id === id ? { ...c, lastReviewedAt: t } : c) });
  // 今日復盤：四領域（親子館/Sororism/個人IG/個人進修）各抽一題，同一天固定、可換一批
  const RV_AREAS = [
    { name: "親子館", color: "var(--brand)" },
    { name: "Sororism", color: "#9C6FA6" },
    { name: "個人IG", color: "var(--accent)" },
    { name: "個人進修", color: "var(--blue)" },
  ];
  const [rvSeed, setRvSeed] = useState(0);
  const [rvTopic, setRvTopic] = useState(null); // { topic, ideaId }
  const rvHash = (s) => { let h = 5381; for (let i = 0; i < s.length; i++) h = ((h * 33) ^ s.charCodeAt(i)) >>> 0; return h; };
  const ideasAll = state.ideas || [];
  const rvQs = RV_AREAS.map((a) => {
    const pool = [];
    ideasAll.forEach((idea) => (idea.branches || []).forEach((b) => {
      if (b.area === a.name) (Array.isArray(b.ideas) ? b.ideas : []).forEach((leaf) => { if (leaf) pool.push({ topic: leaf, ideaId: idea.id }); });
    }));
    if (pool.length === 0) return null;
    return { ...a, ...pool[(rvHash(t + a.name) + rvSeed) % pool.length] };
  }).filter(Boolean);
  const saveTodayReview = (r) => {
    update({ reviews: [{ ...r, id: uid(), ideaId: rvTopic.ideaId, date: t }, ...(state.reviews || [])] });
    setRvTopic(null);
  };
  const importTodayActions = (acts) => {
    const todos = acts.filter(Boolean).map((x) => ({ id: uid(), text: x, owner: "", due: "", priority: "中", done: false }));
    if (todos.length) update({ todos: [...todos, ...state.todos] });
  };
  const todayEvents = state.events.filter((e) => e.date === t);
  const openTodos = state.todos.filter((x) => !x.done);
  const igToday = state.igPosts.filter((p) => p.date === t);
  const supSoon = (state.supplies || [])
    .filter((x) => x.dueDate)
    .map((x) => ({ ...x, dd: Math.round((isoToDate(x.dueDate) - isoToDate(t)) / 86400000) }))
    .filter((x) => x.dd <= 14)
    .sort((a, b) => a.dd - b.dd);
  const upcomingDeadlines = state.events
    .filter((e) => e.category === "deadline" && e.date >= t)
    .sort((a, b) => a.date.localeCompare(b.date))
    .slice(0, 3);

  const d = new Date();
  const wk = ["日", "一", "二", "三", "四", "五", "六"][d.getDay()];

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">每日簡報</div>
          <h1 className="dp-h1">
            {d.getMonth() + 1} 月 {d.getDate()} 日 <span className="dp-wk">週{wk}</span>
          </h1>
        </div>
      </header>

      <div className="dp-dash-strip">
        <span className="dp-dash-chip" onClick={() => go("cal")}>📅 今日行程 {todayEvents.length}</span>
        <span className="dp-dash-chip" onClick={() => go("todo")}>☑️ 待辦未完 {openTodos.length}</span>
        <span className="dp-dash-chip" onClick={() => go("supplies")}>⏰ 效期警示 {supSoon.length}</span>
      </div>

      <div className="dp-grid2">

                <button className="dp-btn" style={{ fontSize: 11, padding: "1px 8px", marginLeft: 6 }} onClick={(e) => { e.stopPropagation(); markReviewed(c.id); }}>看過了 ✓</button>

// ─── CALENDAR ────────────────────────────────────────────────
function Calendar({ state, update }) {
  const [cur, setCur] = useState(() => {
    const d = new Date();
    return { y: d.getFullYear(), m: d.getMonth() };
  });
  const [sel, setSel] = useState(todayISO());
  const [view, setView] = useState("month"); // month | week | day
  const [form, setForm] = useState({ title: "", time: "", category: "work" });
  const [editEvId, setEditEvId] = useState(null);
  const [editEv, setEditEv] = useState({ title: "", time: "" });
  const [q, setQ] = useState("");
  const [importOpen, setImportOpen] = useState(false);
  const [msg, setMsg] = useState("");
  const icsRef = useRef(null);

  const onICS = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    setMsg("");
    try {
      const text = await file.text();
      const parsed = parseICS(text);
      if (parsed.length === 0) { setMsg("這個檔案裡沒有讀到行程。"); e.target.value = ""; return; }
      // skip duplicates (same date+title already present)
      const existing = new Set(state.events.map((ev) => ev.date + "|" + ev.title));
      const fresh = parsed
        .filter((p) => !existing.has(p.date + "|" + p.title))
        .map((p) => ({ id: uid(), date: p.date, time: p.time, title: p.title, category: classifyImported(p.title) }));
      update({ events: [...state.events, ...fresh] });
      setMsg(`匯入完成：新增 ${fresh.length} 筆${parsed.length - fresh.length > 0 ? `（略過 ${parsed.length - fresh.length} 筆重複）` : ""}。節氣／節日已自動歸「節氣節日」類，其餘為「工作」，可點開單筆調整。`);
    } catch (err) {
      setMsg("讀取失敗，請確認是 Google 日曆匯出的 .ics 檔。");
    }
    e.target.value = "";
  };

  const first = new Date(cur.y, cur.m, 1);
  const startPad = first.getDay();
  const days = new Date(cur.y, cur.m + 1, 0).getDate();

  const iso = (day) =>
    `${cur.y}-${String(cur.m + 1).padStart(2, "0")}-${String(day).padStart(2, "0")}`;

  const eventsOf = (day) => state.events.filter((e) => e.date === iso(day));
  const eventsOnISO = (d) =>
    state.events.filter((e) => e.date === d).sort((a, b) => (a.time || "").localeCompare(b.time || ""));
  const selEvents = eventsOnISO(sel);
  const searchHits = q.trim()
    ? state.events
        .filter((e) => (e.title || "").toLowerCase().includes(q.trim().toLowerCase()))
        .slice()
        .sort((a, b) => a.date.localeCompare(b.date))
        .slice(0, 50)
    : [];

  const addEvent = () => {
    if (!form.title.trim()) return;
    update({
      events: [...state.events, { id: uid(), date: sel, ...form, title: form.title.trim() }],
    });
    setForm({ title: "", time: "", category: form.category });
  };
  const delEvent = async (id) => {
    if (!(await window.appConfirm("確定刪除這筆行程？"))) return;
    update({ events: state.events.filter((e) => e.id !== id) });
  };
  const setEventCat = (id, category) =>
    update({ events: state.events.map((e) => (e.id === id ? { ...e, category } : e)) });
  const startEditEv = (e) => { setEditEvId(e.id); setEditEv({ title: e.title || "", time: e.time || "" }); };
  const saveEditEv = () => {
    const t = (editEv.title || "").trim();
    if (!t) { setEditEvId(null); return; }
    update({ events: state.events.map((e) => e.id === editEvId ? { ...e, title: t, time: editEv.time || "" } : e) });
    setEditEvId(null);
  };

  const shift = (n) =>
    setCur((c) => {
      let m = c.m + n, y = c.y;
      if (m < 0) { m = 11; y--; } if (m > 11) { m = 0; y++; }
      return { y, m };
    });

  // unified prev / next / today across views
  const prev = () => {
    if (view === "month") shift(-1);
    else setSel((s) => addDays(s, view === "week" ? -7 : -1));
  };
  const next = () => {
    if (view === "month") shift(1);
    else setSel((s) => addDays(s, view === "week" ? 7 : 1));
  };
  const goToday = () => {
    const d = new Date();
    setCur({ y: d.getFullYear(), m: d.getMonth() });
    setSel(todayISO());
  };

  // keep month grid in sync when navigating week/day into another month
  const syncMonthTo = (d) => {
    const dt = isoToDate(d);
    if (dt.getFullYear() !== cur.y || dt.getMonth() !== cur.m)
      setCur({ y: dt.getFullYear(), m: dt.getMonth() });
  };

  const heading = (() => {
    if (view === "month") return `${cur.y} 年 ${cur.m + 1} 月`;
    const d = isoToDate(sel);
    if (view === "day") return `${d.getMonth() + 1} 月 ${d.getDate()} 日 週${WD[d.getDay()]}`;
    const mon = isoToDate(mondayOf(sel)); const sun = isoToDate(addDays(mondayOf(sel), 6));
    return `${mon.getMonth() + 1}/${mon.getDate()} – ${sun.getMonth() + 1}/${sun.getDate()}`;
  })();

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">行事曆</div>
          <h1 className="dp-h1">{heading}</h1>
        </div>
        <div className="dp-monthnav">
          <button onClick={() => setImportOpen((v) => !v)} className="dp-imp-toggle">匯入</button>
          <button onClick={prev}>‹</button>
          <button onClick={goToday}>今天</button>
          <button onClick={next}>›</button>
        </div>
      </header>

      <div className="dp-viewseg">
        {[["day", "日"], ["week", "週"], ["month", "月"]].map(([v, l]) => (
          <button key={v} className={"dp-seg" + (view === v ? " on" : "")} onClick={() => setView(v)}>{l}</button>
        ))}
      </div>

      <div className="dp-zsearch" style={{ marginBottom: q.trim() ? 10 : 14 }}>
        <input placeholder="🔍 搜尋行事曆事件…" value={q} onChange={(e) => setQ(e.target.value)} />
      </div>
      {q.trim() && (
        <div className="dp-import" style={{ marginBottom: 16 }}>
          <div className="dp-import-t">搜尋結果：{searchHits.length} 筆</div>
          {searchHits.length === 0 ? (
            <Empty>找不到符合「{q.trim()}」的事件。</Empty>
          ) : (
            searchHits.map((e) => (
              <button key={e.id} onClick={() => { setSel(e.date); syncMonthTo(e.date); setView("day"); setQ(""); }}
                style={{ display: "flex", alignItems: "center", gap: 8, width: "100%", textAlign: "left", padding: "7px 4px", borderBottom: "1px dashed #e6e5e0", background: "none", fontSize: 13.5 }}>
                <span className="dp-catdot" style={{ background: catOf(e.category).dot }} />
                <b style={{ minWidth: 88 }}>{e.date}</b>
                {e.time && <span style={{ color: "var(--gold)" }}>{e.time}</span>}
                <span>{e.title}</span>
              </button>
            ))
          )}
        </div>
      )}

      {importOpen && (
        <div className="dp-import">
          <div className="dp-import-t">從 Google 日曆匯入</div>
          <p className="dp-import-sub">
            在 Google 日曆 → 設定 → 匯入及匯出 → 匯出，會下載一個 .ics 檔（壓縮檔請先解壓縮）。選擇它即可一次匯入所有行程。
          </p>
          <button className="dp-btn solid" onClick={() => icsRef.current && icsRef.current.click()}>選擇 .ics 檔</button>
          <input ref={icsRef} type="file" accept=".ics,text/calendar" style={{ display: "none" }} onChange={onICS} />
          {msg && <div className="dp-import-msg">{msg}</div>}
        </div>
      )}

      <div className="dp-legend">
        {Object.entries(CATS).map(([k, v]) => (
          <span key={k} className="dp-leg"><i style={{ background: v.dot }} />{v.label}</span>
        ))}
      </div>

      {view === "month" && (
      <div className="dp-cal">
        {["一", "二", "三", "四", "五", "六", "日"].map((d, i) => (
          <div key={d} className={"dp-cal-h" + (i >= 5 ? " we" : "")}>{d}</div>
        ))}
        {/* reorder so Monday-first */}
        {(() => {
          const mondayPad = (startPad + 6) % 7;
          const arr = [];
          for (let i = 0; i < mondayPad; i++) arr.push(null);
          for (let i = 1; i <= days; i++) arr.push(i);
          return arr.map((day, idx) => {
            if (!day) return <div key={"e" + idx} className="dp-cal-c empty" />;
            const evs = eventsOf(day);
            const isSel = sel === iso(day);
            const isToday = todayISO() === iso(day);
            return (
              <button
                key={day}
                className={"dp-cal-c" + (isSel ? " sel" : "") + (isToday ? " today" : "")}
                onClick={() => { setSel(iso(day)); }}
                onDoubleClick={() => { setSel(iso(day)); setView("day"); }}
              >
                <span className="dp-cal-n">{day}</span>
                <span className="dp-cal-evs">
                  {evs.slice(0, 3).map((e) => (
                    <span key={e.id} className="dp-cal-ev" style={{ background: catOf(e.category).soft, color: catOf(e.category).dot }}>
                      {e.title}
                    </span>
                  ))}
                  {evs.length > 3 && <span className="dp-cal-more">+{evs.length - 3}</span>}
                </span>
              </button>
            );
          });
        })()}
      </div>
      )}

      {view === "week" && (
        <div className="dp-week">
          {Array.from({ length: 7 }).map((_, i) => {
            const d = addDays(mondayOf(sel), i);
            const dt = isoToDate(d);
            const evs = eventsOnISO(d);
            const isToday = d === todayISO();
            const isSel = d === sel;
            return (
              <button
                key={d}
                className={"dp-week-col" + (isSel ? " sel" : "") + (isToday ? " today" : "")}
                onClick={() => { setSel(d); syncMonthTo(d); }}
                onDoubleClick={() => { setSel(d); syncMonthTo(d); setView("day"); }}
              >
                <div className="dp-week-h">
                  <span className={"dp-week-wd" + (i >= 5 ? " we" : "")}>週{WD[dt.getDay()]}</span>
                  <span className="dp-week-n">{dt.getDate()}</span>
                </div>
                <div className="dp-week-body">
                  {evs.length === 0 ? <span className="dp-week-empty">—</span> :
                    evs.map((e) => (
                      <div key={e.id} className="dp-week-ev" style={{ background: catOf(e.category).soft, color: catOf(e.category).dot }}>
                        {e.time && <b>{e.time}</b>} {e.title}
                      </div>
                    ))}
                </div>
              </button>
            );
          })}
        </div>
      )}

      <div className="dp-day">
        <h3 className="dp-day-t">
          {view === "day"
            ? `${isoToDate(sel).getMonth() + 1} 月 ${isoToDate(sel).getDate()} 日 · 週${WD[isoToDate(sel).getDay()]}`
            : `${sel.slice(5)} 的安排`}
        </h3>
        {selEvents.length === 0 ? (
          <Empty>這天還沒有行程。</Empty>
        ) : (
          selEvents.map((e) => (
            <div key={e.id} className="dp-day-row">
              <span className="dp-catwrap" style={{ background: catOf(e.category).soft }}>
                <span className="dp-catdot" style={{ background: catOf(e.category).dot }} />
                <select
                  className="dp-catsel"
                  style={{ color: catOf(e.category).dot }}
                  value={e.category}
                  onChange={(ev) => setEventCat(e.id, ev.target.value)}
                >
                  {Object.entries(CATS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
                </select>
              </span>
              {editEvId === e.id ? (
                <>
                  <input type="time" className="dp-src" style={{ marginBottom: 0, maxWidth: 110 }}
                    value={editEv.time} onChange={(ev) => setEditEv({ ...editEv, time: ev.target.value })} />
                  <input className="dp-src" style={{ marginBottom: 0, flex: 1 }} value={editEv.title}
                    onChange={(ev) => setEditEv({ ...editEv, title: ev.target.value })}
                    onKeyDown={(ev) => ev.key === "Enter" && saveEditEv()} />
                  <button className="dp-btn solid" onClick={saveEditEv}>儲存</button>
                  <button className="dp-btn" onClick={() => setEditEvId(null)}>取消</button>
                </>
              ) : (
                <>
                  <b className="dp-day-time">{e.time || "整天"}</b>
                  <span className="dp-day-title">{e.title}</span>
                  <button className="dp-x" style={{ color: "var(--sub)" }} title="編輯" onClick={() => startEditEv(e)}>✎</button>
                  <button className="dp-x" onClick={() => delEvent(e.id)}>✕</button>
                </>
              )}
            </div>
          ))
        )}

        <div className="dp-addbar">
          <select value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
            {Object.entries(CATS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
          </select>
          <input type="time" value={form.time} onChange={(e) => setForm({ ...form, time: e.target.value })} />
          <input
            placeholder="新增行程…"
            value={form.title}
            onChange={(e) => setForm({ ...form, title: e.target.value })}
            onKeyDown={(e) => e.key === "Enter" && addEvent()}
          />
          <button className="dp-btn" onClick={addEvent}>加入</button>
        </div>
      </div>
    </div>
  );
}

// ─── TODOS (with LINE → todo AI, text + screenshot) ──────────
function Todos({ state, update }) {
  const [mode, setMode] = useState("text"); // text | image
  const [lineText, setLineText] = useState("");
  const [imgs, setImgs] = useState([]); // {id, file, url}
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [quick, setQuick] = useState("");
  const [bulk, setBulk] = useState("");
  const [bulkMsg, setBulkMsg] = useState("");
  const [editId, setEditId] = useState(null);
  const [editForm, setEditForm] = useState({ text: "", owner: "", due: "", priority: "中", scope: "personal", catId: "" });
  const [scopeFilter, setScopeFilter] = useState("all");
  const newTodoScope = () => (scopeFilter === "work" ? "work" : "personal");
  const fileRef = useRef(null);

  // ── 性質分類（事件＝做完銷掉；想法＝新增時自動同步一張閃現卡進卡片盒累積）──
  const cats = state.todoCats || [];
  const [catFilter, setCatFilter] = useState("all"); // all | none | 分類id
  const [newCat, setNewCat] = useState("");
  const [newCatKind, setNewCatKind] = useState("event");
  const catOfTodo = (x) => cats.find((c) => c.id === x.catId) || null;
  const newTodoCat = () => (catFilter !== "all" && catFilter !== "none" ? catFilter : "");
  const inCat = (x) => catFilter === "all" || (catFilter === "none" ? !x.catId : x.catId === catFilter);
  const syncIdeaCard = (added) => {
    const ideaTodos = (added || []).filter((x) => { const c = cats.find((k) => k.id === x.catId); return c && c.kind === "idea"; });
    if (ideaTodos.length === 0) return {};
    let z = state.zettel;
    ideaTodos.forEach((x) => {
      const c = cats.find((k) => k.id === x.catId);
      const t = String(x.text || "").trim();
      z = [{ id: uid(), num: String(z.length + 1), date: todayISO(), links: [], type: "fleeting",
        title: t.slice(0, 30) + (t.length > 30 ? "…" : ""), content: t, tags: [c.name, "待辦想法"] }, ...z];
    });
    return { zettel: z };
  };
  const addCat = () => {
    const n = newCat.trim();
    if (!n || cats.some((c) => c.name === n)) return;
    update({ todoCats: [...cats, { id: uid(), name: n, kind: newCatKind }] });
    setNewCat("");
  };
  const renameCat = (c) => {
    const nt = window.prompt("分類改名：", c.name);
    if (nt == null) return;
    const n = nt.trim();
    if (n) update({ todoCats: cats.map((k) => k.id === c.id ? { ...k, name: n } : k) });
  };
  const delCat = async (c) => {
    if (!(await window.appConfirm("刪除分類「" + c.name + "」？既有待辦會變成未分類，已同步進卡片盒的卡片不受影響。"))) return;
    update({ todoCats: cats.filter((k) => k.id !== c.id), todos: state.todos.map((x) => x.catId === c.id ? { ...x, catId: "" } : x) });
    if (catFilter === c.id) setCatFilter("all");
  };

  const SYS =
    "你是親子館館長的助理。從 LINE 對話中萃取待辦事項。只輸出 JSON 陣列，不要任何其他文字或 markdown。每個物件含欄位：text(事項，繁體中文)、owner(負責人，沒寫就填\"\")、due(期限，沒寫就填\"\")、priority(\"高\"或\"中\"或\"低\")。若對話中沒有任何待辦，輸出空陣列 []。";

  const commit = (items) => {
    const added = (items || []).map((i) => ({
      id: uid(), text: i.text || "", owner: i.owner || "",
      due: i.due || "", priority: i.priority || "中", scope: newTodoScope(), catId: newTodoCat(), done: false,
    })).filter((x) => x.text);
    if (added.length === 0) { setErr("沒有從內容中找到待辦事項。"); return; }
    update({ todos: [...added, ...state.todos], ...syncIdeaCard(added) });
  };

  const extractText = async () => {
    if (!lineText.trim()) return;
    setBusy(true); setErr("");
    try {
      const out = await callClaude(SYS, "LINE 對話如下：\n\n" + lineText);
      commit(parseJSON(out));
      setLineText("");
    } catch (e) {
      setErr(aiErrMsg(e, "萃取待辦"));
    }
    setBusy(false);
  };

  const onPickFiles = async (e) => {
    const files = Array.from(e.target.files || []);
    const blocks = await Promise.all(
      files.map(async (f) => ({ id: uid(), url: URL.createObjectURL(f), file: f }))
    );
    setImgs((prev) => [...prev, ...blocks]);
    setErr("");
    e.target.value = "";
  };
  const removeImg = (id) => setImgs((prev) => {
    const found = prev.find((i) => i.id === id);
    if (found) URL.revokeObjectURL(found.url);
    return prev.filter((i) => i.id !== id);
  });

  const extractImages = async () => {
    if (imgs.length === 0) return;
    setBusy(true); setErr("");
    try {
      const imageBlocks = await Promise.all(imgs.map((i) => fileToImageBlock(i.file)));
      const content = [
        ...imageBlocks,
        { type: "text", text: "以上是 LINE 對話截圖，請萃取所有待辦事項。" },
      ];
      const out = await callClaude(SYS, content);
      commit(parseJSON(out));
      imgs.forEach((i) => URL.revokeObjectURL(i.url));
      setImgs([]);
    } catch (e) {
      imgs.forEach((i) => URL.revokeObjectURL(i.url));
      setImgs([]);
      setErr(aiErrMsg(e, "讀取截圖"));
    }
    setBusy(false);
  };

  const addQuick = () => {
    if (!quick.trim()) return;
    const one = { id: uid(), text: quick.trim(), owner: "", due: "", priority: "中", scope: newTodoScope(), catId: newTodoCat(), done: false };
    update({ todos: [one, ...state.todos], ...syncIdeaCard([one]) });
    setQuick("");
  };

  const importBulk = () => {
    setBulkMsg("");
    const txt = bulk.trim();
    if (!txt) return;
    let items = [];
    // try JSON first; fall back to one-todo-per-line
    try {
      const arr = parseJSON(txt);
      if (Array.isArray(arr)) {
        items = arr.map((i) =>
          typeof i === "string"
            ? { text: i }
            : { text: i.text || i.title || "", owner: i.owner || "", due: i.due || "", priority: i.priority || "中" }
        );
      }
    } catch (e) {
      items = txt
        .split("\n")
        .map((l) => l.replace(/^\s*[\d.、)\-•]+\s*/, "").trim()) // strip "1." "- " bullets
        .filter(Boolean)
        .map((t) => ({ text: t }));
    }
    const added = items
      .filter((i) => i.text && i.text.trim())
      .map((i) => ({ id: uid(), text: i.text.trim(), owner: i.owner || "", due: i.due || "", priority: i.priority || "中", scope: newTodoScope(), catId: newTodoCat(), done: false }));
    if (added.length === 0) { setBulkMsg("沒有讀到可匯入的待辦。"); return; }
    update({ todos: [...added, ...state.todos], ...syncIdeaCard(added) });
    setBulk("");
    setBulkMsg(`匯入完成：新增 ${added.length} 筆待辦。`);
  };
  const toggle = (id) =>
    update({ todos: state.todos.map((x) => x.id === id ? { ...x, done: !x.done, doneAt: !x.done ? todayISO() : "" } : x) });
  const del = async (id) => {
    if (!(await window.appConfirm("確定刪除這筆待辦？"))) return;
    update({ todos: state.todos.filter((x) => x.id !== id) });
  };

  const startEdit = (x) => { setEditId(x.id); setEditForm({ text: x.text || "", owner: x.owner || "", due: x.due || "", priority: x.priority || "中", scope: x.scope === "work" ? "work" : "personal", catId: x.catId || "" }); };
  const saveEdit = () => {
    const t = (editForm.text || "").trim();
    if (!t) { setEditId(null); return; }
    update({ todos: state.todos.map((x) => x.id === editId ? { ...x, text: t, owner: editForm.owner || "", due: editForm.due || "", priority: editForm.priority || "中", scope: editForm.scope === "work" ? "work" : "personal", catId: editForm.catId || "" } : x) });
    setEditId(null);
  };

  const pri = (p) => (p === "高" ? 0 : p === "低" ? 2 : 1); // 高 → 中 → 低
  const inScope = (x) => scopeFilter === "all" || (x.scope === "work" ? "work" : "personal") === scopeFilter;
  const open = state.todos.filter((x) => !x.done && inScope(x) && inCat(x)).slice().sort((a, b) => {
    if (pri(a.priority) !== pri(b.priority)) return pri(a.priority) - pri(b.priority);
    return (a.due || "9999-99-99").localeCompare(b.due || "9999-99-99");
  });
  const done = state.todos.filter((x) => x.done && inScope(x) && inCat(x));

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">待辦事項</div>
          <h1 className="dp-h1">該做的事</h1>
        </div>
      </header>

      <div className="dp-igfilter">
        <button className={"dp-igf" + (scopeFilter === "all" ? " on" : "")} onClick={() => setScopeFilter("all")}>全部</button>
        <button className={"dp-igf" + (scopeFilter === "personal" ? " on" : "")} onClick={() => setScopeFilter("personal")}>私人</button>
        <button className={"dp-igf" + (scopeFilter === "work" ? " on" : "")} onClick={() => setScopeFilter("work")}>公務</button>
        <span className="dp-hint" style={{ marginLeft: 4, alignSelf: "center" }}>{scopeFilter === "all" ? "新增的待辦預設私人" : "新增的待辦會歸「" + scopeLabel(scopeFilter) + "」"}</span>
      </div>

      {cats.length > 0 && (
        <div className="dp-igfilter">
          <button className={"dp-igf" + (catFilter === "all" ? " on" : "")} onClick={() => setCatFilter("all")}>全部性質</button>
          {cats.map((c) => (
            <button key={c.id} className={"dp-igf" + (catFilter === c.id ? " on" : "")} onClick={() => setCatFilter(c.id === catFilter ? "all" : c.id)}>{(c.kind === "idea" ? "💡" : "") + c.name}</button>
          ))}
          <button className={"dp-igf" + (catFilter === "none" ? " on" : "")} onClick={() => setCatFilter("none")}>未分類</button>
          {catFilter !== "all" && catFilter !== "none" && (
            <span className="dp-hint" style={{ marginLeft: 4, alignSelf: "center" }}>
              新增的待辦會歸這個分類{(cats.find((c) => c.id === catFilter) || {}).kind === "idea" ? "，並同步一張閃現卡進卡片盒" : ""}
            </span>
          )}
        </div>
      )}

      <div className="dp-ai">
        <div className="dp-segs">
          <button className={"dp-seg" + (mode === "text" ? " on" : "")} onClick={() => { setMode("text"); setErr(""); }}>貼對話文字</button>
          <button className={"dp-seg" + (mode === "image" ? " on" : "")} onClick={() => { setMode("image"); setErr(""); }}>貼截圖</button>
        </div>

        {mode === "text" ? (
          <>
            <textarea
              className="dp-ta"
              rows={4}
              placeholder="把公事群組的對話複製貼進來…"
              value={lineText}
              onChange={(e) => setLineText(e.target.value)}
            />
            <div className="dp-ai-bar">
              <button className="dp-btn solid" disabled={busy} onClick={extractText}>
                {busy ? "AI 分析中…" : "萃取待辦"}
              </button>
              {err && <span className="dp-err">{err}</span>}
            </div>
          </>
        ) : (
          <>
            <div className="dp-drop" onClick={() => fileRef.current && fileRef.current.click()}>
              {imgs.length === 0 ? (
                <span>點此選擇 LINE 截圖（可一次多張）</span>
              ) : (
                <div className="dp-thumbs">
                  {imgs.map((i) => (
                    <div key={i.id} className="dp-thumb">
                      <img src={i.url} alt="截圖" />
                      <button className="dp-thumb-x" onClick={(ev) => { ev.stopPropagation(); removeImg(i.id); }}>✕</button>
                    </div>
                  ))}
                  <span className="dp-thumb-add">＋ 再加</span>
                </div>
              )}
            </div>
            <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: "none" }} onChange={onPickFiles} />
            <div className="dp-ai-bar">
              <button className="dp-btn solid" disabled={busy || imgs.length === 0} onClick={extractImages}>
                {busy ? "AI 讀圖中…" : "讀取截圖待辦"}
              </button>
              {err && <span className="dp-err">{err}</span>}
            </div>
          </>
        )}
      </div>

      <div className="dp-quick">
        <input
          placeholder="手動加一筆待辦…"
          value={quick}
          onChange={(e) => setQuick(e.target.value)}
          onKeyDown={(e) => e.key === "Enter" && addQuick()}
        />
        <VoiceRecorder onResult={(t) => setQuick((p) => p + t)} />
        <button className="dp-btn" onClick={addQuick}>加入</button>
      </div>

      <details className="dp-bulk">
        <summary>批次匯入（一次貼多筆，或貼我整理好的清單）</summary>
        <p className="dp-import-sub">
          每行一筆待辦即可，前面有 1. 或 - 都沒關係；也支援我給你的 JSON 清單。
        </p>
        <textarea className="dp-ta" rows={5}
          placeholder={"一行一筆，例如：\n1. App修改：諮詢師頁改為館務人員\n2. 服務對象改為0–未滿7歲"}
          value={bulk} onChange={(e) => setBulk(e.target.value)} />
        <div className="dp-ai-bar">
          <button className="dp-btn solid" onClick={importBulk}>批次匯入</button>
          {bulkMsg && <span className="dp-hint">{bulkMsg}</span>}
        </div>
      </details>

      <details className="dp-bulk">
        <summary>管理性質分類（{cats.length}）</summary>
        <p className="dp-import-sub">「事件」是做完就銷掉的；「💡 想法」類的待辦在新增時會自動同步一張閃現卡進卡片盒（帶分類標籤＋#待辦想法），累積成第二大腦的素材。先在上方篩選列點選一個分類，再新增的待辦就會歸進去。</p>
        {cats.map((c) => (
          <div key={c.id} className="dp-zsug">
            <span className="dp-zsug-t">{c.kind === "idea" ? "💡 " : ""}{c.name}</span>
            <span className="dp-zsug-why">{c.kind === "idea" ? "想法（同步卡片盒）" : "事件"}</span>
            <span className="dp-zsug-btns">
              <button className="dp-btn" style={{ fontSize: 11, padding: "1px 8px" }} onClick={() => renameCat(c)}>改名</button>
              <button className="dp-btn" style={{ fontSize: 11, padding: "1px 8px" }} onClick={() => delCat(c)}>刪除</button>
            </span>
          </div>
        ))}
        <div className="dp-ai-bar" style={{ flexWrap: "wrap" }}>
          <input className="dp-src" style={{ marginBottom: 0, maxWidth: 160 }} placeholder="新分類名稱"
            value={newCat} onChange={(e) => setNewCat(e.target.value)} onKeyDown={(e) => e.key === "Enter" && addCat()} />
          <select className="dp-src" style={{ marginBottom: 0, maxWidth: 170 }} value={newCatKind} onChange={(e) => setNewCatKind(e.target.value)}>
            <option value="event">事件</option>
            <option value="idea">💡 想法（同步卡片盒）</option>
          </select>
          <button className="dp-btn solid" onClick={addCat}>新增分類</button>
        </div>
      </details>

      <div className="dp-todos">
        {open.length === 0 && <Empty>目前沒有未完成的事項。</Empty>}
        {open.map((x) => (
          <div key={x.id} className="dp-todo">
            <button className="dp-check" onClick={() => toggle(x.id)} />
            {editId === x.id ? (
              <div className="dp-todo-b">
                <input className="dp-src" style={{ marginBottom: 6 }} value={editForm.text}
                  onChange={(e) => setEditForm({ ...editForm, text: e.target.value })}
                  onKeyDown={(e) => e.key === "Enter" && saveEdit()} />
                <div className="dp-ai-bar" style={{ margin: 0, flexWrap: "wrap" }}>
                  <input className="dp-src" style={{ marginBottom: 0, maxWidth: 120 }} placeholder="負責人"
                    value={editForm.owner} onChange={(e) => setEditForm({ ...editForm, owner: e.target.value })} />
                  <input type="date" className="dp-src" style={{ marginBottom: 0, maxWidth: 150 }}
                    value={editForm.due} onChange={(e) => setEditForm({ ...editForm, due: e.target.value })} />
                  <select className="dp-src" style={{ marginBottom: 0, maxWidth: 80 }}
                    value={editForm.priority} onChange={(e) => setEditForm({ ...editForm, priority: e.target.value })}>
                    <option value="高">高</option>
                    <option value="中">中</option>
                    <option value="低">低</option>
                  </select>
                  <select className="dp-src" style={{ marginBottom: 0, maxWidth: 90 }}
                    value={editForm.scope} onChange={(e) => setEditForm({ ...editForm, scope: e.target.value })}>
                    <option value="personal">私人</option>
                    <option value="work">公務</option>
                  </select>
                  <select className="dp-src" style={{ marginBottom: 0, maxWidth: 130 }}
                    value={editForm.catId} onChange={(e) => setEditForm({ ...editForm, catId: e.target.value })}>
                    <option value="">未分類</option>
                    {cats.map((c) => <option key={c.id} value={c.id}>{(c.kind === "idea" ? "💡" : "") + c.name}</option>)}
                  </select>
                  <button className="dp-btn solid" onClick={saveEdit}>儲存</button>
                  <button className="dp-btn" onClick={() => setEditId(null)}>取消</button>
                </div>
              </div>
            ) : (
              <>
                <div className="dp-todo-b">
                  <span className="dp-todo-text">{x.text}</span>
                  <span className="dp-todo-meta">
                    <em style={{ color: x.scope === "work" ? "var(--blue)" : "var(--sub)", fontStyle: "normal", fontWeight: 500 }}>{scopeLabel(x.scope)}</em>
                    {catOfTodo(x) && <em style={{ color: catOfTodo(x).kind === "idea" ? "var(--gold)" : "#5a6b7a", fontStyle: "normal", fontWeight: 500 }}>{(catOfTodo(x).kind === "idea" ? "💡" : "") + catOfTodo(x).name}</em>}
                    {x.owner && <em>{x.owner}</em>}
                    {x.due && <em>· {x.due}</em>}
                    <i className={"dp-pri " + x.priority}>{x.priority}</i>
                  </span>
                </div>
                <button className="dp-x" style={{ color: "var(--sub)" }} title="編輯" onClick={() => startEdit(x)}>✎</button>
                <button className="dp-x" onClick={() => del(x.id)}>✕</button>
              </>
            )}
          </div>
        ))}
      </div>

      {done.length > 0 && (
        <details className="dp-done">
          <summary>已完成 {done.length} 件</summary>
          {done.map((x) => (
            <div key={x.id} className="dp-todo done">
              <button className="dp-check on" onClick={() => toggle(x.id)} />
              <span className="dp-todo-text">{x.text}</span>
              <button className="dp-x" onClick={() => del(x.id)}>✕</button>
            </div>
          ))}
        </details>
      )}
    </div>
  );
}

// ─── IG SCHEDULE ─────────────────────────────────────────────
// IG 去重：同帳號＋相同主題視為同一則，保留「日期最新、再來最後加入」的那則，回傳要保留的 id 集合
function igKeptIds(posts) {
  const norm = (s) => String(s || "").trim().toLowerCase().replace(/\s+/g, "");
  const best = new Map();
  posts.forEach((p, i) => {
    const k = (p.account || "") + "|" + norm(p.topic);
    const cur = best.get(k);
    if (!cur || (p.date || "") > (cur.p.date || "") || ((p.date || "") === (cur.p.date || "") && i > cur.i)) best.set(k, { p, i });
  });
  return new Set([...best.values()].map((o) => o.p.id));
}

function IGToolbox() {
  const [pid, setPid]       = useState("p2");
  const [audKey, setAudKey] = useState("charlotte_wu");
  const [aud, setAud]       = useState(IG_TOOL_AUD[0].text);
  const [vals, setVals]     = useState({});
  const [msg, setMsg]       = useState("");
  const p = IG_TOOL_PROMPTS.find((x) => x.id === pid) || IG_TOOL_PROMPTS[0];
  const inputSt = { width: "100%", boxSizing: "border-box", padding: "9px 12px", border: "1px solid var(--line)", borderRadius: 4, background: "var(--card2)", font: "inherit", marginBottom: 8 };
  const pickAud = (k) => { setAudKey(k); const a = IG_TOOL_AUD.find((x) => x.key === k); setAud(a ? a.text : ""); };
  const build = () => {
    let t = p.tpl;
    if (p.aud) t = t.split("{aud}").join(aud.trim() || "[受眾描述]");
    p.slots.forEach((s) => {
      const v = String(vals[s.k] || (s.opts ? s.opts[0] : "")).trim();
      t = t.split("{" + s.k + "}").join(v || "[" + s.label + "]");
    });
    return t;
  };
  const copy = async () => {
    const t = build();
    let ok = false;
    try { await navigator.clipboard.writeText(t); ok = true; }
    catch (e) {
      try { const ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); ok = true; } catch (e2) {}
    }
    setMsg(ok ? "已複製！開一個 Claude 或 Gemini 對話貼上就能用" : "這個環境擋複製，請從下方預覽全選複製");
    setTimeout(() => setMsg(""), 4000);
  };
  return (
    <details className="dp-bulk">
      <summary>🧰 IG 攻略工具箱（8 個指令模板，填好一鍵複製）</summary>
      <p className="dp-import-sub">
        來自 @lifeditstudio 的 7 個成長指令＋Double Tap 留存技法。選指令、填空、按複製，貼到任何 AI 對話就能用；全程在本機組字串，<b>不呼叫 Gemini、不吃額度</b>。<br />
        攻略原文的提醒：真正讓帳號成長的不是指令，是連續 30 天每天執行。
      </p>
      <select value={pid} onChange={(e) => setPid(e.target.value)} style={inputSt}>
        {IG_TOOL_PROMPTS.map((x) => <option key={x.id} value={x.id}>{x.name}</option>)}
      </select>
      <p className="dp-hint" style={{ margin: "0 0 8px" }}>用途：{p.use}<br />時機：{p.when}<br />提示：{p.tip}</p>
      {p.aud && (
        <div>
          <select value={audKey} onChange={(e) => pickAud(e.target.value)} style={inputSt}>
            {IG_TOOL_AUD.map((a) => <option key={a.key} value={a.key}>受眾預設：{a.label}</option>)}
          </select>
          <textarea className="dp-ta" rows={2} placeholder="目標受眾描述（可直接改）" value={aud} onChange={(e) => setAud(e.target.value)} style={{ marginBottom: 8 }} />
        </div>
      )}
      {p.slots.map((s) => s.opts ? (
        <select key={s.k} value={vals[s.k] || s.opts[0]} onChange={(e) => setVals({ ...vals, [s.k]: e.target.value })} style={inputSt}>
          {s.opts.map((o) => <option key={o} value={o}>{s.label}：{o}</option>)}
        </select>
      ) : s.ta ? (
        <textarea key={s.k} className="dp-ta" rows={4} placeholder={s.label + "…（" + (s.ph || "") + "）"}
          value={vals[s.k] || ""} onChange={(e) => setVals({ ...vals, [s.k]: e.target.value })} style={{ marginBottom: 8 }} />
      ) : (
        <input key={s.k} placeholder={s.label + (s.ph ? "（" + s.ph + "）" : "")}
          value={vals[s.k] || ""} onChange={(e) => setVals({ ...vals, [s.k]: e.target.value })} style={inputSt} />
      ))}
      <div className="dp-ai-bar">
        <button className="dp-btn solid" onClick={copy}>複製完整指令</button>
        {msg && <span className="dp-hint">{msg}</span>}
      </div>
      <textarea className="dp-ta" rows={6} readOnly value={build()} style={{ marginTop: 8, opacity: .8 }} />
    </details>
  );

const SB_STYLES = {
  illu:    { label: "①插畫風", text: "Soft hand-drawn illustration, gentle outlines, light watercolor shading, cozy storybook style, subtle sparkles" },
  photo:   { label: "②寫實風", text: "Photorealistic macro photography, natural soft daylight, shallow depth of field, realistic textures" },

  mini:    { label: "⑤簡約風", text: "Minimalist style, clean composition, lots of negative space, muted flat colors, simple shapes, minimal detail, single clear subject, calm modern aesthetic" },
};
const SB_PALETTES = {
  charlotte_wu:       "warm terracotta and cream tones, cheerful everyday mood",
  charlottewu_write:  "ink-blue and cream tones, quiet calm desk mood",
  charlotte_handmade: "soft purple and cream tones, warm handmade mood",
  sororism:           "warm cream, gold and lavender palette, calm healing mood",
};
const SB_RULES = "Vertical 9:16 aspect ratio. No text, letters, numbers or logos anywhere in the image. If any person appears, show hands only, never the face. Clean, uncluttered composition.";
const SB_STYLE_KEY = "dp-sb-style"; // 風格是裝置偏好，存 localStorage、不進同步資料
// 貼上分鏡清單 → 拆成篇與格。header：「— 7/13｜手寫帳｜主題」；格：「0-3s 沾墨：scene（配色：…）」（配色段自動剝除，改用帳號固定配色）
function sbParse(text) {
  const acctMap = { "主帳": "charlotte_wu", "手寫帳": "charlottewu_write", "手作帳": "charlotte_handmade" };
  let year = new Date().getFullYear();
  let prevMonth = 0; // 追蹤上一篇的月份，遇到月份倒退（如 12→1）視為跨年、年份 +1
  const boards = []; let cur = null;
  String(text || "").split(/\r?\n/).forEach((raw) => {
    const line = raw.trim();
    if (!line) return;
    if (/^[—–\-]/.test(line)) {
      const parts = line.replace(/^[—–\-]+\s*/, "").split(/[｜|]/).map((s) => s.trim()).filter(Boolean);
      if (parts.length >= 2) {
        const m = parts[0].match(/(\d{1,2})\s*\/\s*(\d{1,2})/);
        let date = "";
        if (m) {
          const mo = parseInt(m[1], 10);
          if (prevMonth && mo < prevMonth) year++;
          prevMonth = mo;
          date = year + "-" + String(m[1]).padStart(2, "0") + "-" + String(m[2]).padStart(2, "0");
        }
        const acc = acctMap[parts[1]] || (/soror/i.test(parts[1]) ? "sororism" : "charlotte_wu");
        cur = { id: uid(), date, account: acc, title: parts.slice(2).join("｜") || parts[1], shots: [] };
        boards.push(cur);
      }
      return;
    }
    if (!cur) return;
    const sm = line.match(/^(\S+)\s+([^：:]+)[：:]\s*(.+)$/);
    if (!sm) return;
    const scene = sm[3].replace(/[（(]\s*配色\s*[：:][^）)]*[）)]\s*$/, "").trim();
    cur.shots.push({ id: uid(), t: sm[1], label: sm[2].trim(), scene, done: false });
  });
  boards.forEach((b) => {
    let n = 0;
    b.shots.forEach((sh) => { sh.code = /^P\d+$/i.test(sh.t) ? sh.t.toUpperCase() : "S" + (++n); });
  });
  return boards.filter((b) => b.shots.length);
}
const sbFname = (b, sh) => (b.date ? b.date.slice(5).replace("-", "") : "0000") + "_" + (sh.code || "S0");
const sbPrompt = (styleKey, b, sh) => {
  const st = SB_STYLES[styleKey] || SB_STYLES.illu;
  return st.text + ". " + sh.scene + ". Color palette: " + (SB_PALETTES[b.account] || SB_PALETTES.charlotte_wu) + ". " + SB_RULES;
};

function SBBoards({ state, update }) {

  const copyText = async (t, okMsg) => {
    let ok = false;
    try { await navigator.clipboard.writeText(t); ok = true; }
    catch (e) {
      try { const ta = document.createElement("textarea"); ta.value = t; document.body.appendChild(ta); ta.select(); document.execCommand("copy"); document.body.removeChild(ta); ok = true; } catch (e2) {}
    }

  };

    update({ sbBoards: (state.sbBoards || []).map((b) => b.id !== bid ? b : { ...b, shots: b.shots.map((s) => (s.id === sid ? { ...s, ...patch } : s)) }) });

        prompt 已自動組好：風格＋場景＋該帳號固定配色＋9:16／無文字／只拍手不露臉。全程本機組字串，<b>不呼叫 Gemini、不吃額度</b>。

      <div className="dp-ai-bar" style={{ flexWrap: "wrap" }}>

      {boards.filter((b) => showDone || b.shots.some((s) => !s.done)).map((b) => {
        const acc = igAccOf(b.account);

              <div key={sh.id} style={{ borderTop: "1px dashed var(--line)", padding: "6px 0", opacity: sh.done ? .55 : 1 }}>
                <label style={{ cursor: "pointer" }}>
                  <input type="checkbox" checked={!!sh.done} onChange={(e) => setShot(b.id, sh.id, { done: e.target.checked })} />
                  {" "}<b>{sbFname(b, sh)}</b>　{sh.t} {sh.label}
                </label>
                <button className="dp-btn" style={{ marginLeft: 8, padding: "1px 10px", fontSize: 12 }}
                  onClick={() => copyText(sbPrompt(styleKey, b, sh), "已複製 " + sbFname(b, sh) + " 的 prompt")}>複製這格</button>
                <div className="dp-hint" style={{ margin: "3px 0 0 22px" }}>{sh.scene}</div>

      {boards.length === 0 && <p className="dp-hint">還沒有分鏡：按下面「帶入內建 7/13–8/6 清單」再按「解析匯入」，或貼上新的分鏡清單。</p>}
      <details style={{ marginTop: 10 }}>
        <summary style={{ cursor: "pointer", fontSize: 13 }}>＋ 匯入分鏡清單</summary>
        <textarea className="dp-ta" rows={5} style={{ marginTop: 6 }}

          value={bulk} onChange={(e) => setBulk(e.target.value)} />
        <div className="dp-ai-bar">
          <button className="dp-btn solid" onClick={doImport}>解析匯入</button>

  );
}

// ─── 候選池匯出資料夾記憶（File System Access API；資料夾把手只能存 IndexedDB） ───
const POOL_DIR_KEY = "igPoolDir";
function poolDb() {
  return new Promise((res, rej) => {
    const rq = indexedDB.open("dp-fsa", 1);
    rq.onupgradeneeded = () => rq.result.createObjectStore("handles");
    rq.onsuccess = () => res(rq.result);
    rq.onerror = () => rej(rq.error);
  });
}
async function poolDirGet() {
  try {
    const db = await poolDb();
    return await new Promise((res) => {
      const rq = db.transaction("handles", "readonly").objectStore("handles").get(POOL_DIR_KEY);
      rq.onsuccess = () => res(rq.result || null);
      rq.onerror = () => res(null);
    });
  } catch (e) { return null; }
}
async function poolDirSet(h) {
  try {
    const db = await poolDb();
    return await new Promise((res) => {
      const rq = db.transaction("handles", "readwrite").objectStore("handles").put(h, POOL_DIR_KEY);
      rq.onsuccess = () => res(true);
      rq.onerror = () => res(false);
    });
  } catch (e) { return false; }
}

// ─── IG 現行進度：四帳排程單一真相，自動寫固定檔 ig_現行進度.json 給每日 8 點任務讀（2026-07-21） ───
async function autoExportSchedule(posts, opts) {
  opts = opts || {};
  if (!window.showDirectoryPicker) {
    if (opts.pick && window.appToast) window.appToast("這個環境不能直接寫資料夾（手機／file://）；請在電腦版 Edge 開 App 再匯出");
    return;
  }
  try {
    let dir = await poolDirGet();
    if (dir) {
      let perm = await dir.queryPermission({ mode: "readwrite" });
      if (perm !== "granted" && opts.pick) perm = await dir.requestPermission({ mode: "readwrite" });
      if (perm !== "granted") dir = null;
    }
    if (!dir) {
      if (!opts.pick) return;
      if (window.appToast) window.appToast("第一次使用：請選專案裡的「IG排程匯入」資料夾（只要選這一次，之後改排程就自動同步）");
      dir = await window.showDirectoryPicker({ id: "ig-pool", mode: "readwrite" });
      await poolDirSet(dir);
    }
    const active = (posts || []).filter((p) => p && p.status !== "已發");
    const payload = {
      schemaVersion: 1,
      source: "director-planner",
      exportedAt: todayISO(),
      posts: active.map((p) => ({ account: p.account, type: p.type, date: p.date, topic: p.topic, detail: p.detail || "", status: p.status || "草稿" })),
    };
    const fh = await dir.getFileHandle("ig_現行進度.json", { create: true });
    const w = await fh.createWritable();
    await w.write(JSON.stringify(payload, null, 2));
    await w.close();
    try { localStorage.setItem("director-planner-lastschedexport-v1", new Date().toISOString()); } catch (e) {}
    if (window.appToast) window.appToast("✓ 現行進度已同步（" + active.length + " 則待發）→ ig_現行進度.json", "sync", 3500);
  } catch (e) {
    if (e && e.name === "AbortError") return;
    if (opts.pick && window.appToast) window.appToast("匯出現行進度失敗，請再試一次或用電腦版 Edge");
  }
}
let _schedExportTimer = null;
function scheduleAutoExport(posts) {
  try { clearTimeout(_schedExportTimer); } catch (e) {}
  const snap = posts;
  _schedExportTimer = setTimeout(function () { autoExportSchedule(snap, { pick: false }); }, 800);
}

  };
  const schedule = (c) => {
    if (!c.date) { if (window.appToast) window.appToast("先選日期，才能排入行事曆"); return; }
    if (!c.topic.trim()) { if (window.appToast) window.appToast("先填主題，才能排入行事曆"); return; }
    if (c.status === "已排" || c.eventId) { if (window.appToast) window.appToast("這則已經排進行事曆了"); return; }
    const eventId = uid();
    const post = { id: uid(), account: c.account, type: c.type, date: c.date, topic: c.topic.trim(), status: "草稿", eventId, detail: c.detail || "", ideaId: c.ideaId || "" };
    const ev = {
      id: eventId, date: c.date, time: "",
      title: `IG・${igAccOf(c.account).label}：${post.topic}`,
      category: c.account === "sororism" ? "sororism" : "personal",
    };
    // 排入後卡片留在候選池、標「已排」（不再移除）：這樣不管先按哪則，自動同步的檔案都留得住，每日任務不會漏
    const nl = list.map((x) => (x.id === c.id ? { ...x, status: "已排", eventId } : x));
    update({ igPosts: [...state.igPosts, post], events: [...state.events, ev], igCandidates: nl });
    if (window.appToast) window.appToast("✓ 已排入 " + c.date + "，卡片留在候選池並標「已排」", "sync", 4000);
