            <input type="date" style={selSt} value={c.date} onChange={(e) => {
              const nl = list.map((x) => (x.id === c.id ? { ...x, date: e.target.value } : x));
              update({ igCandidates: nl });
              if (e.target.value) autoExportPool(nl);
            }} />
            <span className="dp-hint">{c.status}</span>
            <button className="dp-btn" onClick={() => schedule(c)} disabled={c.status === "已排" || !!c.eventId}>{c.status === "已排" || c.eventId ? "✓ 已排" : "加入已排"}</button>
            <button className="dp-x" onClick={() => del(c.id)}>✕</button>
          </div>
          <input style={{ ...selSt, width: "100%", boxSizing: "border-box", marginTop: 6 }} value={c.topic}
            placeholder="主題（可編輯）" onChange={(e) => setC(c.id, { topic: e.target.value })} />
          {c.detail && (
            <details style={{ marginTop: 5 }}>
              <summary className="dp-hint" style={{ cursor: "pointer" }}>構想細節（Hook／骨架／CTA／素材）</summary>
              <div className="dp-hint" style={{ whiteSpace: "pre-wrap", lineHeight: 1.7 }}>{c.detail}</div>
            </details>
          )}
        </div>
      ))}
    </details>
  );
}

function IG({ state, update }) {
  const [form, setForm] = useState({
    account: "charlotte_wu", type: "carousel", date: todayISO(), topic: "",
  });
  const [bulk, setBulk] = useState("");
  const [msg, setMsg] = useState("");

  const accKey = (s) => {
    if (!s) return "charlotte_wu";
    const t = String(s).toLowerCase();
    if (t.includes("write") || t.includes("手寫")) return "charlottewu_write";
    if (t.includes("handmade") || t.includes("手作") || t.includes("鉤") || t.includes("crochet")) return "charlotte_handmade";
    if (t.includes("soror") || t.includes("姊妹") || t.includes("水晶") || t.includes("香氛")) return "sororism";
    return "charlotte_wu";
  };
  const typeKey = (s) => {
    const t = String(s || "").toLowerCase();
    if (t.includes("reel") || t.includes("影")) return "reels";
    if (t.includes("story") || t.includes("限動") || t.includes("限時")) return "story";
    return "carousel";
  };

  const importBulk = () => {
    setMsg("");
    let arr;
    try {
      arr = parseJSON(bulk);
      if (!Array.isArray(arr)) throw new Error();
    } catch (e) {
      setMsg("格式看不懂。請貼我整理好的 JSON 清單。");
      return;
    }
    const posts = arr
      .filter((p) => p && (p.topic || p.title) && p.date)
      .map((p) => ({
        id: uid(),
        account: accKey(p.account),
        type: typeKey(p.type),
        date: String(p.date).slice(0, 10),
        topic: String(p.topic || p.title).trim(),
        detail: p.detail || p.script || "",
        status: "草稿",
      }));
    if (posts.length === 0) { setMsg("清單裡沒有可匯入的貼文。"); return; }
    // also drop a marker onto the calendar so posts show in 行事曆/今日
    // 連結行事曆：每則貼文配一個 eventId，刪除／還原時可一起處理
    const calEvents = posts.map((p) => {
      const eventId = uid();
      p.eventId = eventId;
      return {
        id: eventId, date: p.date, time: "",
        title: `IG・${igAccOf(p.account).label}：${p.topic}`,
        category: p.account === "sororism" ? "sororism" : "personal",
      };
    });
    const mergedPosts = [...state.igPosts, ...posts];
    const mergedEvents = [...state.events, ...calEvents];
    const keep = igKeptIds(mergedPosts);
    const finalPosts = mergedPosts.filter((p) => keep.has(p.id));
    const dropEv = new Set(mergedPosts.filter((p) => !keep.has(p.id)).map((p) => p.eventId).filter(Boolean));
    const removedN = mergedPosts.length - finalPosts.length;
    update({ igPosts: finalPosts, events: mergedEvents.filter((e) => !dropEv.has(e.id)) });
    setBulk("");
    setMsg(`匯入完成：排入 ${posts.length} 則${removedN > 0 ? `，並自動整理掉 ${removedN} 則重複（同帳號同主題只留最新）` : ""}，已同步到行事曆。`);
  };

  // 整批取代：清掉「清單裡出現過的帳號」現有的全部排程，再換成這次匯入的（其他帳號不動）
  const importReplace = async () => {
    setMsg("");
    let arr;
    try {
      arr = parseJSON(bulk);
      if (!Array.isArray(arr)) throw new Error();
    } catch (e) {
      setMsg("格式看不懂。請貼我整理好的 JSON 清單。");
      return;
    }
    const posts = arr
      .filter((p) => p && (p.topic || p.title) && p.date)
      .map((p) => ({
        id: uid(),
        account: accKey(p.account),
        type: typeKey(p.type),
        date: String(p.date).slice(0, 10),
        topic: String(p.topic || p.title).trim(),
        detail: p.detail || p.script || "",
        status: "草稿",
      }));
    if (posts.length === 0) { setMsg("清單裡沒有可匯入的貼文。"); return; }
    const accts = new Set(posts.map((p) => p.account));
    const accLabels = [...accts].map((a) => igAccOf(a).label).join("、");
    const oldOfAcct = state.igPosts.filter((p) => accts.has(p.account));
    if (oldOfAcct.length && !(await window.appConfirm(
      `整批取代會先刪掉「${accLabels}」現有的 ${oldOfAcct.length} 則排程，再換成這次的 ${posts.length} 則。其他帳號不受影響。確定嗎？`
    ))) return;
    const calEvents = posts.map((p) => {
      const eventId = uid();
      p.eventId = eventId;
      return {
        id: eventId, date: p.date, time: "",
        title: `IG・${igAccOf(p.account).label}：${p.topic}`,
        category: p.account === "sororism" ? "sororism" : "personal",
      };
    });
    // 刪掉舊貼文連動的行事曆（有 eventId 用 id，沒有的用「日期＋標題」比對）
    const dropEv = new Set(oldOfAcct.map((p) => p.eventId).filter(Boolean));
    const legacy = new Set(oldOfAcct.filter((p) => !p.eventId)
      .map((p) => `${p.date}|IG・${igAccOf(p.account).label}：${p.topic}`));
    const keptPosts = state.igPosts.filter((p) => !accts.has(p.account));
    const keptEvents = state.events.filter((e) => !dropEv.has(e.id) && !legacy.has(`${e.date}|${e.title}`));
    update({ igPosts: [...keptPosts, ...posts], events: [...keptEvents, ...calEvents] });
    setBulk("");
    setMsg(`整批取代完成：清掉「${accLabels}」舊的 ${oldOfAcct.length} 則，換成 ${posts.length} 則，已同步到行事曆。`);
  };

  const cleanDupes = () => {
    const keep = igKeptIds(state.igPosts);
    const removedN = state.igPosts.length - keep.size;
    if (removedN <= 0) { setMsg("沒有發現重複的貼文。"); return; }
    const dropEv = new Set(state.igPosts.filter((p) => !keep.has(p.id)).map((p) => p.eventId).filter(Boolean));
    update({ igPosts: state.igPosts.filter((p) => keep.has(p.id)), events: state.events.filter((e) => !dropEv.has(e.id)) });
    setMsg(`已整理：移除 ${removedN} 則重複（同帳號同主題只留日期最新的）。`);
  };

  const add = () => {
    if (!form.topic.trim()) return;
    const eventId = uid();
    const post = { id: uid(), ...form, topic: form.topic.trim(), status: "草稿", eventId };
    const ev = {
      id: eventId, date: form.date, time: "",
      title: `IG・${igAccOf(form.account).label}：${form.topic.trim()}`,
      category: form.account === "sororism" ? "sororism" : "personal",
    };
    update({ igPosts: [...state.igPosts, post], events: [...state.events, ev] });
    setForm({ ...form, topic: "" });
  };
  const cycle = (id) =>
    update({
      igPosts: state.igPosts.map((p) => {
        if (p.id !== id) return p;
        const order = ["草稿", "待發", "已發"];
        return { ...p, status: order[(order.indexOf(p.status) + 1) % 3] };
      }),
    });
  const del = async (id) => {
    if (!(await window.appConfirm("確定刪除這則 IG 貼文？行事曆上對應的那筆也會一起移除。"))) return;
    const post = state.igPosts.find((p) => p.id === id);
    let events = state.events;
    if (post) {
      if (post.eventId) {
        events = events.filter((e) => e.id !== post.eventId);
      } else {
        const legacyTitle = `IG・${igAccOf(post.account).label}：${post.topic}`;
        events = events.filter((e) => !(e.date === post.date && e.title === legacyTitle));
      }
    }
    update({ igPosts: state.igPosts.filter((p) => p.id !== id), events });
  };
  const setDetail = (id, detail) =>
    update({ igPosts: state.igPosts.map((p) => (p.id === id ? { ...p, detail } : p)) });
  const setPostDate = (id, date) => {
    if (!date) return;
    const post = state.igPosts.find((p) => p.id === id);
    const eid = post && post.eventId;
    update({
      igPosts: state.igPosts.map((p) => (p.id === id ? { ...p, date } : p)),
      events: eid ? state.events.map((e) => (e.id === eid ? { ...e, date } : e)) : state.events,
    });
  };

  const [filter, setFilter] = useState("all");
  const [openId, setOpenId] = useState(null);

  const sorted = [...state.igPosts]
    .map((p) => ({ ...p, account: IG_ACCOUNTS[p.account] ? p.account : "charlotte_wu" }))
    .filter((p) => filter === "all" || p.account === filter)
    // 一律依日期由舊到新（升冪）排列：整個 IG 內容行事曆由上而下＝早到晚，跟看月曆一致，不再有降冪
    .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  const active = sorted.filter((p) => p.status !== "已發");
  const published = sorted.filter((p) => p.status === "已發");

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">社群排程</div>
          <h1 className="dp-h1">IG 內容行事曆</h1>
        </div>
      </header>

      {/* account filter tabs */}
      <div className="dp-igfilter">
        <button className={"dp-igf" + (filter === "all" ? " on" : "")} onClick={() => setFilter("all")}>全部</button>
        {Object.entries(IG_ACCOUNTS).map(([k, v]) => (
          <button key={k} className={"dp-igf" + (filter === k ? " on" : "")} onClick={() => setFilter(k)}
            style={filter === k ? { background: v.color, borderColor: v.color, color: "var(--card2)" } : { color: v.color }}>
            <i style={{ background: v.color }} />{v.label}
          </button>
        ))}
      </div>

      <div className="dp-addbar ig">
        <select value={form.account} onChange={(e) => setForm({ ...form, account: e.target.value })}>
          {Object.entries(IG_ACCOUNTS).map(([k, v]) => <option key={k} value={k}>{v.label}</option>)}
        </select>
        <select value={form.type} onChange={(e) => setForm({ ...form, type: e.target.value })}>
          {Object.entries(POST_TYPES).map(([k, v]) => <option key={k} value={k}>{v}</option>)}
        </select>
        <input type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
        <input placeholder="貼文主題…" value={form.topic}
          onChange={(e) => setForm({ ...form, topic: e.target.value })}
          onKeyDown={(e) => e.key === "Enter" && add()} />
        <button className="dp-btn" onClick={add}>排程</button>
      </div>

      <details className="dp-bulk">
        <summary>批次匯入（把跟 Claude 規劃好的清單一次排入）</summary>
        <p className="dp-import-sub">
          在對話裡跟我一起規劃 IG 內容後，我會給你一段 JSON 清單，貼進下面按匯入。清單可含 detail 欄位（分鏡腳本），點貼文即可展開看。<br />
          ・<b>批次匯入</b>：附加到現有排程（同帳號同主題只留最新）。<br />
          ・<b>整批取代</b>：先清掉「清單裡出現的帳號」現有的全部排程，再換成這次的（其他帳號不動）。
        </p>
        <textarea className="dp-ta" rows={4}
          placeholder={'貼上清單，例如：\n[{"account":"sororism","type":"reels","date":"2026-07-01","topic":"品牌開箱","detail":"分鏡1：...\\n腳本：..."}]'}
          value={bulk} onChange={(e) => setBulk(e.target.value)} />
        <div className="dp-ai-bar">
          <button className="dp-btn solid" onClick={importBulk}>批次匯入</button>
          <button className="dp-btn" onClick={importReplace}>整批取代</button>
          {msg && <span className="dp-hint">{msg}</span>}
        </div>
      </details>

      <div className="dp-ai-bar" style={{ marginTop: 8 }}>
        <button className="dp-btn" onClick={() => autoExportSchedule(state.igPosts, { pick: true })}>⬇ 匯出現行進度（給每日任務）</button>
        <span className="dp-hint">四帳排程會自動寫進「IG排程匯入/ig_現行進度.json」，每日 8 點任務只讀這個檔。第一次按這顆選一次「IG排程匯入」資料夾即可，之後改排程就自動同步。</span>
      </div>

      <IGCandidates state={state} update={update} />

      <SBBoards state={state} update={update} />

      <IGToolbox />

      <div className="dp-ig-count">
        待發 <b>{active.length}</b> 則{published.length > 0 ? <>・已發 <b>{published.length}</b> 則</> : null}
        {filter === "all" && (() => {
          const tally = {};
          active.forEach((p) => { tally[p.account] = (tally[p.account] || 0) + 1; });
          return Object.entries(tally).map(([k, n]) => {
            const acc = IG_ACCOUNTS[k] || IG_ACCOUNTS.charlotte_wu;
            return <span key={k} style={{ marginLeft: 8, color: acc.color }}>● {acc.label} <b>{n}</b></span>;
          });
        })()}
      </div>

      {state.igPosts.length > 1 && (
        <div style={{ marginBottom: 12 }}>
          <button className="dp-btn" onClick={cleanDupes}>🧹 整理重複（同帳號同主題只留最新）</button>
        </div>
      )}

      <div className="dp-iglist">
        {active.length === 0 && <Empty>{filter === "all" ? "沒有待發的貼文（已發的收在下方）。" : "這個帳號沒有待發的貼文。"}</Empty>}
        {(() => {
          const months = [];
          const grouped = new Map();
          active.forEach((p) => {
            const ym = (p.date || "").slice(0, 7);
            if (!grouped.has(ym)) { grouped.set(ym, []); months.push(ym); }
            grouped.get(ym).push(p);
          });
          return months.map((ym) => {
            const [y, m] = ym.split("-");
            return (
              <div key={ym}>
                <div className="dp-ig-month">{y} 年 {parseInt(m, 10)} 月・{grouped.get(ym).length} 則</div>
                {grouped.get(ym).map((p) => (
          <div key={p.id} className="dp-igcard-wrap">
            <div className="dp-igcard" style={{ borderLeftColor: (IG_ACCOUNTS[p.account] || IG_ACCOUNTS.charlotte_wu).color }}
              onClick={() => setOpenId(openId === p.id ? null : p.id)}>
              <div className="dp-ig-date">{p.date.slice(5)}</div>
              <div className="dp-ig-mid">
                <div className="dp-ig-acc">{(IG_ACCOUNTS[p.account] || IG_ACCOUNTS.charlotte_wu).label}</div>
                <div className="dp-ig-topic">
                  <span className="dp-ig-type">{postTypeOf(p.type)}</span> {p.topic}
                </div>
              </div>
              <span className="dp-ig-caret">{openId === p.id ? "▲" : "▼"}</span>
              <button className={"dp-status " + p.status} onClick={(e) => { e.stopPropagation(); cycle(p.id); }}>{p.status}</button>
              <button className="dp-x" onClick={(e) => { e.stopPropagation(); del(p.id); }}>✕</button>
            </div>
            {openId === p.id && (
              <div className="dp-igdetail">
                <div style={{ marginBottom: 8, display: "flex", alignItems: "center", gap: 6, flexWrap: "wrap" }}>
                  <span style={{ fontWeight: 600 }}>發布日期</span>
                  <input type="date" value={p.date} onChange={(e) => setPostDate(p.id, e.target.value)} style={{ padding: "4px 8px", border: "1px solid var(--line)", borderRadius: 8, font: "inherit" }} />
                  <span className="dp-hint">改日期會一起移動行事曆那筆、並自動同步給每日任務</span>
                </div>
                <div className="dp-igdetail-h">當天詳細內容 · 分鏡 / 腳本</div>
                <textarea
                  className="dp-ta"
                  rows={7}
                  placeholder={"在這裡寫這則貼文的分鏡與腳本，例如：\n\n【開頭 hook】3秒內…\n【分鏡1】畫面：…／字卡：…\n【分鏡2】…\n【旁白/文案】…\n【音樂】…\n【主題標籤】#…"}
                  value={p.detail || ""}
                  onChange={(e) => setDetail(p.id, e.target.value)}
                />
                <span className="dp-hint">內容會自動儲存。也可請我幫你寫好分鏡腳本，再貼進來。</span>
              </div>
            )}
          </div>
                ))}
              </div>
            );
          });
        })()}
      </div>

      {published.length > 0 && (
        <details className="dp-done" style={{ marginTop: 16 }}>
          <summary>已發布 {published.length} 則（已歸入「完成紀錄」）</summary>
          {published.map((p) => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 4px", borderBottom: "1px dashed #e6e5e0", fontSize: 13.5 }}>
              <span className="dp-catdot" style={{ background: igAccOf(p.account).color }} />
              <b style={{ minWidth: 44 }}>{p.date.slice(5)}</b>
              <span style={{ flex: 1 }}><span className="dp-ig-type">{postTypeOf(p.type)}</span> {p.topic}</span>
              <button className="dp-btn" onClick={() => cycle(p.id)}>改回未發</button>
              <button className="dp-x" onClick={() => del(p.id)}>✕</button>
            </div>
          ))}
        </details>
      )}
    </div>
  );
}

      );
      const o = parseJSON(out);
      const idea = cleanIdea({ ...o, title: o.title || t.category, category: o.category || t.category }, t.source);
      if (!idea.summary.length && Array.isArray(t.summary)) idea.summary = t.summary.map(stripMd).filter(Boolean);
      idea.carded = true; // 轉譯成功即自動存卡
      const card = autoZettel(idea, state);
      update({ ideas: [idea, ...state.ideas], zettel: [card, ...state.zettel], trends: state.trends.map((x) => x.id === t.id ? { ...x, expanded: true } : x) });
      setExpandMsg({ id: t.id, text: "已生成發想卡（在下方），並自動存了一張卡進卡片盒。" });
    } catch (e) {
      const isKeyErr = e.message === "no_key" || e.message === "bad_key";
      setExpandMsg({ id: t.id, text: aiErrMsg(e, "發想"), keyErr: isKeyErr });
    }
    setExpandingId(null);
  };

  // 趨勢 → 卡片盒（永久筆記）。AI 精煉成「一個觀點」的卡，AI 不可用時用原文存卡不讓你卡住

      setCardMsg({ id: t.id, text: "卡片盒已有這筆的記錄了。" });

    }
    setCardingId(t.id); setCardMsg(null);
    const sumText = Array.isArray(t.summary) ? t.summary.join("\n") : (t.summary || "");
    const src2 = (t.source && t.source !== "未註明" && t.source !== "手動收藏") ? t.source : "";
    const mkCard = (o) => {
      const card = {
        id: uid(), num: String(state.zettel.length + 1), date: todayISO(), links: [],

        title: (o && o.title) || t.category || "未命名筆記",

        tags: (o && Array.isArray(o.tags) && o.tags.length) ? o.tags : [t.category].filter(Boolean),
      };
      update({
        zettel: [card, ...state.zettel],

      });
    };
    try {
      const out = await callClaude(
        "你是盧曼卡筆記法助理。把以下素材濃縮成一張『永久筆記』：一句精準的標題（陳述一個觀點，不是主題詞）、150 字內的精煉內容（用自己的話重寫，不照抄）、3-5 個標籤。只輸出 JSON：{\"title\":\"…\",\"content\":\"…\",\"tags\":[\"…\"]}",
        "分類：" + (t.category || "") + "\n來源：" + (t.source || "") + "\n重點：\n" + sumText

      mkCard(null);

  };

  const copyCmd = async (cat) => {

  const summarize = async () => {

function Journal({ state, update }) {
  const [date, setDate] = useState(todayISO());
  const [busy, setBusy] = useState(false);
  const [draft, setDraft] = useState("");
  const [err, setErr] = useState("");

  const dayEvents = state.events.filter((e) => e.date === date);
  const dayDone = state.todos.filter((x) => x.done && (x.doneAt === date || (!x.doneAt && date === todayISO())));
  const existing = state.journal.find((j) => j.date === date);

  const generate = async () => {
    setBusy(true); setErr(""); setDraft("");
    const material = {
      行程: dayEvents.map((e) => `${e.time || ""} ${e.title}（${catOf(e.category).label}）`),
      完成的待辦: dayDone.map((x) => x.text),
    };
    try {
      const out = await callClaude(
        "你是親子館館長的手帳助理。根據今天的行程與完成事項，幫她寫一段溫暖、精簡的手帳流水帳草稿，方便她照著抄進紙本手帳。分「工作」「個人」「心情/備註」三段，用繁體中文，語氣自然不浮誇。直接輸出文字即可。",
        JSON.stringify(material, null, 2)
      );
      setDraft(out);
    } catch (e) {
      setErr(aiErrMsg(e, "生成手帳草稿"));
    }
    setBusy(false);
  };

  const save = () => {
    const text = draft || existing?.text || "";
    if (!text.trim()) return;
    const others = state.journal.filter((j) => j.date !== date);
    update({ journal: [{ id: uid(), date, text }, ...others] });
    setDraft("");
  };

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">手帳流水帳</div>
          <h1 className="dp-h1">今天做了什麼</h1>
        </div>
        <input className="dp-jdate" type="date" value={date} onChange={(e) => setDate(e.target.value)} />
      </header>

      <div className="dp-jmat">
        <div className="dp-jmat-col">
          <span className="dp-jmat-h">今日行程</span>
          {dayEvents.length === 0 ? <em>無</em> : dayEvents.map((e) => (
            <div key={e.id} className="dp-jmat-i"><i style={{ background: catOf(e.category).dot }} />{e.title}</div>
          ))}
        </div>
        <div className="dp-jmat-col">
          <span className="dp-jmat-h">{date.slice(5)} 已完成事項</span>
          {dayDone.length === 0 ? <em>無</em> : dayDone.map((x) => (
            <div key={x.id} className="dp-jmat-i"><i style={{ background: "var(--sub)" }} />{x.text}</div>
          ))}
        </div>
      </div>

      <div className="dp-ai-bar gen">
        <button className="dp-btn solid" disabled={busy} onClick={generate}>
          {busy ? "AI 撰寫中…" : "✦ 生成手帳草稿"}
        </button>
        {err && <span className="dp-err">{err}</span>}
      </div>

      {(draft || existing) && (
        <div className="dp-jpaper">
          <VoiceRecorder onResult={(t) => setDraft((p) => p + t)} />
          <textarea
            className="dp-jtext"
            rows={10}
            value={draft || existing?.text || ""}
            onChange={(e) => setDraft(e.target.value)}
          />
          <div className="dp-ai-bar">
            <button className="dp-btn" onClick={save}>存進手帳</button>
            <span className="dp-hint">存好後可照著抄進紙本，或留作數位備份。</span>
          </div>
        </div>
      )}

      {state.journal.length > 0 && (
        <details className="dp-done">
          <summary>過往手帳 {state.journal.length} 篇</summary>
          {state.journal.map((j) => (
            <div key={j.id} className="dp-jpast">
              <b>{j.date}</b>
              <pre>{j.text}</pre>
            </div>
          ))}
        </details>
      )}
    </div>
  );
}

// ─── B 版：四域轉譯所網址讀取（直接讀取 → 公開轉文字服務備援 → 人工貼全文） ───
const URL_READ = {
  TIMEOUT_MS: 15000,   // 單次讀取逾時（毫秒）
  MIN_CHARS: 300,      // 低於此字數視為「內容過短」
  MAX_CHARS: 45000,    // 送 AI 的正文上限，超過會截斷並明確標示
  FALLBACK_NAME: "Jina Reader（公開網頁轉文字服務）",
  FALLBACK_PREFIX: "https://r.jina.ai/", // 備援只會收到使用者貼的公開網址本身，絕不夾帶 API Key 或本機資料
};
// 網址驗證：只收公開 http(s)；擋 file:/javascript:/data:/blob:、localhost 與私人網段
function validateFetchUrl(str) {
  const s = String(str || "").trim();
  if (!s) return { ok: false, msg: "請先貼上網址" };
  let u;
  try { u = new URL(s); } catch (e) { return { ok: false, msg: "網址格式錯誤，請貼完整的公開網址（https://…）" }; }
  if (u.protocol !== "https:" && u.protocol !== "http:") return { ok: false, msg: "只支援 http(s) 公開網頁，不接受 " + u.protocol + " 連結" };
  const h = u.hostname.toLowerCase();
  const priv = h === "localhost" || h === "0.0.0.0" || h === "::1" || /\.local$/.test(h)
    || /^127\./.test(h) || /^10\./.test(h) || /^192\.168\./.test(h)
    || /^172\.(1[6-9]|2\d|3[01])\./.test(h) || /^169\.254\./.test(h);
  if (priv) return { ok: false, msg: "這是內部／本機網址，只能讀公開網頁" };
  return { ok: true, url: u, warn: u.protocol === "http:" ? "此網址未加密（http），請留意來源" : "" };
}
function squeezeText(t) {
  return String(t || "").replace(/\r/g, "").replace(/[　 \t]+/g, " ").replace(/\s*\n\s*/g, "\n").replace(/\n{3,}/g, "\n\n").trim();
}
// HTML → 正文純文字（DOMParser 不會執行 script；擷取結果只當純文字處理）
function htmlToArticle(html) {
  const doc = new DOMParser().parseFromString(html, "text/html");
  const meta = (sel, attr) => { const el = doc.querySelector(sel); const v = el && el.getAttribute(attr); return (v || "").trim(); };
  const tEl = doc.querySelector("title");
  const title = (tEl ? tEl.textContent.trim() : "") || meta('meta[property="og:title"]', "content") || "";
  const author = meta('meta[name="author"]', "content") || meta('meta[property="article:author"]', "content") || "";
  const published = meta('meta[property="article:published_time"]', "content") || meta('meta[name="date"]', "content") || "";
  doc.querySelectorAll("script,style,noscript,iframe,svg,form,nav,footer,header,aside,button").forEach((el) => el.remove());
  const rootEl = doc.querySelector("article") || doc.querySelector("main") || doc.body;
  return { title, author, published, text: squeezeText(rootEl ? rootEl.textContent : "") };
}
function fetchUrlTO(u, ms) {
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), ms);
  return fetch(u, { signal: ctrl.signal }).finally(() => clearTimeout(timer));
}
// 辨識「防機器人驗證頁／登入牆／付費牆」——讀到的不是正文而是這種攔阻頁時，直接講清楚要改貼全文
const BLOCK_TITLE_RE = /just a moment|attention required|access denied|security check|please wait|請稍候|驗證中|安全性驗證/i;
const BLOCK_BODY_RE = /performing security verification|checking (if the site connection is secure|your browser)|enable javascript (and|&|、|and enable )?cookies|verify (that )?you are (a )?human|you are not a bot|needs to review the security of your connection|cf-browser-verification|人機驗證|請完成(人機|安全性?)?驗證|請先?登入(才能|後)?|log ?in to (continue|view|read)|sign in to (continue|view|read)|members? only|patrons? only|for patrons|訂閱後即可|付費.{0,4}(閱讀|觀看|解鎖)/i;
// 短內容才用 body 特徵判定，避免長篇正文剛好提到「登入／captcha」被誤殺
function looksBlocked(title, text) {
  if (BLOCK_TITLE_RE.test(String(title || ""))) return true;
  const b = String(text || "");
  return b.length < 800 && BLOCK_BODY_RE.test(b);
}
// 三級讀取的前兩級：直接讀 → 備援讀（第三級＝人工貼全文，走原本的文字欄）
async function readUrlSmart(href) {
  let out = null;
  try {
    const res = await fetchUrlTO(href, URL_READ.TIMEOUT_MS);
    if (res.ok) {
      const ct = (res.headers.get("content-type") || "").toLowerCase();
      if (ct.includes("text/html")) {
        const art = htmlToArticle(await res.text());
        if (art.text.length >= 40 && !looksBlocked(art.title, art.text)) out = { readStatus: "direct", ...art };
      } else if (ct.includes("text/plain") || ct.includes("markdown")) {
        out = { readStatus: "direct", title: "", author: "", published: "", text: squeezeText(await res.text()) };
      }
    }
  } catch (e) { /* 多半是 CORS 或逾時 → 走備援 */ }
  if (!out) {
    let res2;
    try { res2 = await fetchUrlTO(URL_READ.FALLBACK_PREFIX + href, URL_READ.TIMEOUT_MS + 10000); }
    catch (e) { throw new Error("直接讀取被擋，備援服務也連不上（可能離線或服務暫時故障）"); }
    if (!res2.ok) throw new Error("直接讀取被擋，備援服務讀不到這頁（可能是登入牆／付費牆，App 不會繞過權限）");
    const md = await res2.text();
    const m = md.match(/^Title:\s*(.+)$/m);
    const bodyIdx = md.indexOf("Markdown Content:");
    out = { readStatus: "fallback", title: m ? m[1].trim() : "", author: "", published: "",
      text: squeezeText(bodyIdx >= 0 ? md.slice(bodyIdx + 17) : md) };
  }
  // 讀到的其實是「防機器人驗證頁／登入牆／付費牆」而非正文——講清楚，別讓她以為是自己弄錯
  if (looksBlocked(out.title, out.text)) {
    throw new Error("這個網站需登入或有防機器人驗證（Cloudflare／付費牆），無法自動讀取");
  }
  let truncated = false;
  if (out.text.length > URL_READ.MAX_CHARS) { out.text = out.text.slice(0, URL_READ.MAX_CHARS); truncated = true; }
  return { ...out, truncated };
}

// ─── B 版 AI 轉譯 prompt（修正舊版「三個個人 IG」設定；兩階段呼叫避免巨型 JSON 截斷） ───
const IDEA_SYS_B1 =
  "你是季芸（Charlotte）的知識轉譯助手。她是連江縣馬祖南竿的親子館館長，另經營個人品牌與三姊妹品牌 Sororism。閱讀提供的文章，完成「來源查核＋攻略萃取＋四域轉譯」。只輸出 JSON 物件，禁止 markdown 與任何其他文字。"
  + "規則：1)嚴禁虛構：來源沒講的填「來源未說明」，不得補寫數據、案例或演算法規則；2)每條攻略標 evidenceType：「來源事實」=頁面明確陳述、「作者主張」=作者經驗或看法、「AI推論」=你延伸的應用；3)四個領域全部評估，不適用就寫不適用＋原因，禁止硬湊；4)只留能改變行動的攻略 1-4 條，每條只含一個核心觀念；5)全部繁體中文台灣用語，禁止簡體字與中國用語。"
  + "四域定義：D1=AI×親子館/館務管理（公務：活動、SOP、服務、評鑑；不得替私人品牌導流）；D2=個人進修/AI能力（學習方法、AI工作流、判斷框架、效率工具）；D3=個人品牌/內容經營（手帳、旅行、生活敘事、社群經營）；D4=三姊妹事業Sororism（水晶/香氛蠟燭/生命靈數/塔羅的品牌、產品、變現；不得做醫療療效或保證改運宣稱）。"
  + "JSON 欄位：{\"title\":\"本次轉譯主題短名\",\"category\":\"從 AI動態/社群潮流/親子教育/經營管理/個人成長/其他 擇一\",\"sourceMeta\":{\"evidenceLevel\":\"A|B|C|D\",\"sourceType\":\"官方文件|研究|新聞|教學文|個人經驗|銷售頁|其他\",\"author\":\"從內文署名/自介/品牌名找出作者，找不到填 無法確認，不得猜測\",\"publishedAt\":\"內文明確可見的發布日期，沒有就填 無法確認\"},\"insights\":[{\"claim\":\"一句話攻略主張\",\"evidenceType\":\"來源事實|作者主張|AI推論\",\"conditions\":\"適用條件\",\"risks\":\"風險或反例\"}],\"domains\":[{\"code\":\"D1\",\"name\":\"親子館\",\"fit\":\"高|中|低|不適用\",\"reason\":\"真實連結或不適用原因\",\"ideas\":[\"具體做法\"],\"nextAction\":\"30分鐘內可啟動的最小行動\",\"deliverable\":\"預期產物\"},{\"code\":\"D2\",\"name\":\"個人進修\",...},{\"code\":\"D3\",\"name\":\"個人品牌\",...},{\"code\":\"D4\",\"name\":\"Sororism\",...}],\"actions\":[\"2-4個下一步\"],\"method\":\"一句話點出可複用的底層方法\"}。evidenceLevel 判準：A=官方文件/原始研究、B=可追溯來源的專業整理、C=創作者經驗主張、D=銷售頁或來源不明。";
const IDEA_SYS_B2 =
  "你是季芸的 IG 內容策略助手。根據攻略原子與四域轉譯結果，評估她四個 IG 帳號的適配度。只輸出 JSON 物件，禁止 markdown。"
  + "四帳定位：charlotte_wu=個人主帳（馬祖親子館館長的生活/旅遊/開箱/反差人設）；charlottewu_write=手寫/鋼筆/墨水/文具（POV手部、試寫輪播）；charlotte_handmade=鉤織車縫手作（目前暫緩發文，內容先入庫備用）；sororism=三姊妹身心靈品牌 @sororism_studio（水晶/香氛蠟燭/生命靈數/塔羅；三姊妹沒有同住，不出同框內容；不得做醫療療效或保證改運宣稱）。"
  + "評分量尺（五項各 0-2 分，加總 0-10）：定位一致(0無關/1間接/2核心)、受眾價值(0無/1有趣不急/2解決明確問題)、素材可得(0無/1需額外製作/2現有素材可做)、商業或策略連結(0無/1間接/2明確)、風險(0高/1可控/2低)。總分 8-10=優先製作、5-7=候選、0-4=暫不使用；「優先製作」最多 2 個帳號。"
  + "「優先製作」與「候選」給完整內容包；「暫不使用」只需 reason。hooks 禁止捏造數字或成效，全部繁體中文台灣用語。"
  + "JSON：{\"accountPlans\":[{\"account\":\"charlotte_wu|charlottewu_write|charlotte_handmade|sororism\",\"score\":0,\"decision\":\"優先製作|候選|暫不使用\",\"reason\":\"…\",\"goal\":\"觸及|收藏|分享|留言|信任|名單|銷售\",\"bestFormat\":\"carousel|reels|story\",\"hooks\":[\"3個開場\"],\"outline\":[\"內容節點\"],\"cta\":\"單一CTA\",\"assets\":[\"需要素材\"],\"monetizationPath\":\"合理承接，沒有就寫 先累積信任\",\"verificationNeeded\":[\"待查證\"],\"risk\":\"風險\"}]}（四個帳號都要出現在陣列裡）";

// B 版轉譯結果清洗：向後相容——summary/branches 由 insights/domains 映射，舊畫面與心智圖照常運作
function cleanIdeaB(o, meta) {
  const arr = (a) => (Array.isArray(a) ? a : []);
  const insights = arr(o.insights).map((i) => ({
    claim: stripMd(i && i.claim),
    evidenceType: ["來源事實", "作者主張", "AI推論"].includes(i && i.evidenceType) ? i.evidenceType : "作者主張",
    conditions: stripMd(i && i.conditions),
    risks: stripMd(i && i.risks),
  })).filter((i) => i.claim);
  const domains = arr(o.domains).map((d) => ({
    code: stripMd(d && d.code) || "",
    name: stripMd(d && d.name),
    fit: ["高", "中", "低", "不適用"].includes(d && d.fit) ? d.fit : "不適用",
    reason: stripMd(d && d.reason),
    ideas: arr(d && d.ideas).map(stripMd).filter(Boolean),
    nextAction: stripMd(d && d.nextAction),
    deliverable: stripMd(d && d.deliverable),
  }));
  const plans = arr(meta.plans).map((p) => ({
    account: IG_ACCOUNTS[p && p.account] ? p.account : "",
    score: Math.max(0, Math.min(10, Number(p && p.score) || 0)),
    decision: ["優先製作", "候選", "暫不使用"].includes(p && p.decision) ? p.decision : "暫不使用",
    reason: stripMd(p && p.reason),
    goal: stripMd(p && p.goal),
    bestFormat: POST_TYPES[p && p.bestFormat] ? p.bestFormat : "carousel",
    hooks: arr(p && p.hooks).map(stripMd).filter(Boolean),
    outline: arr(p && p.outline).map(stripMd).filter(Boolean),
    cta: stripMd(p && p.cta),
    assets: arr(p && p.assets).map(stripMd).filter(Boolean),
    monetizationPath: stripMd(p && p.monetizationPath),
    verificationNeeded: arr(p && p.verificationNeeded).map(stripMd).filter(Boolean),
    risk: stripMd(p && p.risk),
  })).filter((p) => p.account);
  const sm = o.sourceMeta || {};
  return {
    id: uid(), date: todayISO(),
    title: stripMd(o.title) || "未命名轉譯",
    source: meta.src || "手動貼入",
    category: o.category || "其他",
    sourceInfo: {
      url: meta.url || "",
      title: meta.pageTitle || "",
      author: (meta.author && meta.author !== "無法確認") ? meta.author : (stripMd(sm.author) || "無法確認"),
      publishedAt: (meta.published && meta.published !== "無法確認") ? meta.published : (stripMd(sm.publishedAt) || "無法確認"),
      readStatus: meta.readStatus || "manual",
      evidenceLevel: ["A", "B", "C", "D"].includes(sm.evidenceLevel) ? sm.evidenceLevel : "C",
      sourceType: sm.sourceType || "其他",
      truncated: !!meta.truncated,
    },
    insights, domains, accountPlans: plans,
    summary: insights.map((i) => i.claim),
    branches: domains.filter((d) => d.fit !== "不適用").map((d) => ({ area: d.name || d.code, ideas: d.ideas })),
    actions: arr(o.actions).map(stripMd).filter(Boolean),
    method: stripMd(o.method),
    carded: true,
  };
}
// B 版卡片盒：一張來源索引卡＋每個攻略原子一張概念卡（最多 3 張），用 links 建立雙向連結
function autoZettelB(idea, curState) {
  let n = curState.zettel.length;
  const srcId = uid();
  const ins = (idea.insights || []).slice(0, 3);
  const insCards = ins.map((i) => {
    n += 1;
    return {
      id: uid(), num: String(n), date: todayISO(), links: [srcId], type: "permanent",
      title: i.claim.slice(0, 60),
      content: "【" + i.evidenceType + "】" + i.claim
        + (i.conditions ? "\n適用條件：" + i.conditions : "")
        + (i.risks ? "\n風險／反例：" + i.risks : ""),
      tags: [idea.category, "轉譯所"].filter(Boolean),
    };
  });
  n += 1;
  const srcCard = {
    id: srcId, num: String(n), date: todayISO(), links: insCards.map((c) => c.id), type: "permanent",
    title: "來源索引：" + idea.title,
    content: (idea.method ? "🔑 " + idea.method + "\n" : "")
      + "證據等級：" + ((idea.sourceInfo && idea.sourceInfo.evidenceLevel) || "C")
      + (ins.length ? "\n攻略原子：\n" + insCards.map((c) => "・" + c.title).join("\n") : "")
      + ((idea.sourceInfo && idea.sourceInfo.url) ? "\n\n來源：" + idea.sourceInfo.url
        : (idea.source && idea.source !== "手動貼入" ? "\n\n來源：" + idea.source : "")),
    tags: [idea.category, "轉譯所", "來源卡"].filter(Boolean),
  };
  return [...insCards, srcCard];
}

// ─── IDEAS (四域轉譯所：收集資訊 → 轉譯成四個領域的發想) ──────
const BR_COLORS = ["var(--brand)", "#9C6FA6", "var(--accent)", "var(--blue)", "var(--gold)"];

// 發想卡欄位清洗：統一去掉 AI 夾帶的 markdown 記號
function cleanIdea(o, fallbackSrc) {
  return {
    id: uid(), date: todayISO(),
    title: stripMd(o.title) || "未命名發想",
    source: fallbackSrc || o.source || "手動收藏",
    category: o.category || "其他",
    summary: (Array.isArray(o.summary) ? o.summary : (o.summary ? [o.summary] : [])).map(stripMd).filter(Boolean),
    branches: (Array.isArray(o.branches) ? o.branches : []).map((b) => ({
      area: stripMd(b && b.area),
      ideas: Array.isArray(b && b.ideas) ? b.ideas.map(stripMd).filter(Boolean) : [],
    })),
    actions: (Array.isArray(o.actions) ? o.actions : []).map(stripMd).filter(Boolean),
    method: stripMd(o.method),
  };
}
// 發想成功 → 不多呼叫 AI，直接用現成摘要自動存一張卡片盒永久筆記（省額度、避免冷卻）
function autoZettel(idea, curState) {
  return {
    id: uid(), num: String(curState.zettel.length + 1), date: todayISO(), links: [],
    type: "permanent",
    title: idea.title,
    content: (idea.method ? "🔑 " + idea.method + "\n" : "") + (idea.summary || []).join("\n")
      + (idea.source && idea.source !== "手動收藏" ? "\n\n來源：" + idea.source : ""),
    tags: [idea.category, "轉譯所"].filter(Boolean),
  };
}

function Ideas({ state, update, go }) {
  const [raw, setRaw] = useState("");
  const [src, setSrc] = useState("");
  const [busy, setBusy] = useState(false);
  const [err, setErr] = useState("");
  const [ok, setOk] = useState("");
  const [paste, setPaste] = useState("");
  // B 版網址讀取狀態
  const [url, setUrl] = useState("");
  const [reading, setReading] = useState(false);
  const [urlStatus, setUrlStatus] = useState("");
  const [urlTitle, setUrlTitle] = useState("");
  const [readInfo, setReadInfo] = useState(null); // { readStatus, truncated, author, published }
  const [page, setPage] = useState(1); // 發想卡分頁（每頁 10 則，卡片多了捲軸才不會縮成一小條）

  const doReadUrl = async () => {
    const v = validateFetchUrl(url);
    if (!v.ok) { setUrlStatus("⚠ " + v.msg); return; }
    if (typeof navigator !== "undefined" && navigator.onLine === false) { setUrlStatus("⚠ 目前離線：讀取網址需要網路，可先改貼全文。"); return; }
    setReading(true); setReadInfo(null); setUrlTitle("");
    setUrlStatus("讀取中…（直接讀取被擋時會自動改走備援服務）");
    try {
      const r = await readUrlSmart(v.url.href);
      setRaw(r.text);
      setSrc(v.url.href);
      setUrlTitle(r.title || "（無法確認標題）");
      setReadInfo(r);
      if (r.text.length < URL_READ.MIN_CHARS) {
        setUrlStatus("⚠ 只讀到 " + r.text.length + " 字，可能沒抓到正文——請檢查下方文字，不足就改貼全文。");
      } else {
        setUrlStatus("✓ " + (r.readStatus === "direct" ? "直接讀取成功" : "已透過" + URL_READ.FALLBACK_NAME + "讀取")
          + "，擷取 " + r.text.length + " 字" + (r.truncated ? "（超過上限已截斷，僅會分析前段）" : "")
          + (v.warn ? "；" + v.warn : "") + "。請先確認下方正文再開始轉譯。");
      }
    } catch (e) {
      setUrlStatus("✗ 無法自動讀取：" + e.message + "。請把文章正文貼到下方欄位，網址會保留作為來源。");
      setSrc(url.trim());
    }
    setReading(false);
  };
  const clearUrl = () => { setUrl(""); setUrlStatus(""); setUrlTitle(""); setReadInfo(null); };

  // 舊格式匯入沿用（title/summary/branches…）
  const commit = (o) => {
    const idea = cleanIdea(o, src);
    idea.carded = true;
    const card = autoZettel(idea, state);
    update({ ideas: [idea, ...state.ideas], zettel: [card, ...state.zettel] });
    setOk("發想完成！已自動用摘要存一張卡進卡片盒（沒有多耗 AI 額度）。");
  };
  // B 版：來源查核＋攻略原子＋四域＋四帳
  const commitB = (o, plans, planErr) => {
    const idea = cleanIdeaB(o, {
      plans: plans,
      src: src,
      url: readInfo ? src : "",
      pageTitle: urlTitle,
      readStatus: readInfo ? readInfo.readStatus : "manual",
      truncated: !!(readInfo && readInfo.truncated),
      author: (readInfo && readInfo.author) || "無法確認",
      published: (readInfo && readInfo.published) || "無法確認",
    });
    const cards = autoZettelB(idea, state);
    update({ ideas: [idea, ...state.ideas], zettel: [...cards, ...state.zettel] });
    setOk("轉譯完成！已建立 " + cards.length + " 張卡片（攻略原子＋來源索引，已互相連結）"
      + (planErr ? "；四帳適配這次沒成功，可再按一次或請對話裡的我補。" : "，四帳適配已完成，可在卡片上加入 IG 候選池。"));
  };

  const generate = async () => {
    if (!raw.trim()) return;
    if (raw.trim().length < URL_READ.MIN_CHARS && !(await window.appConfirm("目前正文只有 " + raw.trim().length + " 字，轉譯結果可能不可靠。仍要繼續嗎？"))) return;
    setBusy(true); setErr(""); setOk("");
    try {
      const head = (urlTitle ? "網頁標題：" + urlTitle + "\n" : "") + (src ? "來源：" + src + "\n" : "")
        + (readInfo && readInfo.truncated ? "注意：正文已截斷，以下僅為前段。\n" : "") + "\n";
      const o1 = parseJSON(await callClaude(IDEA_SYS_B1, head + raw));
      let plans = []; let planErr = false;
      try {
        const o2 = parseJSON(await callClaude(IDEA_SYS_B2,
          "主題：" + (o1.title || "") + "\n攻略原子與四域結果：\n" + JSON.stringify({ insights: o1.insights, domains: o1.domains })));
        plans = (o2 && o2.accountPlans) || [];
      } catch (e2) { planErr = true; }
      commitB(o1, plans, planErr);
      setRaw(""); setSrc(""); clearUrl();
    } catch (e) {
      setErr(aiErrMsg(e, "轉譯"));
    }
    setBusy(false);
  };

  const importPaste = () => {
    if (!paste.trim()) return;
    setErr(""); setOk("");
    try {
      const data = parseJSON(paste);
      const arr = Array.isArray(data) ? data : [data];
      let ideas = state.ideas, zettel = state.zettel, nNew = 0, nCards = 0;
      arr.forEach((o) => {
        if (!o || typeof o !== "object") return;
        if (Array.isArray(o.insights) || Array.isArray(o.accountPlans)) {
          const s = o.source || {};
          const idea = cleanIdeaB(o, {
            plans: o.accountPlans || [],
            src: s.url || s.title || "",
            url: s.url || "",
            pageTitle: s.title || "",
            readStatus: s.readStatus || "manual",
            truncated: !!s.truncated,
            author: s.author || "無法確認",
            published: s.publishedAt || "無法確認",
          });
          const cards = autoZettelB(idea, { zettel: zettel });
          ideas = [idea, ...ideas]; zettel = [...cards, ...zettel];
          nNew += 1; nCards += cards.length;
        } else {
          const idea = cleanIdea(o, "");
          idea.carded = true;
          const card = autoZettel(idea, { zettel: zettel });
          ideas = [idea, ...ideas]; zettel = [card, ...zettel];
          nNew += 1; nCards += 1;
        }
      });
      if (!nNew) throw new Error("empty");
      update({ ideas: ideas, zettel: zettel });
      setOk("已匯入 " + nNew + " 張轉譯卡＋" + nCards + " 張卡片盒卡片。");
      setPaste("");
    } catch (e) {
      setErr("格式不對，請貼我給你的發想／轉譯 JSON（單張或整批陣列都可以）。");
    }
  };

  const del = async (id) => {
    if (!(await window.appConfirm("確定刪除這張發想卡片？"))) return;
    update({ ideas: state.ideas.filter((i) => i.id !== id) });
  };

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">四域轉譯所</div>
          <h1 className="dp-h1">把資訊轉譯成四個領域的養分</h1>
        </div>
      </header>

      <div className="dp-ai">
        <div className="dp-ai-t">✦ 網址 / 全文 → 來源查核 → 四域轉譯 → 四帳適配</div>
        <p className="dp-ai-sub">貼公開文章網址按「讀取網址」，或直接把全文貼進下方欄位（永遠可用的備援）。部分網站因登入、付費牆或安全限制無法自動讀取，改貼全文即可。</p>
        <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
          <input className="dp-src" style={{ flex: "1 1 200px" }} placeholder="公開文章網址（https://…）"
            value={url} onChange={(e) => setUrl(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && !reading && doReadUrl()} />
          <button className="dp-btn" disabled={reading} onClick={doReadUrl}>{reading ? "讀取中…" : (readInfo || urlStatus ? "重新讀取" : "讀取網址")}</button>
          {(url || urlStatus) && !reading && <button className="dp-btn" onClick={clearUrl}>清除網址</button>}
        </div>
        {urlStatus && <p className="dp-hint" style={{ margin: "6px 0 0", whiteSpace: "pre-wrap" }}>{urlStatus}</p>}
        {urlTitle && <p className="dp-hint" style={{ margin: "2px 0 0" }}>網頁標題：{urlTitle}</p>}
        <input className="dp-src" placeholder="來源（讀取網址成功會自動帶入；手動貼文時選填）"
          value={src} onChange={(e) => setSrc(e.target.value)} />
        <textarea className="dp-ta" rows={6} placeholder="文章正文（讀取網址成功會自動填入；可先檢查、修改，AI 只會分析這個欄位的文字）…"
          value={raw} onChange={(e) => setRaw(e.target.value)} />
        {raw.trim().length > 0 && <p className="dp-hint" style={{ margin: "2px 0 6px" }}>正文 {raw.trim().length} 字{readInfo && readInfo.truncated ? "（已截斷，僅分析前段）" : ""}</p>}
        <div className="dp-ai-bar">
          <button className="dp-btn solid" disabled={busy || reading} onClick={generate}>
            {busy ? "AI 轉譯中…（兩階段，稍等一下）" : "開始四域轉譯"}
          </button>
          {err && <span className="dp-err">{err}</span>}
          {ok && !err && <span className="dp-hint">{ok}</span>}
        </div>
      </div>

      <details className="dp-bulk">
        <summary>匯入發想（貼我在對話裡做好的發想）</summary>
        <p className="dp-import-sub">在對話裡請我發想後，我會給你一段 JSON，貼進這裡按匯入，就會變成下方的卡片／心智圖。</p>
        <textarea className="dp-ta" rows={4} placeholder='貼上發想 JSON…'
          value={paste} onChange={(e) => setPaste(e.target.value)} />
        <div className="dp-ai-bar">
          <button className="dp-btn solid" onClick={importPaste}>匯入發想</button>
        </div>
      </details>

      <details className="dp-bulk">
        <summary>📡 資訊收集區（一鍵搜尋指令・收藏重點 {state.trends.length} 則・電子報追蹤 {state.emails.length}）</summary>
        <Trends state={state} update={update} go={go} />
      </details>

      {(() => {
        const PER = 10;
        const total = Math.max(1, Math.ceil(state.ideas.length / PER));
        const cur = Math.min(page, total);
        const shown = state.ideas.slice((cur - 1) * PER, cur * PER);
        const goPage = (n) => { setPage(n); try { window.scrollTo({ top: 0, behavior: "smooth" }); } catch (e) { window.scrollTo(0, 0); } };
        const pager = state.ideas.length > PER ? (
          <div className="dp-ai-bar" style={{ justifyContent: "center", flexWrap: "wrap", margin: "10px 0" }}>
            <button className="dp-btn" disabled={cur <= 1} onClick={() => goPage(cur - 1)}>← 上一頁</button>
            <span className="dp-hint">第 {cur}／{total} 頁・共 {state.ideas.length} 則</span>
            <button className="dp-btn" disabled={cur >= total} onClick={() => goPage(cur + 1)}>下一頁 →</button>
          </div>
        ) : null;
        return (
          <div className="dp-ideas">
            {pager}
            {state.ideas.length === 0 && <Empty>還沒有任何發想。貼一篇電子報，或請對話裡的我幫你發想。</Empty>}
            {shown.map((idea) => <IdeaCard key={idea.id} idea={idea} onDel={() => del(idea.id)} state={state} update={update} />)}
            {pager}
          </div>
        );
      })()}
    </div>
  );
}

// 通用復盤問題框架（AI 復盤工作流 SKILL）
const REVIEW_Q = [
  { col: "keep",    q: "這次最順利、最值得保留的是什麼？" },
  { col: "keep",    q: "哪個環節讓你最有成就感，或收到好的回饋？" },
  { col: "improve", q: "哪裡卡住了、或結果不如預期？你覺得原因是什麼？" },
  { col: "improve", q: "如果重來一次，你會改變哪一個做法？" },
  { col: "next",    q: "下一次具體要做的第一件事是什麼？" },
];

function IdeaCard({ idea, onDel, state, update }) {
  const [layout, setLayout] = useState("card");
  const [review, setReview] = useState(null); // 正在復盤的主題字串
  const [carding, setCarding] = useState(false);
  const [cardMsg, setCardMsg] = useState("");
  const [upgrading, setUpgrading] = useState(false);
  const [upMsg, setUpMsg] = useState("");

  const myReviews = state.reviews.filter((r) => r.ideaId === idea.id);

  const saveReview = (r) => {
    update({ reviews: [{ ...r, id: uid(), ideaId: idea.id, date: todayISO() }, ...state.reviews] });
    setReview(null);
  };
  const importActions = (acts) => {
    const todos = acts.filter(Boolean).map((t) => ({ id: uid(), text: t, owner: "", due: "", priority: "中", done: false }));
    if (todos.length) update({ todos: [...todos, ...state.todos] });
  };
  const delReview = (id) => update({ reviews: state.reviews.filter((r) => r.id !== id) });

  // B 版：把某帳號的實戰方案放進 IG 候選池（不動既有排程；日期由 charlotte 在 IG 分頁決定）
  const addCandidate = (p) => {
    if ((state.igCandidates || []).some((cc) => cc.ideaId === idea.id && cc.account === p.account)) {
      if (window.appToast) window.appToast("這個帳號的構想已經在候選池了");
      return;
    }
    const c = {
      id: uid(), account: p.account,
      type: POST_TYPES[p.bestFormat] ? p.bestFormat : "carousel",
      topic: idea.title, date: "", status: "構想", ideaId: idea.id,
      detail: (p.hooks && p.hooks.length ? "Hook 候選：\n" + p.hooks.map((h, j) => (j + 1) + ". " + h).join("\n") + "\n\n" : "")
        + (p.outline && p.outline.length ? "內容骨架：\n" + p.outline.join("\n") + "\n\n" : "")
        + (p.cta ? "CTA：" + p.cta + "\n" : "")
        + (p.assets && p.assets.length ? "素材：" + p.assets.join("、") + "\n" : "")
        + (p.monetizationPath ? "變現承接：" + p.monetizationPath + "\n" : "")
        + (p.verificationNeeded && p.verificationNeeded.length ? "⚠ 待查證：" + p.verificationNeeded.join("、") + "\n" : "")
        + (p.risk ? "風險：" + p.risk + "\n" : "")
        + (idea.sourceInfo && idea.sourceInfo.url ? "來源：" + idea.sourceInfo.url : ""),
    };
    update({ igCandidates: [c, ...(state.igCandidates || [])] });
    if (window.appToast) window.appToast("已加入 IG 候選池，到「IG 排程」分頁編輯／選日期");
  };
  // D1/D2 等領域的最小行動 → 一鍵變待辦（D1 親子館自動標公務），這是四域中非 IG 領域的實際產出出口
  const addDomainTodo = (d) => {
    const text = "【" + ((d.code || "") + (d.name ? " " + d.name : "")).trim() + "】" + d.nextAction
      + (d.deliverable ? "（產物：" + d.deliverable + "）" : "");
    if ((state.todos || []).some((t) => t.text === text)) {
      if (window.appToast) window.appToast("這條行動已經在待辦清單了");
      return;
    }
    const todo = { id: uid(), text: text, owner: "", due: "", priority: "中", done: false, scope: d.code === "D1" ? "work" : "personal", catId: "" };
    update({ todos: [todo, ...state.todos] });
    if (window.appToast) window.appToast("已加入待辦（" + (d.code === "D1" ? "公務" : "私人") + "），到「待辦」分頁安排時間");
  };
  // 下一步行動整批 → 待辦（自動去重）
  const actionsToTodos = () => {
    const news = (idea.actions || []).filter((a) => a && !(state.todos || []).some((t) => t.text === a));
    if (!news.length) { if (window.appToast) window.appToast("這些行動已經都在待辦清單了"); return; }
    const todos = news.map((a) => ({ id: uid(), text: a, owner: "", due: "", priority: "中", done: false, scope: "personal", catId: "" }));
    update({ todos: [...todos, ...state.todos] });
    if (window.appToast) window.appToast("已把 " + todos.length + " 條行動加入待辦");
  };

  // B 版：把舊格式卡就地升級成新格式（用既有摘要重跑四域＋四帳；原文不可考，證據上限＝作者主張）
  const upgrade = async () => {
    setUpgrading(true); setUpMsg("");
    try {
      const digest = "標題：" + idea.title
        + "\n來源標註：" + (idea.source || "")
        + "\n重點摘要：\n" + (idea.summary || []).map((s) => "・" + s).join("\n")
        + ((idea.branches || []).length ? "\n先前聯想：\n" + idea.branches.map((b) => b.area + "：" + (b.ideas || []).join("、")).join("\n") : "")
        + (idea.method ? "\n底層方法：" + idea.method : "");
      const o1 = parseJSON(await callClaude(IDEA_SYS_B1,
        "注意：以下不是文章原文，是先前整理的重點摘要，原文已不可考。因此 insights 的 evidenceType 禁止使用「來源事實」，只能用「作者主張」或「AI推論」；sourceMeta.author 請從「來源標註」欄找出作者或平台名。\n\n" + digest));
      let plans = []; let planErr = false;
      try {
        const o2 = parseJSON(await callClaude(IDEA_SYS_B2,
          "主題：" + (o1.title || idea.title) + "\n攻略原子與四域結果：\n" + JSON.stringify({ insights: o1.insights, domains: o1.domains })));
        plans = (o2 && o2.accountPlans) || [];
      } catch (e2) { planErr = true; }
      const looksUrl = /^https?:\/\//.test(idea.source || "");
      const up = cleanIdeaB(o1, {
        plans: plans, src: idea.source || "",
        url: looksUrl ? idea.source : "",
        pageTitle: "", readStatus: "partial", truncated: false,
        author: "無法確認", published: "無法確認",
      });
      // 保留原卡 id／日期（復盤紀錄跟著 id 走），不重複建卡片盒卡
      update({ ideas: state.ideas.map((x) => x.id === idea.id
        ? { ...up, id: idea.id, date: idea.date, title: up.title || idea.title, carded: true } : x) });
      setUpMsg(planErr ? "已升級（四帳適配沒成功，可再按一次補跑）" : "已升級成新格式！");
    } catch (e) {
      setUpMsg(aiErrMsg(e, "升級"));
    }
    setUpgrading(false);
  };
  // 只補跑第二階段（四帳適配）：升級或轉譯時第二段失敗、卡片有原子沒適配時用
  const retryPlans = async () => {
    setUpgrading(true); setUpMsg("");
    try {
      const o2 = parseJSON(await callClaude(IDEA_SYS_B2,
        "主題：" + idea.title + "\n攻略原子與四域結果：\n" + JSON.stringify({ insights: idea.insights, domains: idea.domains })));
      // 借 cleanIdeaB 的清洗規則洗 accountPlans（其餘欄位不用）
      const plans = cleanIdeaB({}, { plans: (o2 && o2.accountPlans) || [] }).accountPlans;
      if (!plans.length) throw new Error("AI 沒有回傳有效的四帳適配，請再試一次");
      update({ ideas: state.ideas.map((x) => x.id === idea.id ? { ...x, accountPlans: plans } : x) });
      setUpMsg("四帳適配完成！");
    } catch (e) {
      setUpMsg(aiErrMsg(e, "四帳適配"));
    }
    setUpgrading(false);
  };

  // 手動「AI 精煉存卡片盒」：發想時已自動存過一張原文卡，這顆是要 AI 濃縮成觀點卡時才按
  const toCard = async () => {
    if (idea.carded && !(await window.appConfirm("這張發想已經有對應的卡片了，要再用 AI 精煉一張觀點卡存進卡片盒嗎？"))) return;
    setCarding(true); setCardMsg("");
    const sumText = (idea.summary || []).join("\n");
    const src2 = (idea.source && idea.source !== "手動收藏") ? idea.source : "";
    const mk = (o) => {
      const card = {
        id: uid(), num: String(state.zettel.length + 1), date: todayISO(), links: [],
        type: "permanent",
        title: stripMd(o && o.title) || idea.title,
        content: (stripMd(o && o.content) || sumText) + (src2 ? "\n\n來源：" + src2 : ""),
        tags: (o && Array.isArray(o.tags) && o.tags.length) ? o.tags.map(stripMd) : [idea.category].filter(Boolean),
      };
      update({ zettel: [card, ...state.zettel], ideas: state.ideas.map((x) => x.id === idea.id ? { ...x, carded: true } : x) });
    };
    try {
      const out = await callClaude(
        "你是盧曼卡筆記法助理。把以下素材濃縮成一張『永久筆記』：一句精準的標題（陳述一個觀點，不是主題詞）、150 字內的精煉內容（用自己的話重寫，不照抄）、3-5 個標籤。輸出純文字 JSON，禁止 markdown：{\"title\":\"…\",\"content\":\"…\",\"tags\":[\"…\"]}",
        "主題：" + idea.title + "\n方法：" + (idea.method || "") + "\n重點：\n" + sumText
      );
      mk(parseJSON(out));
      setCardMsg("已用 AI 精煉存進卡片盒。");
    } catch (e) {
      if (idea.carded) {
        setCardMsg(aiErrMsg(e, "精煉"));
      } else {
        mk(null);
        setCardMsg("AI 無法精煉，先用原文存了一張卡。");
      }
    }
    setCarding(false);
  };

  const Leaf = ({ text, color }) => (
    <button className="dp-leaf-btn" style={{ borderColor: (color || "#ccc") + "55" }} onClick={() => setReview(text)}>
      <span>{text}</span><i className="dp-leaf-go">復盤</i>
    </button>
  );

  return (
    <div className="dp-idea">
      <div className="dp-idea-top">
        <span className="dp-tcat">{idea.category}</span>
        <span className="dp-tsrc">{(() => {
          const si = idea.sourceInfo;
          if (!si || (!si.url && (!si.author || si.author === "無法確認"))) return idea.source;
          let host = "";
          try { host = si.url ? new URL(si.url).hostname.replace(/^www\./, "") : ""; } catch (e) {}
          const au = (si.author && si.author !== "無法確認") ? si.author : "";
          return host && au ? host + "｜" + au : (host || au || idea.source);
        })()}</span>
        <span className="dp-tdate">{idea.date.slice(5)}</span>
        <div className="dp-idea-seg">
          <button className={layout === "card" ? "on" : ""} onClick={() => setLayout("card")}>卡片</button>
          <button className={layout === "tree" ? "on" : ""} onClick={() => setLayout("tree")}>心智圖</button>
        </div>
        <button className="dp-x" onClick={onDel}>✕</button>
      </div>

      <h3 className="dp-idea-title">{idea.title}</h3>
      <p className="dp-idea-tip">💡 點任一個聯想方框，就能用復盤框架引導你自己思考。</p>

      {idea.sourceInfo && (idea.sourceInfo.url || idea.sourceInfo.readStatus) && (
        <p className="dp-hint" style={{ margin: "0 0 8px" }}>
          📎 {idea.sourceInfo.url
            ? <a href={idea.sourceInfo.url} target="_blank" rel="noreferrer">{idea.sourceInfo.title || idea.sourceInfo.url}</a>
            : (idea.sourceInfo.title || "手動貼入")}
          {(() => { try { return idea.sourceInfo.url ? "｜" + new URL(idea.sourceInfo.url).hostname.replace(/^www\./, "") : ""; } catch (e) { return ""; } })()}
          ｜作者：{idea.sourceInfo.author || "無法確認"}
          ｜讀取：{({ direct: "直接讀取", fallback: "備援服務", manual: "手動貼入", partial: "部分" })[idea.sourceInfo.readStatus] || idea.sourceInfo.readStatus}
          ｜證據等級 {idea.sourceInfo.evidenceLevel}
          {idea.sourceInfo.truncated ? "｜⚠ 正文曾截斷，結果不代表完整文章" : ""}
        </p>
      )}

      {layout === "card" ? (
        <>
          {Array.isArray(idea.insights) && idea.insights.length > 0 && (
            <div className="dp-idea-sec">
              <div className="dp-idea-h">攻略原子（實＝來源事實・主＝作者主張・推＝AI推論）</div>
              {idea.insights.map((i, k) => (
                <div key={k} className="dp-idea-sum">
                  <b>{({ "來源事實": "實", "作者主張": "主", "AI推論": "推" })[i.evidenceType] || "主"}</b>
                  <span>{i.claim}
                    {i.conditions ? "（適用：" + i.conditions + "）" : ""}
                    {i.risks ? "｜風險：" + i.risks : ""}</span>
                </div>
              ))}
            </div>
          )}
          {!(idea.insights && idea.insights.length) && idea.summary.length > 0 && (
            <div className="dp-idea-sec">
              <div className="dp-idea-h">重點摘要</div>
              {idea.summary.map((s, i) => (
                <div key={i} className="dp-idea-sum"><b>{i + 1}</b><span>{s}</span></div>
              ))}
            </div>
          )}
          {idea.branches.length > 0 && (
            <div className="dp-idea-sec">
              <div className="dp-idea-h">可以用在哪（點方框開始復盤）</div>
              <div className="dp-idea-grid">
                {idea.branches.map((b, i) => (
                  <div key={i} className="dp-idea-br" style={{ borderLeftColor: BR_COLORS[i % BR_COLORS.length] }}>
                    <div className="dp-idea-area" style={{ color: BR_COLORS[i % BR_COLORS.length] }}>{b.area}</div>
                    {(b.ideas || []).map((x, j) => <Leaf key={j} text={x} color={BR_COLORS[i % BR_COLORS.length]} />)}
                  </div>
                ))}
              </div>
            </div>
          )}
          {Array.isArray(idea.domains) && idea.domains.length > 0 && (
            <div className="dp-idea-sec">
              <div className="dp-idea-h">四域評估（不適用也標明原因）</div>
              {idea.domains.map((d, k) => (
                <div key={k} className="dp-idea-sum" style={d.fit === "不適用" ? { opacity: .55 } : null}>
                  <b>{d.code || k + 1}</b>
                  <span>{d.name}｜適配 {d.fit}
                    {d.fit === "不適用"
                      ? (d.reason ? "：" + d.reason : "")
                      : (d.nextAction ? "｜最小行動：" + d.nextAction : "")}
                    {d.fit !== "不適用" && d.deliverable ? "｜產物：" + d.deliverable : ""}</span>
                  {d.fit !== "不適用" && d.nextAction ? (
                    <button className="dp-btn" style={{ marginLeft: 6, padding: "2px 9px", fontSize: 12, flexShrink: 0 }}
                      onClick={() => addDomainTodo(d)}>→ 待辦</button>
                  ) : null}
                </div>
              ))}
            </div>
          )}
          {Array.isArray(idea.accountPlans) && idea.accountPlans.length > 0 && (
            <div className="dp-idea-sec">
              <div className="dp-idea-h">四帳適配（優先 {idea.accountPlans.filter((p) => p.decision === "優先製作").length}・候選 {idea.accountPlans.filter((p) => p.decision === "候選").length}）</div>
              {idea.accountPlans.map((p, k) => {
                const acc = IG_ACCOUNTS[p.account] || { label: p.account, color: "var(--muted)" };
                if (p.decision === "暫不使用") {
                  return (
                    <div key={k} className="dp-idea-sum" style={{ opacity: .55 }}>
                      <b>{p.score}</b><span>{acc.label}｜暫不使用{p.reason ? "：" + p.reason : ""}</span>
                    </div>
                  );
                }
                return (
                  <details key={k} style={{ margin: "5px 0", border: "1px solid var(--line)", borderRadius: 4, padding: "7px 11px", borderLeft: "3px solid " + acc.color, background: "var(--card2)" }}>
                    <summary style={{ cursor: "pointer", fontSize: "13.5px" }}>
                      {acc.label}｜{p.decision}（{p.score} 分）｜{postTypeOf(p.bestFormat)}{p.goal ? "｜目標：" + p.goal : ""}
                    </summary>
                    <div className="dp-hint" style={{ whiteSpace: "pre-wrap", marginTop: 6, lineHeight: 1.7 }}>
                      {(p.reason ? "為什麼這帳：" + p.reason + "\n" : "")
                        + (p.hooks && p.hooks.length ? "Hook 三案：\n" + p.hooks.map((h, j) => "　" + (j + 1) + ". " + h).join("\n") + "\n" : "")
                        + (p.outline && p.outline.length ? "內容骨架：" + p.outline.join(" → ") + "\n" : "")
                        + (p.cta ? "CTA：" + p.cta + "\n" : "")
                        + (p.assets && p.assets.length ? "素材：" + p.assets.join("、") + "\n" : "")
                        + (p.monetizationPath ? "變現承接：" + p.monetizationPath + "\n" : "")
                        + (p.verificationNeeded && p.verificationNeeded.length ? "⚠ 待查證：" + p.verificationNeeded.join("、") + "\n" : "")
                        + (p.risk ? "風險：" + p.risk : "")}
                    </div>
                    {(() => {
                      const inPosts = (state.igPosts || []).some((pp) => pp.ideaId === idea.id && pp.account === p.account);
                      if (inPosts) return <span className="dp-hint" style={{ display: "inline-block", marginTop: 7 }}>✓ 已排入行事曆</span>;
                      const inPool = (state.igCandidates || []).some((cc) => cc.ideaId === idea.id && cc.account === p.account);
                      if (inPool) return <span className="dp-hint" style={{ display: "inline-block", marginTop: 7 }}>✓ 已在候選池（到 IG 分頁排期）</span>;
                      return <button className="dp-btn" style={{ marginTop: 7 }} onClick={() => addCandidate(p)}>＋ 加入 IG 候選池</button>;
                    })()}
                  </details>
                );
              })}
            </div>
          )}
          {idea.actions.length > 0 && (
            <div className="dp-idea-sec">
              <div className="dp-idea-h">下一步行動
                <button className="dp-btn" style={{ marginLeft: 8, padding: "2px 9px", fontSize: 12 }} onClick={actionsToTodos}>＋ 全部轉待辦</button>
              </div>
              {idea.actions.map((a, i) => (
                <div key={i} className="dp-idea-act"><span className="dp-idea-box" />{a}</div>
              ))}
            </div>
          )}
          {idea.method && (
            <div className="dp-idea-method"><b>🔑 底層方法</b>{idea.method}</div>
          )}
        </>
      ) : (
        <div className="dp-tree">
          <div className="dp-tree-core">{idea.title}</div>
          <div className="dp-tree-stem" />
          <div className="dp-tree-branches">
            {idea.branches.map((b, i) => (
              <div key={i} className="dp-tree-br">
                <div className="dp-tree-area" style={{ background: BR_COLORS[i % BR_COLORS.length] }}>{b.area}</div>
                {(b.ideas || []).map((x, j) => <Leaf key={j} text={x} color={BR_COLORS[i % BR_COLORS.length]} />)}
              </div>
            ))}
          </div>
          {idea.method && <div className="dp-tree-method"><b>🔑 最有價值的底層方法</b><span>{idea.method}</span></div>}
        </div>
      )}

      <div className="dp-ai-bar">

// 復盤框架元件（一題一題訪談 / 一次列出 可切換）
function parseQuestions(text) {
  // 接受 JSON [{col,q}]，或每行「保留｜問題」「改進｜問題」「下次｜問題」
  const t = text.trim();
  try {
    const arr = JSON.parse(t.replace(/```json|```/g, "").trim());
    if (Array.isArray(arr)) {
      const out = arr.map((x) => ({ col: x.col || "keep", q: x.q || x.question || "" })).filter((x) => x.q);
      if (out.length) return out;
    }
  } catch (e) { /* not JSON */ }
  const map = { "保留": "keep", "改進": "improve", "改善": "improve", "下次": "next", "下次行動": "next", "行動": "next" };
  const lines = t.split("\n").map((l) => l.trim()).filter(Boolean);
  const out = [];
  lines.forEach((l) => {
    const m = l.match(/^[【\[]?\s*(保留|改進|改善|下次行動|下次|行動)\s*[】\]｜|:：]\s*(.+)$/);
    if (m) out.push({ col: map[m[1]] || "keep", q: m[2].trim() });
    else out.push({ col: "keep", q: l.replace(/^\d+[.、)]\s*/, "") });
  });
  return out;
}

// [[標題]] 連結目標比對：先精確、再不分大小寫；同名多卡取建立日期最早（同日取列表靠前）
function findCardByTitle(cards, title) {
  const t = String(title || "").trim();
  if (!t) return null;
  let hits = cards.filter((c) => (c.title || "").trim() === t);
  if (!hits.length) hits = cards.filter((c) => (c.title || "").trim().toLowerCase() === t.toLowerCase());
  if (!hits.length) return null;
  if (hits.length === 1) return hits[0];
  return hits.reduce((best, c) => ((c.date || "") < (best.date || "") ? c : best), hits[0]);
}
const ZTYPE = {

  // 標籤依使用次數排序（常用在前），列表預設只顯示前 12 個

      update({ zettel: [full, ...state.zettel] });
    }

  const submitForm = () => {

      tags: form.tags.split(/[,，、\s]+/).filter(Boolean) }, linkTo);

  // 自動：用 AI 從一段文字產生永久筆記卡（標題＋精煉內容＋標籤）

  const importPaste = () => {

  const del = async (id) => {

    update({ zettel: state.zettel.filter((c) => c.id !== id) });
    setSel(null);
  };
  const toggleLink = (fromId, toId) => update({
    zettel: state.zettel.map((c) => c.id === fromId
      ? { ...c, links: (c.links || []).includes(toId) ? c.links.filter((x) => x !== toId) : [...(c.links || []), toId] }
      : c),
  });

  // AI 找關聯：只給「建議＋理由」，按「接受」才真正建立連結（AI 建議、人做決定）
  const aiLink = async () => {
    if (cards.length < 2) { setLinkMsg("至少要有兩張卡片才能找關聯。"); return; }
    setLinking(true); setLinkMsg(""); setLinkSugs(null);
    try {
      const items = cards.map((c, i) => ({ n: i + 1, title: c.title || "", content: (c.content || "").slice(0, 200), tags: c.tags || [] }));
      const out = await callClaude(
        "你是盧曼卡筆記法助理。以下是若干張筆記卡（每張有編號 n、標題、內容、標籤）。找出彼此「概念相關、值得互相連結」的配對，並用一句話（25 字內，繁體中文）說明為什麼相關。只輸出 JSON 陣列，每項 {\"a\":編號, \"b\":編號, \"why\":\"理由\"}。只挑真正相關的，不要硬湊；沒有就回 []。",
        JSON.stringify(items)
      );
      const pairs = parseJSON(out);
      const sugs = []; const seen = new Set();
      (Array.isArray(pairs) ? pairs : []).forEach((pr) => {
        const A = cards[(Number(pr.a) || 0) - 1], B = cards[(Number(pr.b) || 0) - 1];
        if (!A || !B || A.id === B.id) return;
        const key = [A.id, B.id].sort().join("|");
        if (seen.has(key)) return; seen.add(key);
        if ((A.links || []).includes(B.id)) return; // 已連過的不再建議
        sugs.push({ aId: A.id, bId: B.id, aTitle: A.title, bTitle: B.title, why: String(pr.why || "").trim() });
      });
      if (sugs.length === 0) setLinkMsg("沒有發現新的關聯可建議。");
      else { setLinkSugs(sugs); setLinkMsg("AI 找到 " + sugs.length + " 組可能的關聯，按「接受」才會建立連結。"); }
    } catch (e) { setLinkMsg(aiErrMsg(e, "自動連結")); }
    setLinking(false);
  };
  const acceptSug = (s) => {
    update({ zettel: state.zettel.map((c) => {
      if (c.id === s.aId) return { ...c, links: Array.from(new Set([...(c.links || []), s.bId])) };
      if (c.id === s.bId) return { ...c, links: Array.from(new Set([...(c.links || []), s.aId])) };
      return c;
    }) });
    setLinkSugs((ls) => (ls || []).filter((x) => x !== s));
  };
  const dismissSug = (s) => setLinkSugs((ls) => (ls || []).filter((x) => x !== s));
  const acceptAllSugs = () => {
    const ls = linkSugs || [];
    const linkSet = {};
    state.zettel.forEach((c) => { linkSet[c.id] = new Set(c.links || []); });
    ls.forEach((s) => { if (linkSet[s.aId] && linkSet[s.bId]) { linkSet[s.aId].add(s.bId); linkSet[s.bId].add(s.aId); } });
    update({ zettel: state.zettel.map((c) => ({ ...c, links: Array.from(linkSet[c.id]) })) });
    setLinkSugs(null); setLinkMsg("已建立 " + ls.length + " 組連結。");
  };

  // 一鍵摘要：長卡片濃縮成 2-3 句，寫進卡片頂部引用區（可刪、可重摘）
  const aiSummarize = async (card) => {
