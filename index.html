        (card.title ? "標題：" + card.title + "\n" : "") + String(card.content || "")
      );
      const txt = String(out || "").trim();
      if (!txt) throw new Error("empty");
      update({ zettel: state.zettel.map((c) => c.id === card.id ? { ...c, aiSummary: txt } : c) });
    } catch (e) { setSumMsg(aiErrMsg(e, "摘要")); }
    setSumBusy(false);
  };
  const delSummary = (card) => update({ zettel: state.zettel.map((c) => c.id === card.id ? { ...c, aiSummary: "" } : c) });

  // 週回顧：把最近 7 天新增的卡片餵給 AI，產出「本週你在想什麼」存成索引卡
  const weekReview = async () => {
    const since = new Date(Date.now() - 7 * 86400000).toISOString().slice(0, 10);
    const recent = cards.filter((c) => (c.date || "") >= since && !(c.tags || []).includes("週回顧"));
    if (recent.length === 0) { setWkMsg("最近 7 天沒有新卡片，先寫幾張再回顧。"); return; }
    setWkBusy(true); setWkMsg("");
    try {
      const items = recent.map((c) => ({ title: c.title || "", content: (c.content || "").slice(0, 150), tags: c.tags || [] }));
      const out = await callClaude(
        "你是親子館館長 Charlotte 的第二大腦回顧教練。以下是她最近 7 天新增的筆記卡。用 200 字內的繁體中文寫一段「本週你在想什麼」：點出 2-3 個主要思考軸線、它們之間可能的關聯、以及一個值得下週追的問題。語氣像朋友聊天，不要條列、不要開場白。只輸出這段文字。",
        JSON.stringify(items)
      );
      const txt = String(out || "").trim();
      if (!txt) throw new Error("empty");
      const title = "週回顧 " + todayISO().replace(/-/g, "/");
      const exist = cards.find((c) => (c.title || "") === title);
      if (exist) {
        update({ zettel: state.zettel.map((c) => c.id === exist.id ? { ...c, content: txt } : c) });
        setWkMsg("今天的週回顧已更新（同一天重按會覆寫內容）。");
      } else {
        addCard({ type: "index", title, content: txt, tags: ["週回顧"] });
        setWkMsg("週回顧完成，已存成索引卡「" + title + "」，可再編輯。");
      }
    } catch (e) { setWkMsg(aiErrMsg(e, "週回顧")); }
    setWkBusy(false);
  };

  // ── [[標題]] 雙向連結：內容裡的 [[卡片標題]] 變成可點連結；缺卡可即時建立；改標題連動更新 ──
  const renderWiki = (text) => {
    const s = String(text || "");
    const re = /\[\[([^\[\]]+)\]\]/g;
    const parts = []; let last = 0; let mt;
    while ((mt = re.exec(s))) {
      if (mt.index > last) parts.push(s.slice(last, mt.index));
      const t = mt[1].trim();
      const hit = findCardByTitle(cards, t);
      parts.push(
        <a key={"wl" + parts.length} className={"dp-wikilink" + (hit ? "" : " missing")}
          title={hit ? "開啟卡片" : "還沒有這張卡，點擊建立"}
          onClick={(e) => { e.preventDefault(); openWiki(t); }}>{t}</a>
      );
      last = re.lastIndex;
    }
    if (last < s.length) parts.push(s.slice(last));
    return parts;
  };
  const openWiki = async (title) => {
    const hit = findCardByTitle(cards, title);
    if (hit) { setSel(hit.id); return; }
    if (!(await window.appConfirm("還沒有「" + title + "」這張卡，要建立新卡嗎？"))) return;
    const full = { id: uid(), num: nextNum(), date: todayISO(), links: sel ? [sel] : [], type: "permanent", title: title, content: "", tags: [] };
    update({ zettel: [full, ...state.zettel.map((c) => c.id === sel ? { ...c, links: Array.from(new Set([...(c.links || []), full.id])) } : c)] });
    setSel(full.id);
  };
  const renameCard = async (card) => {
    const oldT = (card.title || "").trim();
    const nt = window.prompt("修改卡片標題：", card.title || "");
    if (nt == null) return;
    const newT = nt.trim();
    if (!newT || newT === oldT) return;
    const token = "[[" + oldT + "]]";
    const referers = oldT ? cards.filter((c) => c.id !== card.id && String(c.content || "").includes(token)) : [];
    const updateRefs = referers.length > 0 && (await window.appConfirm("有 " + referers.length + " 張卡片用 " + token + " 連到這張，要一併把連結文字改成 [[" + newT + "]] 嗎？"));
    update({ zettel: state.zettel.map((c) => {
      if (c.id === card.id) return { ...c, title: newT };
      if (updateRefs && String(c.content || "").includes(token)) return { ...c, content: String(c.content).split(token).join("[[" + newT + "]]") };
      return c;
    }) });
  };

  // ── 編輯卡片內容／標籤／類型（標題用「✏ 改標題」，會連動更新 [[連結]]）──
  const startEdit = (card) => setEditForm({ id: card.id, content: card.content || "", tags: (card.tags || []).join(", "), type: card.type || "permanent" });
  const saveEdit = () => {
    if (!editForm) return;
    update({ zettel: state.zettel.map((c) => c.id === editForm.id
      ? { ...c, content: editForm.content, type: editForm.type, tags: editForm.tags.split(/[,，、\s]+/).filter(Boolean) }
      : c) });
    setEditForm(null);
  };
  const fleetingCount = cards.filter((c) => (c.type || "") === "fleeting").length;

  // AI 連結建議面板（卡片／心智圖兩個視圖共用）
  const sugPanel = (linkSugs && linkSugs.length > 0) ? (
    <div className="dp-ai" style={{ marginBottom: 12 }}>
      <div className="dp-ai-t">✦ AI 連結建議（按「接受」才會建立，不會自己動手）</div>
      {linkSugs.map((s) => (
        <div key={s.aId + s.bId} className="dp-zsug">
          <span className="dp-zsug-t">「{s.aTitle}」 ↔ 「{s.bTitle}」</span>
          {s.why && <span className="dp-zsug-why">{s.why}</span>}
          <span className="dp-zsug-btns">
            <button className="dp-btn solid" style={{ fontSize: 11, padding: "1px 8px" }} onClick={() => acceptSug(s)}>接受</button>
            <button className="dp-btn" style={{ fontSize: 11, padding: "1px 8px" }} onClick={() => dismissSug(s)}>略過</button>
          </span>
        </div>
      ))}
      <div className="dp-ai-bar">
        <button className="dp-btn" style={{ fontSize: 12 }} onClick={acceptAllSugs}>全部接受</button>
        <button className="dp-btn" style={{ fontSize: 12 }} onClick={() => { setLinkSugs(null); setLinkMsg(""); }}>全部略過</button>
      </div>
    </div>
  ) : null;

  const filtered = cards.filter((c) =>
    (!filterType || (c.type || "permanent") === filterType) &&
    (!filterTag || (c.tags || []).includes(filterTag)) &&
    (!q || (c.title + c.content).toLowerCase().includes(q.toLowerCase())));

  const selCard = cards.find((c) => c.id === sel);

  // 詳細頁
  if (selCard) {
    const m = ZTYPE[selCard.type];
    const linked = cards.filter((c) => (selCard.links || []).includes(c.id));
    const others = cards.filter((c) => c.id !== selCard.id);
    const _bt = (selCard.title || "").trim();
    const backlinks = _bt ? cards.filter((c) => c.id !== selCard.id && String(c.content || "").includes("[[" + _bt + "]]")) : [];
    return (
      <div className="dp-wrap">
        <button className="dp-btn" style={{ marginBottom: 16 }} onClick={() => setSel(null)}>← 回卡片盒</button>
        <div className="dp-zcard-full" style={{ borderColor: m.color }}>
          <div className="dp-zc-top">
            <span className="dp-zc-tag" style={{ background: m.color }}>{selCard.num} · {m.label}</span>
            <span className="dp-tdate">{selCard.date}</span>
            <button className="dp-x" onClick={() => del(selCard.id)}>✕</button>
          </div>
          <h2 className="dp-zc-title">{selCard.title}{" "}
            <button className="dp-btn" style={{ fontSize: 12, padding: "2px 10px", verticalAlign: "middle" }} onClick={() => renameCard(selCard)}>✏ 改標題</button>{" "}
            <button className="dp-btn" style={{ fontSize: 12, padding: "2px 10px", verticalAlign: "middle" }} onClick={() => (editForm && editForm.id === selCard.id) ? setEditForm(null) : startEdit(selCard)}>{(editForm && editForm.id === selCard.id) ? "取消編輯" : "✎ 編輯內容"}</button>{" "}
            {String(selCard.content || "").length > 300 && (
              <button className="dp-btn" style={{ fontSize: 12, padding: "2px 10px", verticalAlign: "middle" }} disabled={sumBusy} onClick={() => aiSummarize(selCard)}>{sumBusy ? "AI 摘要中…" : (selCard.aiSummary ? "↻ 重新摘要" : "✦ AI 摘要")}</button>
            )}
            {selCard.type === "fleeting" && (
              <button className="dp-btn" style={{ fontSize: 12, padding: "2px 10px", verticalAlign: "middle" }} onClick={async () => { if (await window.appConfirm("升級為永久筆記？建議先按「✎ 編輯內容」把想法改寫成自己的話、加上 [[連結]]。現在就升級嗎？")) update({ zettel: state.zettel.map((c) => c.id === selCard.id ? { ...c, type: "permanent" } : c) }); }}>⬆ 升級永久</button>
            )}
          </h2>
          {sumMsg && <p className="dp-err" style={{ margin: "4px 0" }}>{sumMsg}</p>}
          {selCard.aiSummary && (
            <blockquote className="dp-zc-sum">
              <button className="dp-x" style={{ float: "right" }} title="刪除摘要" onClick={() => delSummary(selCard)}>✕</button>
              <b>✦ AI 摘要</b>
              <p>{selCard.aiSummary}</p>
            </blockquote>
          )}
          {(editForm && editForm.id === selCard.id) ? (
            <div style={{ margin: "8px 0" }}>
              <textarea className="dp-ta" rows={6} value={editForm.content}
                onChange={(e) => setEditForm({ ...editForm, content: e.target.value })}
                placeholder="卡片內容；打 [[另一張卡的標題]] 可建立連結" />
              <input className="dp-src" style={{ marginTop: 9 }} value={editForm.tags}
                onChange={(e) => setEditForm({ ...editForm, tags: e.target.value })}
                placeholder="標籤（用逗號分隔）" />
              <div className="dp-segs" style={{ marginTop: 9 }}>
                {Object.entries(ZTYPE).map(([k, v]) => (
                  <button key={k} className={"dp-seg" + (editForm.type === k ? " on" : "")} onClick={() => setEditForm({ ...editForm, type: k })}>{v.label}</button>
                ))}
              </div>
              <div className="dp-ai-bar">
                <button className="dp-btn solid" onClick={saveEdit}>儲存變更</button>
                <button className="dp-btn" onClick={() => setEditForm(null)}>取消</button>
              </div>
            </div>
          ) : (
            <p className="dp-zc-body">{renderWiki(selCard.content)}</p>
          )}
          <div className="dp-zc-tags">{(selCard.tags || []).map((t) => <span key={t}>#{t}</span>)}</div>

          {linked.length > 0 && (
            <div className="dp-zc-links">
              <div className="dp-idea-h">← → 連結的筆記</div>
              {linked.map((lc) => (
                <button key={lc.id} className="dp-zc-link" style={{ borderLeftColor: ZTYPE[lc.type].color }} onClick={() => setSel(lc.id)}>
                  <b style={{ color: ZTYPE[lc.type].color }}>{lc.num}</b> {lc.title}
                </button>
              ))}
            </div>
          )}

          {backlinks.length > 0 && (
            <div className="dp-zc-links">
              <div className="dp-idea-h">↩ 反向連結（提到這張卡的卡片）</div>
              {backlinks.map((bc) => (
                <button key={bc.id} className="dp-zc-link" style={{ borderLeftColor: ZTYPE[bc.type] ? ZTYPE[bc.type].color : "var(--sub)" }} onClick={() => setSel(bc.id)}>
                  <b>{bc.num}</b> {bc.title}
                </button>
              ))}
            </div>
          )}

          <details className="dp-bulk" style={{ marginTop: 14 }}>
            <summary>建立／管理連結</summary>
            <p className="dp-import-sub">勾選要與這張互相連結的卡片：</p>
            {others.length === 0 ? <Empty>還沒有其他卡片可連結。</Empty> : others.map((o) => (
              <label key={o.id} className="dp-zlinkrow">
                <input type="checkbox" checked={(selCard.links || []).includes(o.id)} onChange={() => toggleLink(selCard.id, o.id)} />
                <span><b>{o.num}</b> {o.title}</span>
              </label>
            ))}
          </details>
        </div>
      </div>
    );
  }

  const focusCard = cards.find((c) => c.id === focusId) || (cards.length ? cards.reduce((b, c) => ((c.links || []).length > (b.links || []).length ? c : b), cards[0]) : null);
  const mapNeighbors = focusCard ? cards.filter((c) => c.id !== focusCard.id && (((focusCard.links || []).includes(c.id)) || ((c.links || []).includes(focusCard.id)))) : [];
  // 孤兒卡：沒有連出去、也沒被任何卡連到
  const orphans = cards.filter((c) => (c.links || []).length === 0 && !cards.some((o) => o.id !== c.id && (o.links || []).includes(c.id)));

  // 列表頁
  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">卡片盒 · Zettelkasten</div>
          <h1 className="dp-h1">永久筆記，慢慢長成知識</h1>
        </div>
        <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
          <div className="dp-idea-seg">
            <button className={zView === "grid" ? "on" : ""} onClick={() => setZView("grid")}>卡片</button>
            <button className={zView === "map" ? "on" : ""} onClick={() => setZView("map")}>心智圖</button>
          </div>
          <button className="dp-btn solid" onClick={() => { if (adding) setLinkTo(null); setAdding(!adding); }}>{adding ? "收起" : "＋ 新增卡片"}</button>
        </div>
      </header>

      {adding && (
        <div className="dp-ai">
          <div className="dp-segs">
            {Object.entries(ZTYPE).map(([k, v]) => (
              <button key={k} className={"dp-seg" + (form.type === k ? " on" : "")} onClick={() => setForm({ ...form, type: k })}>{v.label}</button>
            ))}
          </div>
          {linkTo && <p className="dp-hint" style={{ margin: "2px 0 0" }}>建立後會自動連到目前的中心卡片。</p>}
          <input className="dp-src" placeholder="標題（寫成一個觀點，例如：被問問題比自己想更能逼出盲點）"
            value={form.title} onChange={(e) => setForm({ ...form, title: e.target.value })} />
          <textarea className="dp-ta" rows={4} placeholder="內容（用自己的話寫；或貼素材後按「✦ AI 產卡」自動濃縮）"
            value={form.content} onChange={(e) => setForm({ ...form, content: e.target.value })} />
          <input className="dp-src" style={{ marginTop: 9 }} placeholder="標籤（用逗號分隔，如 復盤, 學習法）"
            value={form.tags} onChange={(e) => setForm({ ...form, tags: e.target.value })} />
          <div className="dp-ai-bar">
            <button className="dp-btn solid" onClick={submitForm}>建立卡片</button>
            <button className="dp-btn" disabled={busy} onClick={autoCard}>{busy ? "AI 產卡中…" : "✦ AI 產卡（建議電腦版）"}</button>
            {msg && <span className="dp-hint">{msg}</span>}
          </div>
        </div>
      )}

      <details className="dp-bulk">
        <summary>匯入卡片（貼我在對話裡做好的卡片）</summary>
        <p className="dp-import-sub">把我給你的卡片 JSON 貼進來，可一次多張。</p>
        <textarea className="dp-ta" rows={3} placeholder='[{"type":"permanent","title":"…","content":"…","tags":["…"]}]'
          value={paste} onChange={(e) => setPaste(e.target.value)} />
        <div className="dp-ai-bar"><button className="dp-btn solid" onClick={importPaste}>匯入卡片</button></div>
      </details>

      {zView === "grid" ? (
      <>
      <div className="dp-zsearch">
        <input placeholder="🔍 搜尋卡片內容…" value={q} onChange={(e) => setQ(e.target.value)} />
      </div>

      {cards.length >= 2 && (
        <div className="dp-ai-bar" style={{ marginTop: 0, marginBottom: 12, flexWrap: "wrap" }}>
          <button className="dp-btn" disabled={linking} onClick={aiLink}>{linking ? "AI 分析關聯中…" : "✦ AI 建議連結"}</button>
          <button className="dp-btn" disabled={wkBusy} onClick={weekReview}>{wkBusy ? "整理本週中…" : "📅 本週回顧"}</button>
          {linkMsg && <span className="dp-hint">{linkMsg}</span>}
          {wkMsg && <span className="dp-hint">{wkMsg}</span>}
        </div>
      )}
      {sugPanel}

      <div className="dp-igfilter">
        <button className={"dp-igf" + (!filterType ? " on" : "")} onClick={() => setFilterType(null)}>全部類型</button>
        {Object.entries(ZTYPE).map(([k, v]) => (
          <button key={k} className={"dp-igf" + (filterType === k ? " on" : "")} onClick={() => setFilterType(k === filterType ? null : k)}>
            {v.label}{k === "fleeting" && fleetingCount > 0 ? `（${fleetingCount} 待整理）` : ""}
          </button>
        ))}
      </div>

      {allTags.length > 0 && (
        <div className="dp-igfilter">
          <button className={"dp-igf" + (!filterTag ? " on" : "")} onClick={() => setFilterTag(null)}>全部</button>
          {(showAllTags ? allTags : allTags.slice(0, 12)).map((t) => (
            <button key={t} className={"dp-igf" + (filterTag === t ? " on" : "")} onClick={() => setFilterTag(t === filterTag ? null : t)}>#{t}</button>
          ))}
          {!showAllTags && filterTag && allTags.indexOf(filterTag) >= 12 && (
            <button className="dp-igf on" onClick={() => setFilterTag(null)}>#{filterTag} ✕</button>
          )}
          {allTags.length > 12 && (
            <button className="dp-igf dp-igf-more" onClick={() => setShowAllTags(!showAllTags)}>
              {showAllTags ? "▴ 收合標籤" : `▾ 更多標籤（${allTags.length - 12}）`}
            </button>
          )}
        </div>
      )}

      <div className="dp-zgrid">
        {filtered.length === 0 && <Empty>還沒有卡片。把最精華的洞察寫成永久筆記，或從素材用「AI 產卡」開始。</Empty>}
        {filtered.map((c) => {
          const m = ZTYPE[c.type];
          return (
            <div key={c.id} className="dp-zcard" style={{ borderLeftColor: m.color }}
              onClick={() => setSel(c.id)} role="button" tabIndex={0}
              onKeyDown={(e) => e.key === "Enter" && setSel(c.id)}>
              <button className="dp-zcard-del" onClick={(e) => { e.stopPropagation(); del(c.id); }} title="刪除">✕</button>
              <div className="dp-zc-meta" style={{ color: m.color }}>{c.num} · {m.label}{c.type === "fleeting" && <span className="dp-zc-todo">待整理</span>}</div>
              <div className="dp-zc-h">{c.title}</div>
              <div className="dp-zc-excerpt">{c.content}</div>
              <div className="dp-zc-foot">
                <div className="dp-zc-tags sm">{(c.tags || []).slice(0, 3).map((t) => <span key={t}>#{t}</span>)}</div>
                {(c.links || []).length > 0 && <span className="dp-zc-linkn">{c.links.length} 連結</span>}
              </div>
            </div>
          );
        })}
      </div>
      </>
      ) : (
      <>
        <div className="dp-ai-bar" style={{ marginBottom: 10, flexWrap: "wrap" }}>
          {focusCard && <button className="dp-btn solid" onClick={() => { setLinkTo(focusCard.id); setAdding(true); }}>＋ 新增卡片並連到中心</button>}
          {cards.length >= 2 && <button className="dp-btn" disabled={linking} onClick={aiLink}>{linking ? "AI 分析關聯中…" : "✦ AI 建議連結"}</button>}
          {linkMsg && <span className="dp-hint">{linkMsg}</span>}
        </div>
        {sugPanel}
        {!focusCard ? (
          <Empty>還沒有卡片。先新增幾張，用「AI 自動辨識連結」或手動連結，就會長成心智圖。</Empty>
        ) : (
        <>
          <div className="dp-mapwrap">
            <svg className="dp-maplines" viewBox="0 0 100 100" preserveAspectRatio="none">
              {mapNeighbors.map((n, i) => {
                const ang = (-90 + i * (360 / mapNeighbors.length)) * Math.PI / 180;
                const x = 50 + 34 * Math.cos(ang), y = 50 + 38 * Math.sin(ang);
                return <line key={n.id} x1="50" y1="50" x2={x} y2={y} stroke="#cdcdc9" strokeWidth="0.4" vectorEffect="non-scaling-stroke" />;
              })}
            </svg>
            <button className="dp-mapnode center" style={{ left: "50%", top: "50%", borderColor: ztOf(focusCard.type).color }} onClick={() => setSel(focusCard.id)}>
              <b style={{ color: ztOf(focusCard.type).color }}>{focusCard.num}</b>
              <span>{focusCard.title}</span>
            </button>
            {mapNeighbors.map((n, i) => {
              const ang = (-90 + i * (360 / mapNeighbors.length)) * Math.PI / 180;
              const x = 50 + 34 * Math.cos(ang), y = 50 + 38 * Math.sin(ang);
              return (
                <button key={n.id} className="dp-mapnode" style={{ left: x + "%", top: y + "%", borderColor: ztOf(n.type).color }} onClick={() => setFocusId(n.id)} title={n.title}>
                  <b style={{ color: ztOf(n.type).color }}>{n.num}</b>
                  <span>{n.title}</span>
                </button>
              );
            })}
          </div>
          <p className="dp-hint" style={{ marginTop: 8 }}>點外圈卡片換中心；點中心卡片開啟詳細。{mapNeighbors.length === 0 ? "（這張還沒有連結，用上方「AI 自動辨識連結」或到卡片詳細頁手動連結。）" : ""}</p>
          <div className="dp-igfilter" style={{ marginTop: 8 }}>
            <button className={"dp-igf" + (!filterType ? " on" : "")} onClick={() => setFilterType(null)}>全部類型</button>
            {Object.entries(ZTYPE).map(([k, v]) => (
              <button key={k} className={"dp-igf" + (filterType === k ? " on" : "")} onClick={() => setFilterType(k === filterType ? null : k)}>{v.label}</button>
            ))}
          </div>
          <div className="dp-igfilter" style={{ marginTop: 8 }}>
            {cards.filter((c) => !filterType || (c.type || "permanent") === filterType).slice(0, 40).map((c) => (
              <button key={c.id} className={"dp-igf" + (focusCard.id === c.id ? " on" : "")} onClick={() => setFocusId(c.id)}>{c.num}·{(c.title || "").slice(0, 14)}{(c.title || "").length > 14 ? "…" : ""}</button>
            ))}
          </div>
          {orphans.length > 0 && (
            <div style={{ marginTop: 10 }}>
              <div className="dp-idea-h">🍂 孤兒卡 {orphans.length} 張（還沒有任何連結，點開加連結）</div>
              <div className="dp-igfilter">
                {orphans.slice(0, 30).map((c) => (
                  <button key={c.id} className="dp-igf" style={{ borderColor: "var(--accent)", color: "var(--accent)" }} onClick={() => setSel(c.id)}>{c.num}·{(c.title || "").slice(0, 14)}{(c.title || "").length > 14 ? "…" : ""}</button>
                ))}
              </div>
            </div>
          )}
        </>
        )}
      </>
      )}
    </div>
  );
}

// ─── DONE LOG (完成紀錄) ──────────────────────────────────────
function Done({ state, update }) {
  const reopen = (id) =>
    update({ todos: state.todos.map((x) => x.id === id ? { ...x, done: false, doneAt: "" } : x) });
  const delJournal = (id) => update({ journal: state.journal.filter((j) => j.id !== id) });

  // 統一完成時間軸：待辦打勾 + 已發 IG，依日期合併在同一條
  const byDate = {};
  state.todos.filter((x) => x.done).forEach((x) => {
    const d = x.doneAt || "未記錄日期";
    (byDate[d] = byDate[d] || []).push({ kind: "todo", key: x.id, todo: x });
  });

              it.kind === "todo" ? (
                <div key={it.key} className="dp-doneitem">

                  <span className="dp-donetext">{it.todo.text}</span>
                  <button className="dp-btn dp-donereopen" onClick={() => reopen(it.key)}>重啟</button>
                </div>
              ) : (
                <div key={it.key} className="dp-doneitem">
                  <span className="dp-donecheck" style={{ background: igAccOf(it.post.account).color }}>IG</span>
                  <span className="dp-donetext">
                    <b style={{ color: igAccOf(it.post.account).color }}>{igAccOf(it.post.account).label}</b>
                    　{postTypeOf(it.post.type)}　{it.post.topic}
                  </span>
                </div>
              )
            )}
          </div>
        ))
      )}

      <div className="dp-idea-h" style={{ marginTop: 26 }}>手帳草稿紀錄</div>
      {journals.length === 0 ? <Empty>還沒有存過手帳草稿。</Empty> : (
        journals.map((j) => (
          <div key={j.id} className="dp-jpast">
            <div className="dp-rvitem-top"><b>{j.date}</b><button className="dp-x" onClick={() => delJournal(j.id)}>✕</button></div>
            <pre>{j.text}</pre>
          </div>
        ))
      )}
    </div>
  );
}

// ─── CRYPTO HELPERS (AES-256-GCM + PBKDF2) ──────────────────
// 資料在送出 App 前先加密；JSONbin 上存的是密文，就算外洩也看不懂
function u8toB64(arr) {
  let s = "";
  for (let i = 0; i < arr.length; i++) s += String.fromCharCode(arr[i]);
  return btoa(s);
}
// gzip 壓縮／解壓（雲端資料量常可壓到 2~3 成，避開 JSONbin 免費方案 500KB 上限）
async function gzipBytes(bytes) {
  const cs = new CompressionStream("gzip");
  const stream = new Blob([bytes]).stream().pipeThrough(cs);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function gunzipBytes(bytes) {
  const ds = new DecompressionStream("gzip");
  const stream = new Blob([bytes]).stream().pipeThrough(ds);
  return new Uint8Array(await new Response(stream).arrayBuffer());
}
async function encryptData(obj, phrase) {
  const enc  = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const km   = await crypto.subtle.importKey("raw", enc.encode(phrase), "PBKDF2", false, ["deriveKey"]);
  const key  = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt, iterations: 120000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["encrypt"]
  );
  let payload = enc.encode(JSON.stringify(obj));
  if (typeof CompressionStream !== "undefined") {
    try { payload = await gzipBytes(payload); } catch (e) { /* 不支援就傳未壓縮 */ }
  }
  const cipher = await crypto.subtle.encrypt({ name: "AES-GCM", iv }, key, payload);
  const out = new Uint8Array(28 + cipher.byteLength);
  out.set(salt, 0); out.set(iv, 16); out.set(new Uint8Array(cipher), 28);
  return u8toB64(out);
}
async function decryptData(b64, phrase) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const enc = new TextEncoder();
  const km  = await crypto.subtle.importKey("raw", enc.encode(phrase), "PBKDF2", false, ["deriveKey"]);
  const key = await crypto.subtle.deriveKey(
    { name: "PBKDF2", salt: raw.slice(0, 16), iterations: 120000, hash: "SHA-256" },
    km, { name: "AES-GCM", length: 256 }, false, ["decrypt"]
  );
  let plain = new Uint8Array(await crypto.subtle.decrypt({ name: "AES-GCM", iv: raw.slice(16, 28) }, key, raw.slice(28)));
  // gzip 檔頭 0x1f 0x8b → 解壓；否則是舊格式（未壓縮），直接讀
  if (plain.length > 2 && plain[0] === 0x1f && plain[1] === 0x8b) {
    plain = await gunzipBytes(plain);
  }
  return JSON.parse(new TextDecoder().decode(plain));
}

// ─── 縮圖不上雲端（節省 JSONbin 500KB 空間）───────────────
// 通用規則：凡字串以 data:image/ 開頭且長度 >1000 視為本機縮圖，上傳前換成佔位符。
// http(s) 開頭的封面「網址」很小，照常上雲端。備份碼／備份檔不經過這裡，仍含完整圖片。
const THUMB_SENTINEL = "__LOCAL_IMG__";
const isLocalImg = (v) => typeof v === "string" && v.indexOf("data:image/") === 0 && v.length > 1000;
function stripThumbsForCloud(obj, stat) {
  if (Array.isArray(obj)) return obj.map((v) => stripThumbsForCloud(v, stat));
  if (obj && typeof obj === "object") {
    const out = {};
    for (const k in obj) out[k] = stripThumbsForCloud(obj[k], stat);
    return out;
  }
  if (isLocalImg(obj)) { if (stat) stat.count++; return THUMB_SENTINEL; }
  return obj;
}
const CLOUD_LIMIT_KB = 950; // 顯示用上限（GitHub Gist 單檔約 1MB）
const CLOUD_LIMIT_BYTES = 950000; // 實際擋線（位元組）：GitHub Gist 單檔約 1MB，保守擋在 ~950KB（已含 base64 膨脹）
// 推送前大小預檢：列出未壓縮 JSON 最肥的前三個資料塊，超標時給清理方向
function bulkBreakdown(slim) {
  const rows = [];
  for (const k in slim) { try { rows.push([k, JSON.stringify(slim[k]).length]); } catch (e) {} }
  rows.sort((a, b) => b[1] - a[1]);
  return rows.slice(0, 3).map(([k, n]) => k + "（約 " + Math.round(n / 1024) + " KB）").join("、");
}
// 拉取後：佔位符若本機同位置有圖就換回本機圖；本機沒有就設空字串（顯示預設封面）。
// 陣列元素優先用 id 對回（跨裝置增刪排序後仍對得準），沒 id 才用位置。
function restoreLocalThumbs(cloudObj, localObj) {
  if (cloudObj === THUMB_SENTINEL) {
    return (typeof localObj === "string" && localObj.indexOf("data:image/") === 0) ? localObj : "";
  }
  if (Array.isArray(cloudObj)) {
    const byId = {};
    if (Array.isArray(localObj)) {
      for (const it of localObj) { if (it && typeof it === "object" && it.id != null) byId[it.id] = it; }
    }
    return cloudObj.map((v, i) => {
      let match = Array.isArray(localObj) ? localObj[i] : undefined;
      if (v && typeof v === "object" && v.id != null && byId[v.id] !== undefined) match = byId[v.id];
      return restoreLocalThumbs(v, match);
    });
  }
  if (cloudObj && typeof cloudObj === "object") {
    const out = {};
    for (const k in cloudObj) {
      out[k] = restoreLocalThumbs(cloudObj[k], (localObj && typeof localObj === "object" && !Array.isArray(localObj)) ? localObj[k] : undefined);
    }
    return out;
  }
  return cloudObj;
}

// ─── 自動同步共用邏輯（App 與備份頁共用）───────────────────
const SYNC_META_KEY = "director-planner-sync-meta-v1"; // { lastSyncTs, lastLocalTs }
const GIST_FILE = "director-planner.json"; // Gist 內存放加密資料的檔名
async function cloudPush(state, cfg) {
  const slim = stripThumbsForCloud(state); // 縮圖只留本機
  const encrypted = await encryptData(slim, cfg.phrase);
  const pBytes = encrypted.length + 40;
  if (pBytes > CLOUD_LIMIT_BYTES) throw new Error("too_big|" + Math.round(pBytes / 1024) + "|" + bulkBreakdown(slim));
  const ts = Date.now();
  const res = await fetchWithTimeout(`https://api.github.com/gists/${cfg.binId}`, {
    method: "PATCH",
    headers: { "Authorization": "Bearer " + cfg.apiKey, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
    body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ enc: encrypted, ts }) } } }),
  }, 30000);
  if (!res.ok) throw new Error(res.status + "");
  return ts;
}
async function cloudPull(cfg) {
  const res = await fetchWithTimeout(`https://api.github.com/gists/${cfg.binId}`, {
    headers: { "Authorization": "Bearer " + cfg.apiKey, "Accept": "application/vnd.github+json" },
  }, 30000);
  if (!res.ok) throw new Error(res.status + "");
  const gist = await res.json();
  const f = gist.files && gist.files[GIST_FILE];
  if (!f) throw new Error("no_enc");
  let raw = f.content;
  if (f.truncated && f.raw_url) { raw = await (await fetchWithTimeout(f.raw_url, {}, 30000)).text(); }
  const wrapper = JSON.parse(raw);
  if (!wrapper.enc) throw new Error("no_enc");
  const data = await decryptData(wrapper.enc, cfg.phrase);
  return { data, ts: wrapper.ts || 0 };
}
async function loadSyncMeta() {
  try { const m = await window.storage.get(SYNC_META_KEY); if (m && m.value) return JSON.parse(m.value); } catch (e) {}
  return { lastSyncTs: 0, lastLocalTs: 0 };
}
async function saveSyncMeta(meta) {
  try { await window.storage.set(SYNC_META_KEY, JSON.stringify(meta)); } catch (e) {}
}
async function markSynced(ts) { await saveSyncMeta({ lastSyncTs: ts, lastLocalTs: ts }); }
async function markLocalChanged() {
  const m = await loadSyncMeta(); m.lastLocalTs = Date.now(); await saveSyncMeta(m);
}
const cloudCfgReady = (cfg) => !!(cfg && cfg.apiKey && cfg.binId && cfg.phrase);
const autoSyncOn = (cfg) => cloudCfgReady(cfg) && cfg.auto !== false;
// 金鑰經 LINE／記事本轉傳常混入看不見的換行或空白，瀏覽器會拒收 Authorization header
// →載入與套用設定時一律清除（2026/07/09 手機拉取失敗「Header has invalid value」的根因）
function cleanCloudCfg(cfg) {
  if (!cfg || typeof cfg !== "object") return cfg;
  return { ...cfg, apiKey: String(cfg.apiKey || "").replace(/\s+/g, ""), binId: String(cfg.binId || "").replace(/\s+/g, "") };
}

// 把雲端同步的錯誤翻成看得懂的話（取代過去一律顯示「網路問題」）
function cloudErrMsg(e) {
  if (e && e.name === "OperationError") return "加密密語不正確，請確認與當初設定的一致。";
  let m = (e && e.message) ? String(e.message) : "";
  m = m.replace(/github_pat_\S+/g, "github_pat_…（Token 已隱藏）"); // 錯誤訊息不外洩 Token
  if (m === "timeout") return "連雲端等太久沒有回應（超過 30 秒），可能是網路不穩，請稍後再試一次。";
  if (/invalid value|invalid header|invalid character/i.test(m)) return "金鑰裡混進了換行或空白（多半是轉傳時被折行）。請到備份頁「取消連線」後重新貼一次同步金鑰＋密語；或更新 App 到最新版會自動修復。";
  if (m.startsWith("too_big")) {
    const p = m.split("|");
    return "資料太大：加密壓縮後約 " + (p[1] || "?") + " KB，超過單筆上限。最占空間：" + (p[2] || "") + "。請清掉一些舊資料再試。";
  }
  if (m === "no_enc") return "雲端資料格式不符，請重新「推送到雲端」一次。";
  if (/Failed to fetch|NetworkError|Load failed|ERR_/i.test(m))
    return "連線被擋住或斷線。請確認有網路，並把瀏覽器對 api.github.com 的「追蹤防護」關閉後再試。";
  if (m.startsWith("401") || m === "bad_key") return "GitHub Token 不正確或已失效，請重新產生一顆（Fine-grained token，Account permissions 的 Gists 給 Read and write）。";
  if (m.startsWith("403")) {
    const sm = m.includes("|") ? m.split("|").slice(1).join("|") : "";
    if (/rate limit/i.test(sm)) return "GitHub 請求太頻繁（403 rate limit），請等幾分鐘再試。";
    return "權限不足（403）" + (sm ? "，GitHub 說明：「" + sm + "」" : "") + "。請確認 Token 的權限有給到 Gists＝Read and write。";
  }
  if (m.startsWith("404")) return "找不到這個 Gist（404），可能已被刪除或 Token 沒權限，請重新「建立雲端」。";
  if (m.startsWith("422")) return "GitHub 回報資料格式問題（422），請重新建立雲端一次。";
  if (m.startsWith("429")) return "操作太頻繁（429），請等一兩分鐘再試。";
  if (/^\d{3}$/.test(m)) return "伺服器回應狀態 " + m + "，請稍後再試。";
  if (/JSON|stringify|circular|convert/i.test(m)) return "資料整理失敗：" + m;
  return m ? ("發生問題：" + m) : "發生未知問題，請稍後再試。";
}

// ─── 卡片盒 → Obsidian 匯出（純手工 zip，不用外部套件）──────
function crc32(u8) {
  if (!crc32.table) {
    const t = [];
    for (let n = 0; n < 256; n++) { let c = n; for (let k = 0; k < 8; k++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1); t[n] = c >>> 0; }
    crc32.table = t;
  }
  let crc = 0xFFFFFFFF;
  for (let i = 0; i < u8.length; i++) crc = (crc >>> 8) ^ crc32.table[(crc ^ u8[i]) & 0xFF];
  return (crc ^ 0xFFFFFFFF) >>> 0;
}
function makeZip(files) { // files: [{name, text}] → Uint8Array（zip 檔，不壓縮；檔名 UTF-8）
  const enc = new TextEncoder();
  const u16 = (n) => [n & 255, (n >> 8) & 255];
  const u32 = (n) => [n & 255, (n >>> 8) & 255, (n >>> 16) & 255, (n >>> 24) & 255];
  const now = new Date();
  const dTime = ((now.getHours() << 11) | (now.getMinutes() << 5) | (now.getSeconds() >> 1)) & 0xFFFF;
  const dDate = (((now.getFullYear() - 1980) << 9) | ((now.getMonth() + 1) << 5) | now.getDate()) & 0xFFFF;
  const parts = []; const central = [];
  let offset = 0;
  for (const f of files) {
    const nameB = enc.encode(f.name);
    const dataB = enc.encode(f.text);
    const crc = crc32(dataB);
    // 0x0800 = UTF-8 檔名旗標（中文檔名解壓不亂碼）
    const head = [].concat(u32(0x04034b50), u16(20), u16(0x0800), u16(0), u16(dTime), u16(dDate), u32(crc), u32(dataB.length), u32(dataB.length), u16(nameB.length), u16(0));
    parts.push(new Uint8Array(head), nameB, dataB);
    central.push({ nameB, crc, size: dataB.length, offset });
    offset += head.length + nameB.length + dataB.length;
  }
  const cdStart = offset;
  for (const c of central) {
    const rec = [].concat(u32(0x02014b50), u16(20), u16(20), u16(0x0800), u16(0), u16(dTime), u16(dDate), u32(c.crc), u32(c.size), u32(c.size), u16(c.nameB.length), u16(0), u16(0), u16(0), u16(0), u32(0), u32(c.offset));
    parts.push(new Uint8Array(rec), c.nameB);
    offset += rec.length + c.nameB.length;
  }
  parts.push(new Uint8Array([].concat(u32(0x06054b50), u16(0), u16(0), u16(central.length), u16(central.length), u32(offset - cdStart), u32(cdStart), u16(0))));
  let total = 0; for (const p of parts) total += p.length;
  const out = new Uint8Array(total);
  let pos = 0; for (const p of parts) { out.set(p, pos); pos += p.length; }
  return out;
}
// 卡片 → Obsidian Markdown（frontmatter＋[[連結]]；同名卡自動編號、斷連自動忽略）
function zettelToObsidianFiles(cards) {
  const sanitize = (s) => String(s || "").replace(/[\\/:*?"<>|#^\[\]]/g, " ").replace(/\s+/g, " ").trim().slice(0, 60);
  const used = {}; const nameById = {};
  cards.forEach((c) => {
    let base = sanitize(c.title) || ("卡片-" + (c.num || String(c.id || "").slice(-4) || "x"));
    let name = base, i = 2;
    while (used[name]) { name = base + " " + (i++); }
    used[name] = true; nameById[c.id] = name;
  });
  return cards.map((c) => {
    const tags = (c.tags || []).map((t) => '"' + String(t).replace(/"/g, "") + '"').join(", ");
    const fm = "---\ntags: [" + tags + "]\ncreated: " + (c.date || "") + "\ncard-num: \"" + (c.num || "") + "\"\n---\n\n";
    const linkLines = (c.links || []).filter((id) => nameById[id]).map((id) => "- [[" + nameById[id] + "]]");
    const text = fm + (c.title ? "# " + c.title + "\n\n" : "") + String(c.content || "").trim()
      + (linkLines.length ? "\n\n## 相關卡片\n" + linkLines.join("\n") : "") + "\n";
    return { name: "卡片盒/" + nameById[c.id] + ".md", text };
  });
}

// ─── BACKUP / RESTORE + CLOUD SYNC (加密版) ─────────────────

// 補給大項分類：預設常見大項當提示，使用者也可自行輸入任何大項（美妝／藥品／浴室／廚房…）
const SUP_PRESETS = ["食物", "美妝", "藥品", "保健食品", "浴室", "廚房", "清潔用品", "家電耗材", "其他"];
const SUP_PALETTE = ["var(--accent)", "#9C6FA6", "var(--blue)", "var(--brand)", "#c08532", "#5B8A8A", "#8A5B6B", "#7A6BA8", "var(--sub)"];
const supColor = (cat) => {

  let h = 0; for (let i = 0; i < cat.length; i++) h = (h * 31 + cat.charCodeAt(i)) >>> 0;

const dayDiff = (fromISO, toISO) => Math.round((isoToDate(toISO) - isoToDate(fromISO)) / 86400000);

  const blank = { name: "", category: "食物", baseDate: todayISO(), dueDate: "", intervalDays: "", price: "", note: "" };
  const [form, setForm] = useState(blank);
  const [filter, setFilter] = useState("all");

  const calcDue = (f) => {

    return "";
  };
  const add = () => {
    if (!form.name.trim()) return;
    const item = {
      id: uid(), name: form.name.trim(), category: form.category,
      baseDate: form.baseDate || "", dueDate: calcDue(form),
      intervalDays: parseInt(form.intervalDays, 10) || 0,
      price: form.price === "" ? "" : (parseFloat(form.price) || 0),

  const del = async (id) => { if (!(await window.appConfirm("確定刪除這個品項？"))) return; update({ supplies: items.filter((x) => x.id !== id) }); };
  const renew = (id) => update({ supplies: items.map((x) => {
    if (x.id !== id) return x;
    const tday = todayISO();
    return { ...x, baseDate: tday, dueDate: x.intervalDays > 0 ? addDays(tday, x.intervalDays) : x.dueDate };
  }) });

  const t = todayISO();
  const statusOf = (x) => {
    if (!x.dueDate) return { k: "ok", txt: "—" };

    if (dd < 0) return { k: "over", txt: `逾期 ${-dd} 天` };

  };
  const list = items.filter((x) => filter === "all" || x.category === filter)

  const overN = items.filter((x) => statusOf(x).k === "over").length;
  const soonN = items.filter((x) => statusOf(x).k === "soon").length;
  const spent = items.reduce((s, x) => s + (typeof x.price === "number" ? x.price : 0), 0);
  const cats = Array.from(new Set(items.map((x) => x.category).filter(Boolean)));

  return (
    <div className="dp-wrap">
      <header className="dp-head"><div><div className="dp-eyebrow">居家補給</div><h1 className="dp-h1">開封・效期・更換</h1></div></header>

      <div className="dp-igfilter">
        <button className={"dp-igf" + (filter === "all" ? " on" : "")} onClick={() => setFilter("all")}>全部 {items.length}</button>

// 上傳圖片 → 等比縮成縮圖 dataURL，避免 localStorage（約 5MB）被大圖塞爆
function fileToThumb(file, max = 240) {
  return new Promise((resolve, reject) => {
    const fr = new FileReader();
    fr.onload = () => {
      const im = new Image();
      im.onload = () => {
        let w = im.width, h = im.height;
        if (w > h && w > max) { h = Math.round(h * max / w); w = max; }
        else if (h > max) { w = Math.round(w * max / h); h = max; }
        const cv = document.createElement("canvas");
        cv.width = w; cv.height = h;
        cv.getContext("2d").drawImage(im, 0, 0, w, h);
        resolve(cv.toDataURL("image/jpeg", 0.72));
      };
      im.onerror = reject; im.src = fr.result;
    };
    fr.onerror = reject; fr.readAsDataURL(file);
  });
}
