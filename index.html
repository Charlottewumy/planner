function Backup({ state, restoreAll }) {
  // ── 本機備份
  const [msg, setMsg] = useState("");
  const [showCode, setShowCode] = useState(false);
  const [pasteCode, setPasteCode] = useState("");
  const fileRef = useRef(null);

  // ── 雲端同步（phrase 另存，不放進同步金鑰）
  const [cloudCfg, setCloudCfg] = useState({ apiKey: "", binId: "", phrase: "" });
  const [cloudLoaded, setCloudLoaded] = useState(false);
  const [cloudBusy, setCloudBusy] = useState(false);
  const [cloudMsg, setCloudMsg] = useState("");
  const [apiKeyInput, setApiKeyInput] = useState("");
  const [tokenInput, setTokenInput] = useState("");
  const [setupTab, setSetupTab] = useState("new"); // new(首次設定) | paste(換裝置)
  const [phraseInput, setPhraseInput] = useState("");
  const [pastePhrase, setPastePhrase] = useState("");
  const [keyInput, setKeyInput] = useState("");
  const [modelSel, setModelSel] = useState(getGeminiModel());

  useEffect(() => {
    (async () => {
      try {
        const r = await window.storage.get(CLOUD_KEY);
        if (r && r.value) setCloudCfg(cleanCloudCfg(JSON.parse(r.value)));
      } catch (e) { /* first run */ }
      setCloudLoaded(true);
    })();
  }, []);

  const saveCloudCfg = async (cfg) => {
    try { await window.storage.set(CLOUD_KEY, JSON.stringify(cfg)); } catch (e) {}
    setCloudCfg(cfg);
  };

  const isConfigured = cloudLoaded && !!(cloudCfg.apiKey && cloudCfg.binId && cloudCfg.phrase);
  // 同步金鑰只含 apiKey + binId；phrase 是獨立的第二把鑰匙，不包含在這裡
  const syncToken = (cloudCfg.apiKey && cloudCfg.binId) ? `${cloudCfg.apiKey}:::${cloudCfg.binId}` : "";

  // 加密後推送到 JSONbin（封面縮圖只留本機，不上雲端）
  const pushToCloud = async () => {
    if (!cloudCfg.phrase) { setCloudMsg("請先設定加密密語。"); return; }
    setCloudBusy(true); setCloudMsg("加密並推送中…");
    try {
      const stat = { count: 0 };
      const slim = stripThumbsForCloud(state, stat);
      const encrypted = await encryptData(slim, cloudCfg.phrase);
      const payloadKB = Math.round((encrypted.length + 40) / 1024);
      if ((encrypted.length + 40) > CLOUD_LIMIT_BYTES) {
        setCloudMsg("❌ 資料太大：加密壓縮後約 " + payloadKB + " KB，超過單筆上限。最占空間：" + bulkBreakdown(slim) + "。請清掉一些舊資料再試。");
        setCloudBusy(false); return;
      }
      const ts = Date.now();
      const res = await fetchWithTimeout(`https://api.github.com/gists/${cloudCfg.binId}`, {
        method: "PATCH",
        headers: { "Authorization": "Bearer " + cloudCfg.apiKey, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
        body: JSON.stringify({ files: { [GIST_FILE]: { content: JSON.stringify({ enc: encrypted, ts }) } } }),
      }, 30000);
      if (!res.ok) {
        let sm = ""; try { const j = await res.json(); sm = j && j.message ? String(j.message) : ""; } catch (e2) {}
        throw new Error(res.status + (sm ? "|" + sm : ""));
      }
      await markSynced(ts);
      setCloudMsg("✅ 已加密推送（約 " + payloadKB + " KB" + (stat.count ? "，已剔除 " + stat.count + " 張封面圖，僅留本機" : "") + "）｜" + new Date().toLocaleTimeString("zh-TW"));
    } catch (e) {
      setCloudMsg("❌ 推送失敗：" + cloudErrMsg(e));
    }
    setCloudBusy(false);
  };

  // 從 JSONbin 拉取並解密還原（雲端縮圖佔位符換回本機既有的圖）
  const pullFromCloud = async () => {
    if (!cloudCfg.phrase) { setCloudMsg("請先設定加密密語。"); return; }
    setCloudBusy(true); setCloudMsg("拉取並解密中…");
    try {
      const res = await fetchWithTimeout(`https://api.github.com/gists/${cloudCfg.binId}`, {
        headers: { "Authorization": "Bearer " + cloudCfg.apiKey, "Accept": "application/vnd.github+json" },
      }, 30000);
      if (!res.ok) {
        let sm = ""; try { const j = await res.json(); sm = j && j.message ? String(j.message) : ""; } catch (e2) {}
        throw new Error(res.status + (sm ? "|" + sm : ""));
      }
      const gist = await res.json();
      const gf = gist.files && gist.files[GIST_FILE];
      if (!gf) throw new Error("no_enc");
      let graw = gf.content;
      if (gf.truncated && gf.raw_url) { graw = await (await fetchWithTimeout(gf.raw_url, {}, 30000)).text(); }
      const wrapper = JSON.parse(graw);
      if (!wrapper.enc) throw new Error("no_enc");
      const data = await decryptData(wrapper.enc, cloudCfg.phrase);
      restoreAll(restoreLocalThumbs(data, state));
      await markSynced(wrapper.ts || Date.now());
      setCloudMsg("✅ 解密還原完成｜" + new Date().toLocaleTimeString("zh-TW"));
    } catch (e) {
      setCloudMsg("❌ 拉取失敗：" + cloudErrMsg(e));
    }
    setCloudBusy(false);
  };

  // 首次：建立新 Bin（連初始資料一起加密上傳）
  const createBin = async () => {
    const masterKey = apiKeyInput.replace(/\s+/g, ""); // Token 不含空白，一律清除避免換行混入
    const phrase    = phraseInput.trim();
    if (!masterKey) { setCloudMsg("請填入 GitHub Token。"); return; }
    if (!phrase)    { setCloudMsg("請設定加密密語（至少 6 個字）。"); return; }
    if (phrase.length < 6) { setCloudMsg("密語太短，請至少輸入 6 個字。"); return; }
    setCloudBusy(true); setCloudMsg("建立雲端儲存中…（共三步）");
    try {
      // Step 1：建立 Bin（封面縮圖只留本機，不上雲端）
      const encrypted = await encryptData(stripThumbsForCloud(state), phrase);
      const payloadKB = Math.round((encrypted.length + 40) / 1024);
      if ((encrypted.length + 40) > CLOUD_LIMIT_BYTES) {
        setCloudMsg("❌ 資料太大：加密壓縮後約 " + payloadKB + " KB，超過單筆上限。請先清掉舊資料再建立雲端。最占空間：" + bulkBreakdown(stripThumbsForCloud(state)) + "。");
        setCloudBusy(false); return;
      }
      setCloudMsg("建立 GitHub Gist 中…（資料加密後約 " + payloadKB + " KB）");
      const binRes = await fetchWithTimeout("https://api.github.com/gists", {
        method: "POST",
        headers: {
          "Authorization": "Bearer " + masterKey,
          "Accept": "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify({ description: "館長手帳同步（加密）", public: false, files: { [GIST_FILE]: { content: JSON.stringify({ enc: encrypted, ts: Date.now() }) } } }),
      }, 30000);
      if (!binRes.ok) {
        let sm = ""; try { const j = await binRes.json(); sm = j && j.message ? String(j.message) : ""; } catch (e2) {}
        throw new Error(binRes.status + (sm ? "|" + sm : ""));
      }
      const binData = await binRes.json();
      const binId   = binData.id;

      // 儲存設定（GitHub Token 與 Gist Id 存本機；phrase 是另一把獨立鑰匙）
      await saveCloudCfg({ apiKey: masterKey, binId, phrase });
      setApiKeyInput(""); setPhraseInput("");
      setCloudMsg("✅ 建立完成！資料已加密上傳到你的 GitHub Gist。請複製同步金鑰並牢記密語（兩者分開保管）。");
    } catch (e) {
      setCloudMsg("❌ 失敗：" + cloudErrMsg(e));
    }
    setCloudBusy(false);
  };


  // 換裝置：套用同步金鑰 + 密語
  const applyToken = async () => {
    const t = tokenInput.trim();
    const p = pastePhrase.trim();
    const parts = t.split(":::");
    if (parts.length !== 2 || !parts[0].trim() || !parts[1].trim()) {
      if (!t.includes(":::")) {
        setCloudMsg("這看起來不是「同步金鑰」。如果你貼的是 JSONbin 的 Master Key，請改點上方「首次設定（這台）」分頁貼進去、設密語後按「建立雲端儲存」；這個欄位是之後換裝置時，貼 App 產生的 xxxx:::yyyy 同步金鑰用的。");
      } else {
        setCloudMsg("同步金鑰格式不正確，請完整複製（含 ::: 分隔）。");
      }
      return;
    }
    if (!p) { setCloudMsg("請同時填入加密密語。"); return; }
    await saveCloudCfg({ apiKey: parts[0].replace(/\s+/g, ""), binId: parts[1].replace(/\s+/g, ""), phrase: p });
    setTokenInput(""); setPastePhrase("");
    setCloudMsg("✅ 金鑰與密語已套用！按「⬇ 從雲端拉取」把資料同步過來。");
  };

  const onChangeModel = async (m) => {
    setModelSel(m);
    setGeminiModel(m);
    try { await window.storage.set(SETTINGS_KEY, JSON.stringify({ geminiKey: getAnthropicKey(), model: m })); } catch (e) {}
    setCloudMsg("✅ 已切換 AI 模型為「" + ((GEMINI_MODELS.find((x) => x.id === m) || {}).label || m) + "」。");
  };
  const saveAnthropicKey = async () => {
    const k = keyInput.trim();
    if (!k) return;
    setAnthropicKey(k);
    try { await window.storage.set(SETTINGS_KEY, JSON.stringify({ geminiKey: k, model: getGeminiModel() })); } catch (e) {}
    setKeyInput("");
    setCloudMsg("✅ API Key 已儲存，AI 功能已啟用。");
  };

  const copySyncToken = async () => {
    try {
      await navigator.clipboard.writeText(syncToken);
      setCloudMsg("同步金鑰已複製！存到記事本或 LINE 給自己，換裝置時用。");
    } catch (e) {
      // 剪貼簿被擋（多半是 file:// 直接開檔）→ 用隱藏欄位複製，避免把含金鑰的字串印在畫面上被截圖外流
      let ok = false;
      try {
        const ta = document.createElement("textarea");
        ta.value = syncToken; ta.style.position = "fixed"; ta.style.opacity = "0"; ta.style.top = "0";
        document.body.appendChild(ta); ta.focus(); ta.select();
        ok = document.execCommand("copy");
        document.body.removeChild(ta);
      } catch (e2) {}
      setCloudMsg(ok
        ? "同步金鑰已複製！存到記事本或 LINE 給自己，換裝置時用。"
        : "自動複製失敗，請改用線上版（https 網址）的「複製同步金鑰」。金鑰含密鑰，請勿截圖外流。");
    }
  };

  const clearCloud = async () => {
    if (!(await window.appConfirm("確定清除雲端設定嗎？（資料本身不會刪除，只是取消連線）"))) return;
    await saveCloudCfg({ apiKey: "", binId: "", phrase: "" });
    setCloudMsg("雲端設定已清除。");
  };

  // 本機備份
  const stamp = () => new Date().toLocaleString("sv-SE").replace(/[: ]/g, "-");
  const payload = () => JSON.stringify(state);

  // 卡片盒匯出成 Obsidian 筆記包（zip：一卡一個 Markdown 檔）
  const exportObsidian = () => {
    try {
      const cards = state.zettel || [];
      if (!cards.length) { setMsg("卡片盒還沒有卡片，先去「卡片盒」分頁建幾張吧。"); return; }
      const zip = makeZip(zettelToObsidianFiles(cards));
      const blob = new Blob([zip], { type: "application/zip" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `卡片盒-Obsidian-${stamp()}.zip`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      setMsg("已匯出 " + cards.length + " 張卡片。解壓縮後，把「卡片盒」資料夾整個放進 Obsidian 儲存庫（vault）資料夾即可。");
    } catch (e) { setMsg("匯出失敗：" + ((e && e.message) || "未知錯誤")); }
  };

  // Obsidian 匯入（.md → 卡片盒）：同標題更新內容/標籤，新標題建新卡
  const obsidianRef = useRef(null);
  const importObsidian = async (e) => {
    const files = Array.from(e.target.files || []).filter((f) => /\.md$/i.test(f.name));
    e.target.value = "";
    if (!files.length) { setMsg("沒有選到 .md 檔（可在檔案視窗按 Ctrl+A 全選）。"); return; }
    try {
      let z = state.zettel || [];
      let updated = 0, created = 0;
      for (const f of files) {
        const raw = await f.text();
        let body = raw, tags = [], createdDate = "";
        const fm = raw.match(/^---\n([\s\S]*?)\n---\n?/);
        if (fm) {
          body = raw.slice(fm[0].length);
          const tagLine = fm[1].match(/tags:\s*\[(.*?)\]/);
          if (tagLine) tags = tagLine[1].split(",").map((s) => s.replace(/["']/g, "").trim()).filter(Boolean);
          const cLine = fm[1].match(/created:\s*(\S+)/);
          if (cLine) createdDate = cLine[1];
        }
        let title = f.name.replace(/\.md$/i, "").trim();
        const h1 = body.match(/^#\s+(.+)$/m);
        if (h1) title = h1[1].trim();
        const content = body.replace(/^#\s+.+\n?/m, "").replace(/\n?##\s*相關卡片[\s\S]*$/, "").trim();
        const hit = findCardByTitle(z, title);
        if (hit) {
          z = z.map((c) => c.id === hit.id ? { ...c, content, tags: tags.length ? tags : (c.tags || []) } : c);
          updated++;
        } else {
          z = [{ id: uid(), num: String(z.length + 1), date: createdDate || todayISO(), links: [], type: "permanent", title, content, tags }, ...z];
          created++;
        }
      }
      restoreAll({ ...state, zettel: z });
      setMsg("Obsidian 匯入完成：更新 " + updated + " 張、新增 " + created + " 張卡片。（[[連結]] 依標題自動生效）");
    } catch (err) { setMsg("匯入失敗：" + ((err && err.message) || "未知錯誤")); }
  };

  // ── 容量儀表:估算本機儲存空間使用量（瀏覽器約給 5MB，含程式快取）
  const QUOTA_CHARS = 5 * 1024 * 1024;
  const usedChars = useMemo(() => {
    try {
      let n = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        n += k.length + (localStorage.getItem(k) || "").length;
      }
      return n;
    } catch (e) { return payload().length; }
  }, [state]);
  const usedPct = Math.min(100, Math.round((usedChars / QUOTA_CHARS) * 100));
  const quotaColor = usedPct >= 80 ? "#cf2d56" : usedPct >= 60 ? "#c08532" : "var(--brand)";

  const counts = {
    行程: state.events.length, 待辦: state.todos.length,
    IG: state.igPosts.length, 收藏: state.trends.length,
    手帳: state.journal.length, 信件: state.emails.length,
  };

  const downloadFile = () => {
    try {
      const blob = new Blob([payload()], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url; a.download = `館長手帳備份-${stamp()}.json`;
      document.body.appendChild(a); a.click();
      document.body.removeChild(a); URL.revokeObjectURL(url);
      try { localStorage.setItem(LAST_BACKUP_KEY, String(Date.now())); } catch (e2) {} // 記下備份時間，清除提醒
      setMsg("已下載備份檔，請妥善保存。");
    } catch (e) { setMsg("下載失敗，可改用「複製備份碼」保存。"); }
  };

  const copyCode = async () => {
    try { await navigator.clipboard.writeText(payload()); try { localStorage.setItem(LAST_BACKUP_KEY, String(Date.now())); } catch (e2) {} setMsg("備份碼已複製！貼到記事本或傳給自己保存。"); }
    catch (e) { setShowCode(true); setMsg("請手動全選下方備份碼複製。"); }
  };

  const onFile = async (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    let data;
    try { data = JSON.parse(await f.text()); }
    catch (err) { setMsg("檔案讀取失敗，請確認是本 App 匯出的備份檔。"); e.target.value = ""; return; }
    if (!(await window.appConfirm("還原會用這個檔案「覆蓋」現在手帳裡的全部資料，且幾秒後會自動同步到雲端，等於本機和雲端一起被覆蓋。確定要覆蓋嗎？建議先按上方「下載備份檔」保存目前資料。"))) { e.target.value = ""; return; }
    try { restoreAll(data); setMsg("還原完成，資料已回來了。"); }
    catch (err) { setMsg("還原失敗：" + ((err && err.message) || "未知錯誤")); }
    e.target.value = "";
  };

  const restoreFromCode = async () => {
    if (!pasteCode.trim()) return;
    let parsed;
    try { parsed = JSON.parse(pasteCode); }
    catch (e) { setMsg("備份碼格式不對，請貼完整的備份碼。"); return; }
    if (!(await window.appConfirm("還原會用備份碼「覆蓋」現在手帳裡的全部資料，且幾秒後會自動同步到雲端，等於本機和雲端一起被覆蓋。確定要覆蓋嗎？建議先按上方「下載備份檔」保存目前資料。"))) return;
    try { restoreAll(parsed); setPasteCode(""); setMsg("還原完成，資料已回來了。"); }
    catch (e) { setMsg("還原失敗：" + ((e && e.message) || "未知錯誤")); }
  };

  return (
    <div className="dp-wrap">
      <header className="dp-head">
        <div>
          <div className="dp-eyebrow">資料備份</div>
          <h1 className="dp-h1">備份與同步</h1>
        </div>
      </header>

      <div className="dp-import" style={{ background: "#f7f7f4" }}>
        <p className="dp-import-sub" style={{ marginBottom: 14 }}>
          啟用雲端同步後，電腦和 iPad 可以共用同一份資料。建議同時搭配本機備份，雙重保險。
        </p>
        <div className="dp-backcount">
          {Object.entries(counts).map(([k, v]) => (
            <span key={k} className="dp-bc"><b>{v}</b> {k}</span>
          ))}
        </div>
      </div>

      {/* ── 容量儀表 ── */}
      <div className="dp-quota">
        <div className="dp-quota-head">
          <span>📦 本機儲存空間（估計）</span>
          <b style={{ color: quotaColor }}>{(usedChars / 1048576).toFixed(2)} MB / 5 MB（{usedPct}%）</b>
        </div>
        <div className="dp-quota-bar"><span style={{ width: usedPct + "%", background: quotaColor }} /></div>
        {usedPct >= 80 ? (
          <p className="dp-quota-warn">⚠️ 空間已用超過 8 成！請先下載備份檔，再刪除一些舊資料或書封縮圖，避免之後存檔失敗。</p>
        ) : (
          <p className="dp-ai-sub" style={{ marginTop: 8 }}>
            瀏覽器給每個網站約 5MB 空間（含程式快取）。若空間滿了導致存檔失敗，畫面頂端會跳出紅色警告提醒你備份。
          </p>
        )}
      </div>

      {/* ── 雲端同步 ── */}
      <div className="dp-ai dp-cloud-box" style={{ borderColor: isConfigured ? "var(--brand)" : "#e5d5b5" }}>
        <div className="dp-ai-t">☁️ 雲端同步（跨裝置）</div>

        {!cloudLoaded ? (
          <p className="dp-ai-sub">讀取設定中…</p>
        ) : isConfigured ? (
          /* ── 已連線狀態 ── */
          <>
            <div className="dp-cloud-status">
              <span className="dp-cloud-dot" />雲端同步已連線・資料已加密 🔐
            </div>
            <p className="dp-ai-sub" style={{ marginTop: 6 }}>
              <b>推送</b>：加密後存到雲端。<b>拉取</b>：從雲端解密還原到這台。換裝置前先推送，新裝置上先拉取。
            </p>
            <p className="dp-ai-sub" style={{ marginTop: 4 }}>
              ☁️ 為節省雲端空間，上傳的封面圖片不會同步；其他裝置需自行重新上傳封面。文字資料完整同步（本機備份碼／備份檔不受影響，仍含圖片）。
            </p>
            <div className="dp-ai-bar" style={{ marginTop: 10, flexWrap: "wrap" }}>
              <button className="dp-btn solid" disabled={cloudBusy} onClick={pushToCloud}>
                {cloudBusy ? "處理中…" : "⬆ 推送到雲端"}
              </button>
              <button className="dp-btn solid" disabled={cloudBusy} onClick={pullFromCloud}>
                {cloudBusy ? "處理中…" : "⬇ 從雲端拉取"}
              </button>
            </div>
            <div className="dp-ai-bar" style={{ marginTop: 8, flexWrap: "wrap" }}>
              <button className="dp-btn" onClick={copySyncToken}>📋 複製同步金鑰</button>
              <button className="dp-btn" style={{ color: "var(--muted)" }} onClick={clearCloud}>取消連線</button>
            </div>
            <label className="dp-sync-auto">
              <input
                type="checkbox"
                checked={cloudCfg.auto !== false}
                onChange={(e) => saveCloudCfg({ ...cloudCfg, auto: e.target.checked })}
              />
              自動同步：打開 App 自動拉取最新資料、變更後幾秒自動推送（左側欄會顯示同步狀態；調整此開關後請重新整理生效）
            </label>
            {cloudMsg && (
              <div className={"dp-import-msg" + (cloudMsg.startsWith("❌") ? " dp-cloud-err" : "")} style={{ marginTop: 10 }}>
                {cloudMsg}
              </div>
            )}
          </>
        ) : (
          /* ── 尚未設定 ── */
          <>
            <div className="dp-segs" style={{ marginBottom: 14 }}>
              <button className={"dp-seg" + (setupTab === "new" ? " on" : "")} onClick={() => { setSetupTab("new"); setCloudMsg(""); }}>
                首次設定（這台）
              </button>
              <button className={"dp-seg" + (setupTab === "paste" ? " on" : "")} onClick={() => { setSetupTab("paste"); setCloudMsg(""); }}>
                換裝置貼金鑰
              </button>
            </div>

            {setupTab === "paste" ? (
              /* 換裝置流程 */
              <>
                <p className="dp-ai-sub">需要兩樣東西：<b>同步金鑰</b>（指定位置）＋ <b>加密密語</b>（解鎖內容）。</p>
                <textarea className="dp-ta" rows={2}
                  placeholder="① 貼上同步金鑰（格式：xxxxxxxx:::yyyyyyyy）"
                  value={tokenInput} onChange={(e) => setTokenInput(e.target.value)} />
                <input className="dp-src" style={{ marginTop: 9 }}
                  type="password"
                  placeholder="② 輸入加密密語（與首次設定時相同）"
                  value={pastePhrase} onChange={(e) => setPastePhrase(e.target.value)} />
                <div className="dp-ai-bar">
                  <button className="dp-btn solid"
                    disabled={!tokenInput.trim() || !pastePhrase.trim()} onClick={applyToken}>
                    套用
                  </button>
                </div>
              </>
            ) : (
              /* 首次設定流程 */
              <>
                <ol className="dp-cloud-steps">
                  <li>到 <a href="https://github.com/settings/personal-access-tokens/new" target="_blank" rel="noopener noreferrer" className="dp-link">GitHub 建立 Fine-grained Token</a>（免費）</li>
                  <li>Expiration 選久一點；Account permissions 裡把 <b>Gists</b> 設成 <b>Read and write</b></li>
                  <li>按 Generate token，複製 <b>github_pat_…</b> 那串貼到下方，設好加密密語按「建立」</li>
                  <li>成功後：複製同步金鑰存起來，並記住你的密語（兩者分開保管）</li>
                </ol>
                <input className="dp-src" style={{ marginTop: 10, fontSize: 13 }}
                  type="password"
                  placeholder="① 貼上 GitHub Token（github_pat_…）"
                  value={apiKeyInput} onChange={(e) => setApiKeyInput(e.target.value)} />
                <input className="dp-src" style={{ marginTop: 9, fontSize: 13 }}
                  type="password"
                  placeholder="② 設定加密密語（自訂，至少 6 字，換裝置時要填）"
                  value={phraseInput} onChange={(e) => setPhraseInput(e.target.value)} />
                <p className="dp-ai-sub" style={{ marginTop: 6 }}>
                  🔐 資料上傳前會在你的裝置上先加密，GitHub Gist 存的是密文。密語不會傳送到任何伺服器。
                </p>
                <div className="dp-ai-bar">
                  <button className="dp-btn solid" disabled={cloudBusy || !apiKeyInput.trim() || !phraseInput.trim()} onClick={createBin}>
                    {cloudBusy ? "建立中…" : "建立雲端儲存"}
                  </button>
                </div>
              </>
            )}

            {cloudMsg && (
              <div className={"dp-import-msg" + (cloudMsg.startsWith("❌") ? " dp-cloud-err" : "")} style={{ marginTop: 10 }}>
                {cloudMsg}
              </div>
            )}
          </>
        )}
      </div>

      {/* ── 本機備份 ── */}
      <div className="dp-ai">
        <div className="dp-ai-t">本機備份（雙重保險）</div>
        <p className="dp-ai-sub">雲端之外再存一份，以防萬一。</p>
        <div className="dp-ai-bar" style={{ marginTop: 6 }}>
          <button className="dp-btn solid" onClick={downloadFile}>⬇ 下載備份檔</button>
          <button className="dp-btn" onClick={copyCode}>複製備份碼</button>
          <button className="dp-btn" onClick={exportObsidian}>🗂 匯出 Obsidian 筆記</button>
          <button className="dp-btn" onClick={() => obsidianRef.current && obsidianRef.current.click()}>🗂 匯入 Obsidian 筆記</button>
          <input ref={obsidianRef} type="file" accept=".md" multiple style={{ display: "none" }} onChange={importObsidian} />
        </div>
        {showCode && (
          <textarea className="dp-ta" rows={4} readOnly value={payload()} style={{ marginTop: 11 }}
            onFocus={(e) => e.target.select()} />
        )}
      </div>

      <div className="dp-ai">
        <div className="dp-ai-t">本機還原</div>
        <div className="dp-ai-bar" style={{ marginTop: 0, marginBottom: 11 }}>
          <button className="dp-btn solid" onClick={() => fileRef.current && fileRef.current.click()}>選擇備份檔還原</button>
          <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }} onChange={onFile} />
        </div>
        <textarea className="dp-ta" rows={3} placeholder="或貼上備份碼…"
          value={pasteCode} onChange={(e) => setPasteCode(e.target.value)} />
        <div className="dp-ai-bar">
          <button className="dp-btn" onClick={restoreFromCode}>用備份碼還原</button>
        </div>
      </div>

      {/* ── Gemini API Key ── */}
      <div className="dp-ai">
        <div className="dp-ai-t">🤖 Gemini API Key</div>
        <p className="dp-ai-sub">
          AI 功能（萃取待辦、手帳草稿、發想卡片、心智圖…）需要 Gemini API Key，完全免費。
          前往 <a className="dp-link" href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener noreferrer">aistudio.google.com</a> 用 Google 帳號登入即可取得，儲存在本機。
        </p>
        <div className="dp-ai-bar" style={{ marginTop: 0, flexWrap: "wrap" }}>
          <input
            type="password"
            className="dp-src"
            style={{ flex: 1, minWidth: 220, marginBottom: 0 }}
            placeholder="AIzaSy…"
            value={keyInput}
            onChange={(e) => setKeyInput(e.target.value)}
            onKeyDown={(e) => e.key === "Enter" && saveAnthropicKey()}
          />
          <button className="dp-btn solid" onClick={saveAnthropicKey} disabled={!keyInput.trim()}>儲存</button>
        </div>
        <div className="dp-ai-bar" style={{ marginTop: 10, flexWrap: "wrap", alignItems: "center" }}>
          <span className="dp-hint" style={{ marginRight: 2 }}>AI 模型</span>
          <select className="dp-src" style={{ marginBottom: 0, maxWidth: 340 }} value={modelSel} onChange={(e) => onChangeModel(e.target.value)}>
            {GEMINI_MODELS.map((m) => <option key={m.id} value={m.id}>{m.label}</option>)}
          </select>
        </div>
        {getAnthropicKey() && (
          <div className="dp-import-msg" style={{ marginTop: 10 }}>✅ Gemini API Key 已設定，AI 功能正常使用中。</div>
        )}
      </div>

      {msg && <div className="dp-import-msg" style={{ marginTop: 4 }}>{msg}</div>}

      <p className="dp-hint" style={{ marginTop: 16, lineHeight: 1.7 }}>
        ⚠️ 「從雲端拉取」和「本機還原」都會覆蓋目前資料，操作前請確認方向正確。
      </p>
    </div>
  );
}

// ─── small components ────────────────────────────────────────
function Card({ title, count, action, children }) {
  return (
    <div className="dp-card">
      <div className="dp-card-h">
        <span>{title}</span>
        <span className="dp-card-c" onClick={action}>{count} ›</span>
      </div>
      <div className="dp-card-b">{children}</div>
    </div>
  );
}
function Row({ dot, children }) {
  return <div className="dp-il"><i className="dp-il-d" style={{ background: dot }} /><span>{children}</span></div>;
}
function Empty({ children }) {
  return <div className="dp-empty">{children}</div>;
}
// ─── styles ──────────────────────────────────────────────────
const CSS = `
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Noto+Sans+TC:wght@400;500;700&family=Caveat:wght@600&family=EB+Garamond:wght@400;500&family=Inter:wght@400;500&display=swap');
:root{--bg:#f7f7f4;--card:#f2f1ed;--card2:#fbfbf9;--line:#cdcdc9;--brand:#34785c;--accent:#f54e00;--sub:#a1a19f;--gold:#c08532;--blue:#3D5A8A;--ink:#26251e;--muted:#84847e;--mono:ui-monospace,SFMono-Regular,Menlo,Consolas,'Noto Sans TC',monospace;--hair:rgba(38,37,30,.08);}
::selection{background:#8BC4F8;}
html,body{background:var(--bg);color:var(--ink);}

*{box-sizing:border-box;margin:0;padding:0}
.dp-root{
  display:flex;flex-direction:column;min-height:100vh;width:100%;
  font-family:'Inter','Noto Sans TC',sans-serif;
  color:var(--ink);background:#f2f1ed;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}

/* 上方分頁列（電腦＋手機共用）：固定頂端、可橫向滑動、隱藏卷軸（無滑動軌跡） */
.dp-spine{
  width:100%;background:rgba(247,247,244,.92);backdrop-filter:blur(8px);color:var(--ink);
  display:flex;flex-direction:row;align-items:stretch;gap:4px;padding:0 12px;
  position:sticky;top:0;z-index:30;box-shadow:0 1px 0 var(--hair);
}
.dp-brand{display:flex;flex-direction:row;align-items:center;gap:8px;padding:0 14px 0 2px;flex-shrink:0;border-right:1px solid var(--hair)}
.dp-bear{font-size:16px;color:#c08532}
.dp-brand-t{font-family:'Inter','Noto Sans TC',sans-serif;font-weight:500;font-size:15px;letter-spacing:0;white-space:nowrap}

.dp-tabs{display:flex;flex-direction:row;align-items:stretch;gap:2px;flex:1 1 auto;min-width:0;overflow-x:auto;overflow-y:hidden;-webkit-overflow-scrolling:touch;scrollbar-width:none;-ms-overflow-style:none;scroll-snap-type:x proximity}
.dp-tabs::-webkit-scrollbar{width:0;height:0;display:none}
.dp-tab{
  flex:0 0 auto;scroll-snap-align:start;white-space:nowrap;
  display:flex;align-items:center;padding:13px 15px 11px;
  border-bottom:2px solid transparent;transition:.15s;color:var(--muted);
}
.dp-tab:hover{color:var(--ink);background:rgba(38,37,30,.04)}
.dp-tab.on{color:#34785c;border-bottom-color:#34785c;background:transparent}
.dp-tab-l{font-weight:500;font-size:14px}
.dp-tab-s{display:none}
.dp-spine-foot{display:none}
.dp-voice-bar{display:flex;align-items:center;gap:8px;margin:6px 0}
.dp-voice-btn{background:#f2f1ed;border:1px solid #cdcdc9;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;transition:.15s}
.dp-voice-btn:hover{background:var(--line)}
.dp-voice-btn.active{background:var(--accent);color:var(--card2);border-color:var(--accent);animation:dp-pulse .8s infinite}
@keyframes dp-pulse{0%,100%{opacity:1}50%{opacity:.7}}
.dp-voice-interim{font-size:12px;color:var(--muted);font-style:italic}

/* page */
.dp-page{flex:1;min-width:0;padding:30px clamp(16px,4vw,52px) 60px}
.dp-loading{padding:80px;text-align:center;color:var(--muted);font-size:16px}
.dp-savewarn{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:9999;max-width:min(92vw,560px);background:#cf2d56;color:var(--card2);padding:11px 18px;font-size:13.5px;font-weight:600;line-height:1.55;border-radius:4px;box-shadow:0 6px 18px rgba(0,0,0,.25)}
.dp-backupwarn{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:9998;max-width:min(92vw,560px);display:flex;align-items:center;gap:10px;background:#c08532;color:#26251e;padding:10px 14px;font-size:13px;font-weight:600;line-height:1.5;border-radius:4px;box-shadow:0 6px 18px rgba(0,0,0,.2)}
.dp-backupwarn-go{flex:none;background:#26251e;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12.5px;font-weight:500;cursor:pointer}
.dp-backupwarn-x{flex:none;background:transparent;border:none;color:#26251e;font-size:15px;font-weight:500;cursor:pointer;padding:2px 4px;line-height:1}
.dp-savewarn b{font-weight:600;text-decoration:underline}
.dp-offline-bar{position:fixed;top:0;left:50%;transform:translateX(-50%);z-index:9997;background:var(--gold);color:var(--card2);padding:6px 16px;border-radius:0 0 4px 4px;font-size:13px;font-weight:600;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.dp-quota{background:#f7f7f4;border:1px solid var(--line);border-radius:4px;padding:14px 16px;margin-bottom:16px}
.dp-quota-head{display:flex;justify-content:space-between;align-items:center;font-size:13px;font-weight:500;color:#45443d;gap:8px;flex-wrap:wrap}
.dp-quota-bar{height:8px;background:#f2f1ed;border-radius:4px;margin-top:8px;overflow:hidden}
.dp-quota-bar span{display:block;height:100%;border-radius:4px;transition:width .4s ease}
.dp-quota-warn{margin:8px 0 0;font-size:12.5px;font-weight:500;color:#cf2d56}
.dp-syncmodal{position:fixed;inset:0;z-index:9998;background:rgba(38,37,30,.45);display:flex;align-items:center;justify-content:center;padding:20px}
.dp-syncmodal-box{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px 24px;max-width:480px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.25)}
.dp-sync-auto{display:flex;gap:8px;align-items:flex-start;margin-top:12px;font-size:12.5px;color:#45443d;line-height:1.6;cursor:pointer}
.dp-sync-auto input{margin-top:3px;accent-color:var(--brand)}
.dp-wrap{max-width:920px;margin:0 auto}
.dp-head{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:22px;gap:12px;flex-wrap:wrap}
.dp-eyebrow{font-family:var(--mono);font-size:12px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;font-weight:400;margin-bottom:4px}
.dp-h1{font-family:'Inter','Noto Sans TC',sans-serif;font-size:34px;font-weight:400;letter-spacing:-0.02em;line-height:1.15}
.dp-wk{font-size:18px;color:var(--sub)}

/* today grid */
.dp-grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.dp-card{background:var(--card);border:1px solid var(--hair);border-radius:8px;overflow:hidden;box-shadow:none}
.dp-card-h{display:flex;justify-content:space-between;align-items:center;padding:13px 16px;background:#f2f1ed;font-weight:500;font-size:14px;border-bottom:1px solid var(--line)}
.dp-card-c{color:var(--gold);font-size:13px;cursor:pointer}
.dp-card-b{padding:12px 16px;min-height:80px}
.dp-il{display:flex;gap:9px;align-items:baseline;padding:5px 0;font-size:13.5px;line-height:1.5}
.dp-il-d{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:6px}
.dp-due{color:var(--gold);font-size:12px}
.dp-empty{color:var(--muted);font-size:13px;padding:8px 0;font-style:italic}

/* dashboard 摘要列 */
.dp-dash-strip{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px}
.dp-dash-chip{display:inline-flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--hair);border-radius:4px;padding:7px 14px;font-size:13px;font-weight:400;color:var(--ink);cursor:pointer;box-shadow:none}
.dp-dash-chip:hover{background:var(--card2)}

.dp-alert{margin-top:18px;background:#f2ede8;border:1px solid #f3d9c9;border-radius:4px;padding:12px 18px;display:flex;gap:18px;flex-wrap:wrap;align-items:center}
.dp-alert-t{color:var(--accent);font-weight:500;font-size:13px}
.dp-alert-i{font-size:13px;color:#cf2d56}

/* month nav */
.dp-monthnav{display:flex;gap:6px}
.dp-monthnav button{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:7px 13px;font-size:13px;font-weight:500}
.dp-monthnav button:hover{background:var(--card2)}
.dp-imp-toggle{color:var(--gold);font-weight:500}

/* view switch (日/週/月) */
.dp-viewseg{display:inline-flex;background:#eceae5;border-radius:4px;padding:3px;margin-bottom:16px}
.dp-viewseg .dp-seg{padding:7px 20px}

/* week view */
.dp-week{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:22px}
.dp-week-col{display:flex;flex-direction:column;text-align:left;background:var(--card);border:1px solid #e6e5e0;border-radius:4px;min-height:150px;padding:0;overflow:hidden;transition:.12s}
.dp-week-col:hover{border-color:#cdcdc9}
.dp-week-col.sel{border-color:#c08532;border-width:2px}
.dp-week-h{display:flex;flex-direction:column;align-items:center;padding:8px 4px 6px;border-bottom:1px solid #f2f1ed;background:#f2f1ed}
.dp-week-col.today .dp-week-h{background:#26251e}
.dp-week-col.today .dp-week-wd,.dp-week-col.today .dp-week-n{color:var(--card2)}
.dp-week-wd{font-size:11px;font-weight:500;color:var(--muted)}
.dp-week-wd.we{color:var(--accent)}
.dp-week-n{font-family:var(--mono);font-size:16px;font-weight:500;color:#26251e;font-feature-settings:"tnum"}
.dp-week-body{padding:6px 5px;display:flex;flex-direction:column;gap:4px;flex:1}
.dp-week-ev{font-size:11px;line-height:1.4;padding:3px 6px;border-radius:4px;word-break:break-word}
.dp-week-ev b{font-weight:500}
.dp-week-empty{color:#cdcdc9;font-size:12px;text-align:center;margin-top:8px}

/* import panel */
.dp-import{background:#f7f7f4;border:1px solid #e5d5b5;border-radius:4px;padding:16px 18px;margin-bottom:16px}
.dp-import-t{font-weight:500;font-size:14px;color:#26251e;margin-bottom:6px}
.dp-import-sub{font-size:12.5px;color:#84847e;line-height:1.65;margin-bottom:12px}
.dp-import-msg{margin-top:11px;font-size:13px;color:var(--brand);background:#eceae5;border-radius:4px;padding:9px 12px;line-height:1.6}
.dp-backcount{display:flex;gap:14px;flex-wrap:wrap}
.dp-bc{font-size:13px;color:#84847e}
.dp-bc b{font-family:var(--mono);font-size:17px;color:#26251e;margin-right:2px;font-feature-settings:"tnum"}

/* bulk import */
.dp-bulk{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:4px 18px;margin-bottom:18px}
.dp-bulk summary{cursor:pointer;font-size:13.5px;font-weight:500;color:var(--gold);padding:12px 0}
.dp-bulk .dp-ta{margin-bottom:0}
.dp-bulk .dp-import-sub{margin-top:-2px}

.dp-legend{display:flex;gap:16px;flex-wrap:wrap;margin-bottom:14px}
.dp-leg{display:flex;align-items:center;gap:6px;font-size:12.5px;color:#7a7974}
.dp-leg i{width:10px;height:10px;border-radius:50%;display:inline-block}

/* calendar grid */
.dp-cal{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:22px}
.dp-cal-h{text-align:center;font-size:12px;font-weight:500;color:var(--muted);padding:4px 0}
.dp-cal-h.we{color:var(--accent)}
.dp-cal-c{min-height:84px;background:var(--card);border:1px solid #e6e5e0;border-radius:4px;padding:5px;display:flex;flex-direction:column;align-items:flex-start;gap:2px;transition:.12s;overflow:hidden}
.dp-cal-c:hover{background:var(--card2);border-color:#cdcdc9}
.dp-cal-c.empty{background:transparent;border:none;min-height:0}
.dp-cal-c.sel{border-color:#c08532;border-width:2px;background:var(--card2)}
.dp-cal-c.today .dp-cal-n{background:#26251e;color:var(--card2)}
.dp-cal-n{font-size:13px;font-weight:500;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%;flex-shrink:0}
.dp-cal-evs{display:flex;flex-direction:column;gap:2px;width:100%;overflow:hidden}
.dp-cal-ev{font-size:10px;line-height:1.3;padding:1px 4px;border-radius:4px;width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:left}
.dp-cal-more{font-size:9px;color:var(--muted);padding-left:3px}
/* day panel */
.dp-day{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px}
.dp-day-t{font-family:'EB Garamond','Noto Serif TC',serif;font-size:18px;margin-bottom:12px}
.dp-day-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px dashed #e6e5e0}
.dp-chip{font-size:11px;font-weight:500;padding:3px 9px;border-radius:8px;flex-shrink:0}
.dp-catwrap{display:inline-flex;align-items:center;gap:4px;padding:2px 6px 2px 9px;border-radius:8px;flex-shrink:0}
.dp-catdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dp-catsel{border:none;background:transparent;font-size:11px;font-weight:500;padding:1px 0;cursor:pointer;-webkit-appearance:none;appearance:none;text-align:center}
.dp-catsel:focus{outline:none}
.dp-day-time{font-size:13px;color:#7a7974;min-width:46px}
.dp-day-title{flex:1;font-size:14px}
.dp-x{color:#cdcdc9;font-size:13px;padding:3px 6px;border-radius:4px}
.dp-x:hover{color:var(--accent);background:#f2ede8}

.dp-addbar{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.dp-addbar input[type=text],.dp-addbar input:not([type]),.dp-addbar input[placeholder]{flex:1;min-width:120px}
.dp-addbar input,.dp-addbar select,.dp-quick input,.dp-src,.dp-jdate{
  padding:9px 12px;border:1px solid #cdcdc9;border-radius:4px;background:var(--card2);
}
.dp-addbar.ig select,.dp-addbar.ig input{flex:0 1 auto}
.dp-addbar.ig input[placeholder='貼文主題…']{flex:1;min-width:160px}
.dp-btn{background:var(--card2);border:1px solid #cdcdc9;border-radius:4px;padding:9px 18px;font-weight:500;font-size:13px;color:#26251e}
.dp-btn:hover{background:#f2f1ed}
.dp-btn.solid{background:#26251e;color:var(--card2);border-color:#26251e}
.dp-btn.solid:hover{background:#26251e}
.dp-btn.solid:disabled{opacity:.55;cursor:wait}

/* AI panel */
.dp-ai{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px;margin-bottom:18px}
.dp-ai-t{font-weight:500;font-size:14px;margin-bottom:11px;color:#26251e}
.dp-ai-sub{font-size:12.5px;color:#a1a19f;line-height:1.6;margin:-4px 0 12px}

/* segmented control */
.dp-segs{display:inline-flex;background:#eceae5;border-radius:4px;padding:3px;margin-bottom:13px}
.dp-seg{padding:7px 16px;font-size:13px;font-weight:500;border-radius:8px;color:#84847e}
.dp-seg.on{background:var(--card2);color:#26251e;box-shadow:0 1px 2px rgba(0,0,0,.06)}

/* image drop / thumbs */
.dp-drop{border:1.5px dashed #cdcdc9;border-radius:4px;background:var(--card2);min-height:92px;display:flex;align-items:center;justify-content:center;padding:14px;cursor:pointer;color:#84847e;font-size:13.5px;transition:.15s}
.dp-drop:hover{border-color:#c08532;background:var(--card2)df8}
.dp-thumbs{display:flex;gap:10px;flex-wrap:wrap;align-items:center;width:100%}
.dp-thumb{position:relative;width:62px;height:62px;border-radius:4px;overflow:hidden;border:1px solid var(--line)}
.dp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.dp-thumb-x{position:absolute;top:2px;right:2px;background:rgba(38,37,30,.78);color:var(--card2);width:18px;height:18px;border-radius:50%;font-size:10px;display:flex;align-items:center;justify-content:center}
.dp-thumb-add{font-size:12.5px;color:var(--gold);font-weight:500}

/* news category buttons */
.dp-newscats{display:flex;gap:9px;flex-wrap:wrap}
.dp-newscat{padding:9px 15px;background:var(--card2);border:1px solid #cdcdc9;border-radius:4px;font-size:13px;font-weight:500;color:#26251e;transition:.12s}
.dp-newscat:hover{background:#f2f1ed;border-color:#cdcdc9}
.dp-newscat.copied{background:#eceae5;border-color:var(--brand);color:var(--brand);font-weight:500}
.dp-ta{width:100%;padding:12px;border:1px solid #cdcdc9;border-radius:4px;background:var(--card2);resize:vertical;line-height:1.6}
.dp-src{width:100%;margin-bottom:9px}
.dp-ai-bar{display:flex;align-items:center;gap:12px;margin-top:11px;flex-wrap:wrap}
.dp-ai-bar.gen{margin:0 0 18px}
.dp-err{color:var(--accent);font-size:13px}
.dp-hint{color:var(--muted);font-size:12px}

.dp-quick{display:flex;gap:8px;margin-bottom:18px}
.dp-quick input{flex:1}

/* todos */
.dp-todos{display:flex;flex-direction:column;gap:8px}
.dp-todo{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:12px 14px}
.dp-check{width:20px;height:20px;border:2px solid #cdcdc9;border-radius:4px;flex-shrink:0}
.dp-check:hover{border-color:#26251e}
.dp-check.on{background:#26251e;border-color:#26251e;position:relative}
.dp-check.on::after{content:'✓';color:var(--card2);font-size:13px;position:absolute;top:-2px;left:3px}
.dp-todo-b{flex:1;display:flex;flex-direction:column;gap:3px}
.dp-todo-text{font-size:14.5px}
.dp-todo-meta{display:flex;gap:8px;align-items:center;font-size:12px;color:#a1a19f}
.dp-todo-meta em{font-style:normal}
.dp-pri{font-style:normal;font-size:11px;font-weight:500;padding:1px 8px;border-radius:8px}
.dp-pri.高{background:#f2ede8;color:var(--accent)}
.dp-pri.中{background:#f2f1ed;color:#34785c}
.dp-pri.低{background:#eceae5;color:#84847e}
.dp-todo.done .dp-todo-text{text-decoration:line-through;color:#a1a19f}
.dp-done{margin-top:16px}
.dp-done summary{cursor:pointer;font-size:13px;color:var(--muted);padding:8px 0;font-weight:500}
.dp-done .dp-todo{margin-top:6px}

/* IG */
.dp-iglist{display:flex;flex-direction:column;gap:9px}
.dp-igfilter{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px}
.dp-igf{display:inline-flex;align-items:center;gap:5px;padding:7px 13px;background:var(--card2);border:1px solid #cdcdc9;border-radius:8px;font-size:12.5px;font-weight:500;color:#7a7974}
.dp-igf i{width:8px;height:8px;border-radius:50%}
.dp-igf.on{background:#26251e;border-color:#26251e;color:var(--card2)}
.dp-igf.on i{display:none}
.dp-igf-more{border-style:dashed;color:var(--gold)}
.dp-igcard-wrap{margin-bottom:9px}
.dp-igcard{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:4px;padding:12px 14px;cursor:pointer}
.dp-igcard:hover{background:var(--card2)}
.dp-ig-caret{font-size:9px;color:#a1a19f;flex-shrink:0}
.dp-igdetail{background:var(--card2);border:1px solid var(--line);border-top:none;border-radius:0 0 12px 12px;margin:-4px 6px 0;padding:14px 16px}
.dp-igdetail-h{font-size:12px;font-weight:500;color:var(--gold);letter-spacing:1px;margin-bottom:9px}
.dp-igdetail .dp-ta{font-size:13px;line-height:1.7;margin-bottom:7px}
.dp-ig-date{font-family:var(--mono);font-size:14px;font-weight:500;min-width:48px;color:#26251e;font-feature-settings:"tnum"}
.dp-ig-mid{flex:1}
.dp-ig-acc{font-size:12px;color:#a1a19f;font-weight:500}
.dp-ig-topic{font-size:14.5px;margin-top:2px}
.dp-ig-type{font-size:11px;font-weight:500;background:#f2f1ed;padding:1px 8px;border-radius:8px;color:#7a7974}
.dp-status{font-size:12px;font-weight:500;padding:5px 12px;border-radius:8px;border:1px solid transparent}
.dp-status.草稿{background:#eceae5;color:#84847e}
.dp-status.待發{background:#f2f1ed;color:#c08532}
.dp-status.已發{background:#eceae5;color:var(--brand)}

.dp-ig-count{font-size:12.5px;color:var(--muted);margin-bottom:12px}
.dp-ig-count b{color:var(--brand)}
.dp-ig-month{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--gold);padding:10px 0 6px;border-bottom:1px solid var(--line);margin:14px 0 8px;letter-spacing:.04em;text-transform:uppercase}
/* trends */
.dp-trends{display:flex;flex-direction:column;gap:10px;margin-bottom:26px}

/* zettelkasten */
.dp-wikilink{color:var(--blue);font-weight:500;cursor:pointer;text-decoration:underline dotted;text-underline-offset:3px}
/* global search */
.dp-gsbtn{margin:0 14px 10px;padding:7px 10px;border:1px solid rgba(255,255,255,.25);border-radius:4px;background:transparent;color:#e6e5e0;font-size:13px;cursor:pointer;text-align:left}
.dp-gsbtn:hover{background:rgba(255,255,255,.08)}
.dp-gsres{max-height:46vh;overflow-y:auto;margin-top:10px}
.dp-gsitem{display:flex;gap:10px;align-items:baseline;width:100%;text-align:left;padding:8px 10px;border:none;border-bottom:1px dashed #e6e5e0;background:transparent;cursor:pointer;font-size:14px;border-radius:8px}
.dp-gsitem b{font-size:11px;color:var(--sub);white-space:nowrap}
.dp-gsitem span{min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dp-gsitem.on{background:#eceae5}
.dp-zc-sum{margin:8px 0 6px;padding:9px 12px;border-left:3px solid var(--gold);background:#efe9dc;border-radius:0 8px 8px 0;font-size:13px;color:#45443d}
.dp-zc-sum b{font-size:11px;letter-spacing:.5px}
.dp-zc-sum p{margin:4px 0 0;line-height:1.6;white-space:pre-wrap}
.dp-zsug{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:7px 0;border-bottom:1px dashed #e6e5e0;font-size:13px}
.dp-zsug-t{font-weight:500}
.dp-zsug-why{color:#84847e;font-size:12px}
.dp-zsug-btns{margin-left:auto;display:flex;gap:6px}
.dp-wikilink.missing{color:#c08532}
.dp-fab{position:fixed;right:22px;bottom:22px;z-index:900;width:52px;height:52px;border-radius:50%;border:none;background:var(--brand);color:var(--card2);font-size:22px;box-shadow:0 6px 18px rgba(38,37,30,.35);cursor:pointer}
.dp-fab:hover{background:#26251e}
.dp-zc-todo{margin-left:6px;font-size:10px;font-weight:500;color:var(--card2);background:var(--gold);border-radius:4px;padding:1px 5px;vertical-align:1px}
.dp-zsearch{margin-bottom:14px}
.dp-zsearch input{width:100%;padding:10px 14px;border:1px solid #cdcdc9;border-radius:4px;background:var(--card2);font-size:14px}
.dp-zgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px}
.dp-mapwrap{position:relative;width:100%;height:460px;background:var(--card);border:1px solid var(--line);border-radius:8px;overflow:hidden}
.dp-maplines{position:absolute;inset:0;width:100%;height:100%}
.dp-mapnode{position:absolute;transform:translate(-50%,-50%);max-width:176px;display:flex;flex-direction:column;align-items:center;gap:2px;background:var(--card2);border:2px solid #ccc;border-radius:4px;padding:7px 11px;font-size:11.5px;line-height:1.35;box-shadow:0 1px 3px rgba(0,0,0,.08);cursor:pointer;transition:.12s}
.dp-mapnode span{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;text-align:center;color:var(--ink)}
.dp-mapnode b{font-size:10px}
.dp-mapnode.center{max-width:210px;border-width:3px;background:#f7f7f4;font-weight:500;z-index:2}
.dp-mapnode.center span{-webkit-line-clamp:4}
.dp-mapnode:hover{box-shadow:0 3px 10px rgba(0,0,0,.16);z-index:3}
.dp-zcard{position:relative;text-align:left;background:var(--card);border:1px solid var(--line);border-left-width:4px;border-radius:4px;padding:14px 15px;transition:.12s;cursor:pointer}
.dp-zcard-del{position:absolute;top:8px;right:8px;font-size:11px;color:#cdcdc9;padding:2px 6px;border-radius:4px;opacity:0;transition:.15s;background:transparent}
.dp-zcard:hover .dp-zcard-del{opacity:1}
.dp-zcard-del:hover{color:var(--accent);background:#f2ede8}
.dp-hint-link{display:inline;background:none;border:none;padding:0;cursor:pointer;text-decoration:underline;font-size:12px;color:var(--gold)}
.dp-zcard:hover{background:var(--card2);border-color:#cdcdc9}
.dp-zc-meta{font-size:11px;font-weight:500;margin-bottom:5px}
.dp-zc-h{font-weight:500;font-size:14px;line-height:1.4;margin-bottom:8px}
.dp-zc-excerpt{font-size:12px;color:var(--muted);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.dp-zc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:10px;gap:8px}
.dp-zc-tags.sm span,.dp-zc-tags span{font-size:10px;background:#f2f1ed;color:var(--gold);padding:2px 7px;border-radius:8px;font-weight:500;margin-right:4px;display:inline-block}
.dp-zc-linkn{font-size:11px;color:#a1a19f;flex-shrink:0}
.dp-zcard-full{background:var(--card);border:2px solid var(--brand);border-radius:8px;padding:20px 22px}
.dp-zc-top{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.dp-zc-tag{font-size:11px;font-weight:500;color:var(--card2);padding:3px 10px;border-radius:8px}
.dp-zc-top .dp-tdate{margin-left:auto}
.dp-zc-title{font-family:'EB Garamond','Noto Serif TC',serif;font-size:22px;margin:10px 0}
.dp-zc-body{font-size:14.5px;line-height:1.85;color:#3a3933;margin-bottom:16px;white-space:pre-wrap}
.dp-zc-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
.dp-zc-links{margin-top:6px}
.dp-zc-link{display:block;width:100%;text-align:left;background:var(--card2);border:1px solid var(--line);border-left-width:3px;border-radius:4px;padding:10px 13px;font-size:13.5px;margin-bottom:7px}
.dp-zc-link:hover{background:#f7f7f4}
.dp-zlinkrow{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:13px;border-bottom:1px dashed #e6e5e0;cursor:pointer}
.dp-zlinkrow b{color:#26251e}

/* done log */
.dp-donegrp{margin-bottom:14px}
.dp-donedate{font-family:var(--mono);font-size:13px;font-weight:500;color:#26251e;margin-bottom:7px;font-feature-settings:"tnum"}
.dp-doneitem{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:10px 13px;margin-bottom:6px}
.dp-donecheck{width:20px;height:20px;background:#26251e;color:var(--card2);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.dp-donetext{flex:1;font-size:14px;color:#45443d}
.dp-donereopen{font-size:11px;padding:5px 11px}

/* ideas */
.dp-ideas{display:flex;flex-direction:column;gap:14px}
.dp-idea{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:16px 18px}
.dp-idea-top{display:flex;align-items:center;gap:9px;margin-bottom:8px;flex-wrap:wrap}
.dp-idea-seg{display:inline-flex;background:#eceae5;border-radius:4px;padding:2px;margin-left:auto}
.dp-idea-seg button{font-size:11px;font-weight:500;padding:4px 11px;border-radius:4px;color:#84847e}
.dp-idea-seg button.on{background:var(--card2);color:#26251e}
.dp-idea-title{font-family:'EB Garamond','Noto Serif TC',serif;font-size:20px;margin-bottom:14px}
.dp-idea-sec{margin-bottom:16px}
.dp-idea-h{font-size:12px;font-weight:500;color:var(--gold);letter-spacing:1px;margin-bottom:9px}
.dp-idea-sum{display:flex;gap:9px;font-size:13.5px;line-height:1.7;margin-bottom:5px}
.dp-idea-sum b{color:var(--gold);flex-shrink:0}
.dp-idea-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.dp-idea-br{background:var(--card2);border-radius:4px;padding:11px 13px;border-left:3px solid var(--brand)}
.dp-idea-area{font-weight:500;font-size:13px;margin-bottom:6px}
.dp-idea-pt{font-size:12.5px;line-height:1.55;color:#45443d;margin-bottom:3px}
.dp-idea-act{display:flex;gap:9px;align-items:center;font-size:13.5px;padding:5px 0;border-bottom:1px dashed #e6e5e0}
.dp-idea-box{width:18px;height:18px;border:2px solid #cdcdc9;border-radius:4px;flex-shrink:0}
.dp-idea-method{background:#f7f7f4;border:1px solid #e5d5b5;border-radius:4px;padding:12px 15px;font-size:13.5px;line-height:1.6}
.dp-idea-method b{display:block;color:var(--gold);font-size:12px;margin-bottom:5px}

/* mind-map tree */
.dp-tree{display:flex;flex-direction:column;align-items:center}
.dp-tree-core{background:#26251e;color:var(--card2);font-weight:500;font-size:15px;padding:11px 22px;border-radius:4px}
.dp-tree-stem{width:2px;height:16px;background:#cdcdc9}
.dp-tree-branches{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;width:100%}
.dp-tree-br{flex:1 1 160px;min-width:150px}
.dp-tree-area{color:var(--card2);font-weight:500;font-size:13.5px;padding:8px 12px;border-radius:4px;text-align:center;margin-bottom:8px}
.dp-tree-leaf{background:var(--card2);border:1px solid #ccc;border-radius:8px;padding:8px 10px;font-size:12px;line-height:1.5;color:#45443d;margin-bottom:6px}

/* idea tip + clickable leaf */
.dp-idea-tip{font-size:12px;color:var(--muted);margin:-8px 0 14px}
.dp-leaf-btn{display:flex;align-items:center;justify-content:space-between;gap:6px;width:100%;text-align:left;background:var(--card2);border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:12.5px;line-height:1.5;color:#45443d;margin-bottom:6px;transition:.12s}
.dp-leaf-btn:hover{background:#f7f7f4;border-color:#c08532}
.dp-leaf-go{font-style:normal;font-size:10px;font-weight:500;color:var(--gold);background:#f2f1ed;padding:2px 7px;border-radius:8px;flex-shrink:0}

/* review panel */
.dp-review{background:var(--card2);border:2px solid #c08532;border-radius:4px;padding:16px 18px;margin-top:14px}
.dp-review-h{display:flex;justify-content:space-between;align-items:center;font-size:14.5px;font-weight:500;margin-bottom:12px;gap:10px}
.dp-review-tag{font-size:11px;background:#26251e;color:var(--card2);padding:2px 9px;border-radius:8px;margin-right:4px}
.dp-review-modeseg{display:inline-flex;background:#eceae5;border-radius:4px;padding:2px;margin-bottom:14px}
.dp-review-modeseg button{font-size:12px;font-weight:500;padding:5px 13px;border-radius:4px;color:#84847e}
.dp-review-modeseg button.on{background:var(--card2);color:#26251e}
.dp-review-prog{font-size:11px;color:var(--gold);font-weight:500;letter-spacing:1px;margin-bottom:6px}
.dp-review-q{font-size:14.5px;font-weight:500;line-height:1.6;margin-bottom:9px;color:var(--ink)}
.dp-review-litem{margin-bottom:14px}
.dp-review .dp-ta{margin-bottom:0}

/* three columns */
.dp-rvcols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.dp-rvcols>div{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:11px 12px}
.dp-rvc{display:inline-block;font-size:11px;font-weight:500;padding:2px 9px;border-radius:8px;margin-bottom:8px}
.dp-rvc.keep{background:#eceae5;color:var(--brand)}
.dp-rvc.improve{background:#f2f1ed;color:#c08532}
.dp-rvc.next{background:#f2ede8;color:var(--accent)}
.dp-rvcols p{font-size:12.5px;line-height:1.6;color:#3a3933;margin-bottom:5px}
.dp-rvcols em{color:#cdcdc9;font-size:13px}

/* past reviews */
.dp-rvpast{margin-top:14px}
.dp-rvpast summary{cursor:pointer;font-size:13px;color:var(--muted);font-weight:500;padding:8px 0}
.dp-rvitem{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:12px 14px;margin-bottom:8px}
.dp-rvitem-top{display:flex;align-items:center;gap:9px;margin-bottom:9px}
.dp-rvitem-top b{font-size:13.5px;flex:1}
.dp-rvitem-top span{font-size:12px;color:var(--muted)}
.dp-tree-method{margin-top:16px;width:100%;background:#f7f7f4;border:1px solid #e5d5b5;border-radius:4px;padding:12px 16px;font-size:13px;line-height:1.6}
.dp-tree-method b{display:block;color:var(--gold);font-size:12px;margin-bottom:5px}
.dp-tree-acts{margin-top:12px;width:100%;display:flex;flex-direction:column;gap:4px;font-size:13px}
.dp-tree-acts b{color:#26251e;font-size:12px}
.dp-tree-acts span{color:#45443d;line-height:1.5}
.dp-trend{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:14px 16px}
.dp-trend-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.dp-tcat{font-size:11px;font-weight:500;background:#eceae5;color:var(--brand);padding:3px 10px;border-radius:8px}
.dp-tsrc{font-size:12px;color:#a1a19f}
.dp-tdate{font-size:12px;color:#cdcdc9;margin-left:auto}
.dp-tline{font-size:14px;line-height:1.7;color:#3a3933}
.dp-trend-foot{margin-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.dp-trend-foot .dp-btn{font-size:12px;padding:6px 12px}

/* mailbox */
.dp-mailbox{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:18px 20px}
.dp-trend-cols{display:grid;grid-template-columns:minmax(0,1fr);gap:18px;align-items:start}
.dp-trend-main{min-width:0}
.dp-trend-side{min-width:0}
.dp-addbar.mail input{flex:1}
.dp-mail{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px dashed #e6e5e0;font-size:14px}
.dp-mail b{color:var(--blue)}
.dp-mail span{flex:1;color:#45443d}

/* journal */
.dp-jdate{}
.dp-jmat{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.dp-jmat-col{background:var(--card);border:1px solid var(--line);border-radius:4px;padding:14px 16px}
.dp-jmat-h{font-size:12px;font-weight:500;color:var(--gold);letter-spacing:1px;display:block;margin-bottom:8px}
.dp-jmat-col em{color:var(--muted);font-style:italic;font-size:13px}
.dp-jmat-i{display:flex;align-items:center;gap:8px;font-size:13.5px;padding:3px 0}
.dp-jmat-i i{width:7px;height:7px;border-radius:50%}
.dp-jpaper{background:var(--card2);border:1px solid var(--line);border-radius:8px;padding:18px;background-image:repeating-linear-gradient(var(--card2),var(--card2) 31px,#f2f1ed 32px)}
.dp-jtext{width:100%;border:none;background:transparent;resize:vertical;line-height:32px;font-size:15px;font-family:'Caveat','Noto Sans TC',sans-serif;color:#33322c}
.dp-jtext:focus{outline:none}
.dp-jpast{margin-top:12px;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:12px 14px}
.dp-jpast b{color:#26251e;font-size:13px}
.dp-jpast pre{white-space:pre-wrap;font-family:inherit;font-size:13.5px;line-height:1.7;margin-top:6px;color:#45443d}

/* cloud sync */
.dp-cloud-box{border-width:2px !important}
.dp-cloud-status{display:flex;align-items:center;gap:8px;font-weight:500;font-size:13.5px;color:var(--brand);padding:8px 0 2px}
.dp-cloud-dot{width:9px;height:9px;border-radius:50%;background:var(--brand);flex-shrink:0;animation:dp-pulse 2s ease-in-out infinite}
@keyframes dp-pulse{0%,100%{opacity:1}50%{opacity:.3}}
.dp-cloud-steps{margin:8px 0 4px;padding-left:18px;font-size:13.5px;line-height:2.1;color:#45443d}
.dp-cloud-steps b{color:#26251e}
.dp-link{color:var(--blue);font-weight:500;text-decoration:underline}
.dp-import-msg.dp-cloud-err{background:#f2ede8 !important;color:var(--accent) !important;border-color:#f3d9c9 !important}

/* 居家補給 / 效期 */
.dp-addbar.sup .dp-fld{display:flex;flex-direction:column;gap:3px;flex:0 1 auto}
.dp-addbar.sup .dp-fld>span{font-size:11px;color:var(--muted);font-weight:500}
.dp-sup{display:flex;flex-direction:column;gap:8px;margin-bottom:26px}
.dp-sup-card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:4px;padding:10px 13px}
.dp-sup-main{flex:1;min-width:0}
.dp-sup-name{font-weight:500;font-size:14.5px;color:var(--ink)}
.dp-sup-meta{font-size:12px;color:#84847e;margin-top:3px;line-height:1.55}
.dp-sup-due{font-size:12.5px;font-weight:500;white-space:nowrap;padding:4px 11px;border-radius:8px}
.dp-sup-due.over{background:#f2ede8;color:var(--accent)}
.dp-sup-due.soon{background:#f7f7f4;color:#c08532}
.dp-sup-due.ok{background:#eceae5;color:var(--brand)}
/* 書庫：小說 / 漫畫 */
.dp-lib{display:grid;grid-template-columns:repeat(auto-fill,minmax(138px,1fr));gap:14px;margin-bottom:28px;align-items:start}
.dp-lib-card{background:var(--card);border:1px solid var(--line);border-radius:4px;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;box-shadow:0 1px 0 var(--line)}
.dp-lib-card:hover{background:var(--card2)}
.dp-lib-cov{aspect-ratio:3/4;width:100%;object-fit:cover;background:#f2f1ed;display:flex;align-items:center;justify-content:center;color:#a1a19f;font-size:34px}
.dp-lib-b{padding:8px 10px 10px;flex:1;min-width:0}
.dp-lib-t{font-weight:500;font-size:13.5px;line-height:1.3;color:var(--ink);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.dp-lib-a{font-size:11.5px;color:#84847e;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dp-lib-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:4px}
.dp-lib-st{font-size:10px;font-weight:500;padding:2px 8px;border-radius:8px;white-space:nowrap}
.dp-stars{color:#c08532;letter-spacing:1px;line-height:1;white-space:nowrap}
.dp-cover-input{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.dp-cover-prev{width:54px;height:72px;object-fit:cover;border-radius:4px;border:1px solid var(--line);background:#f2f1ed}
.dp-lib-edit{display:flex;align-items:center;gap:10px;margin:9px 0;flex-wrap:wrap}
.dp-addbar.lib input,.dp-addbar.lib select{flex:0 1 auto;min-width:108px}
.dp-addbar.lib input[placeholder]{flex:1;min-width:130px}
/* 展開的書卡：橫跨整列，封面在左、編輯在右 */
.dp-lib-card.open{grid-column:1/-1;flex-direction:row;cursor:default;background:var(--card2)}
.dp-lib-card.open .dp-lib-cov{width:124px;flex:0 0 124px;aspect-ratio:3/4}

@media(max-width:680px){
  .dp-lib{grid-template-columns:repeat(auto-fill,minmax(104px,1fr));gap:10px}
  .dp-lib-cov{font-size:26px}
  .dp-lib-card.open .dp-lib-cov{width:96px;flex:0 0 96px}
  .dp-spine{padding:0 8px}
  .dp-brand{padding:0 8px 0 2px}
  .dp-brand-t{font-size:15px}
  .dp-tab{padding:11px 13px 9px}
  .dp-grid2,.dp-jmat{grid-template-columns:1fr}
  .dp-trend-cols{grid-template-columns:1fr}
  .dp-idea-grid{grid-template-columns:1fr}
  .dp-rvcols{grid-template-columns:1fr}
  .dp-zgrid{grid-template-columns:1fr}
  .dp-mapwrap{height:380px}
  .dp-page{padding:18px 14px 50px}
  /* week view stacks vertically on phones (7 columns too narrow) */
  .dp-week{grid-template-columns:1fr;gap:8px}
  .dp-week-col{flex-direction:row;min-height:0}
  .dp-week-h{flex-direction:row;gap:8px;align-items:center;border-bottom:none;border-right:1px solid #f2f1ed;min-width:84px;justify-content:center}
  .dp-week-body{padding:8px 10px}
  .dp-week-empty{margin:0}
}

.dp-themebtn{margin-top:-4px}

/* ConfirmModal + Toast：取代原生 window.confirm / alert */
.dp-cfm-mask{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;padding:20px}
.dp-cfm{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:22px 24px;max-width:420px;width:100%;box-shadow:0 12px 40px rgba(0,0,0,.3)}
.dp-cfm-msg{font-size:14.5px;line-height:1.65;color:var(--ink);white-space:pre-wrap}
.dp-cfm-bar{display:flex;justify-content:flex-end;gap:10px;margin-top:18px}
.dp-cfm-ok{background:var(--accent);color:#fff;border-color:var(--accent)}

.dp-toast-stack{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:10001;display:flex;flex-direction:column;gap:8px;align-items:center;padding:0 16px;width:100%;max-width:420px}
.dp-toast{background:var(--card);border:1px solid var(--line);border-radius:8px;padding:10px 18px;font-size:13.5px;color:var(--ink);box-shadow:0 6px 18px rgba(0,0,0,.18);max-width:100%}
.dp-toast.err{border-left:4px solid var(--accent)}
.dp-toast.sync{background:#e8f5e9;border:1px solid #66bb6a;border-left:6px solid #43a047;color:#1b5e20;font-size:15px;font-weight:500;padding:14px 22px;box-shadow:0 8px 22px rgba(67,160,71,.28)}

/* ═══ Cursor 風格側欄架構（桌面 >900px；窄螢幕維持頂部橫列） ═══ */
@media(min-width:901px){
  .dp-root{flex-direction:row}
  .dp-spine{
    flex-direction:column;align-items:stretch;gap:2px;
    width:196px;min-width:196px;max-width:196px;height:100vh;overflow-y:auto;
    padding:14px 10px;border-right:1px solid var(--hair);box-shadow:none;
  }
  .dp-brand{flex-direction:row;border-right:none;border-bottom:1px solid var(--hair);padding:4px 8px 14px;margin-bottom:10px}
  .dp-tabs{flex-direction:column;align-items:stretch;gap:2px;overflow-x:visible;overflow-y:visible;flex:0 1 auto}
  .dp-tab{padding:8px 12px;border-bottom:none;border-radius:4px;color:var(--muted)}
  .dp-tab:hover{color:var(--ink);background:rgba(38,37,30,.04)}
  .dp-tab.on{color:#f7f7f4;background:#34785c;border-bottom:none}
  .dp-spine-foot{display:block;margin-top:auto;padding:12px 8px 4px;font-family:var(--mono);font-size:11px;line-height:1.5;color:var(--muted);border-top:1px solid var(--hair)}
  .dp-page{padding:32px clamp(20px,4vw,56px) 64px}
}
`;

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

(function(){
  var src=document.getElementById('app-src').textContent;
  function showErr(p,e){var el=document.getElementById('dp-err');el.style.cssText='position:fixed;inset:0;background:#fff;z-index:9999;padding:20px;font-family:monospace;font-size:13px;color:#c00;white-space:pre-wrap;overflow:auto';el.textContent=p+'\n'+e.message+(e.stack?'\n\n'+e.stack:'');}
  function hash(s){var h=5381,i=s.length;while(i){h=(h*33^s.charCodeAt(--i))>>>0;}return h.toString(36);}
  var KEY='dp-compiled-'+src.length+'-'+hash(src);
  // 1) 快取命中：免重新轉譯，開啟更快（手機／iPad 有感）
  try{ var cached=localStorage.getItem(KEY); if(cached){ eval(cached); return; } }catch(e){ /* 快取壞掉→走正常編譯 */ }
  // 2) 正常路徑（與原本相同，為保底）：轉譯 → 執行 → 存快取
  try{
    var code=Babel.transform(src,{presets:['react']}).code;
    try{
      eval(code);
      try{ for(var i=localStorage.length-1;i>=0;i--){var k=localStorage.key(i);if(k&&k.indexOf('dp-compiled-')===0&&k!==KEY)localStorage.removeItem(k);} localStorage.setItem(KEY,code); }catch(e){}
    }catch(e){ showErr('Runtime error:',e); }
  }catch(e){ showErr('Babel parse error:',e); }
})();
</script>
<script>
if("serviceWorker" in navigator && location.protocol==="https:"){
  navigator.serviceWorker.register("./sw.js").catch(function(e){});
}
</script>
</body>
</html>
